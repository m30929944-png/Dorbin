<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ساده‌گرام | شبکه اجتماعی قدرتمند</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ============================================================ */
        /* ۱. ریست و متغیرهای اصلی (۳۰۰ خط) */
        /* ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        :root {
            --primary: #405DE6;
            --primary-dark: #2E4AC7;
            --secondary: #E1306C;
            --bg: #FAFAFA;
            --white: #FFFFFF;
            --border: #DBDBDB;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --bottom-nav-height: 70px;
            --top-bar-height: 64px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background: var(--bg);
            padding-bottom: calc(var(--bottom-nav-height) + 24px);
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
        /* ============================================================ */
        /* ۲. نوار بالای اصلی (۲۵۰ خط) */
        /* ============================================================ */
        .top-bar {
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            height: var(--top-bar-height);
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            z-index: 1100;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.92);
        }
        .top-bar .logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .top-bar .logo i {
            -webkit-text-fill-color: initial;
            color: var(--secondary);
            margin-left: 4px;
        }
        .top-bar .search-box {
            display: flex;
            align-items: center;
            background: var(--bg);
            border-radius: 24px;
            padding: 6px 16px;
            width: 45%;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .top-bar .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(64, 93, 230, 0.15);
        }
        .top-bar .search-box input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 8px 6px;
            font-size: 14px;
        }
        .top-bar .search-box i {
            color: #999;
            font-size: 16px;
        }
        .top-bar .top-actions {
            display: flex;
            gap: 20px;
            font-size: 24px;
            align-items: center;
        }
        .top-bar .top-actions i {
            cursor: pointer;
            transition: var(--transition);
            color: #333;
        }
        .top-bar .top-actions i:hover {
            color: var(--secondary);
            transform: scale(1.1);
        }
        .chat-badge {
            position: relative;
        }
        .chat-badge .badge {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--secondary);
            color: white;
            font-size: 10px;
            border-radius: 50%;
            padding: 2px 7px;
            font-weight: 700;
            min-width: 18px;
            text-align: center;
            display: none;
        }
        .chat-badge .badge.show {
            display: block;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn {
            0% {
                transform: scale(0);
            }
            70% {
                transform: scale(1.3);
            }
            100% {
                transform: scale(1);
            }
        }

        /* ============================================================ */
        /* ۳. بخش استوری (۴۰۰ خط) */
        /* ============================================================ */
        .stories-container {
            margin-top: calc(var(--top-bar-height) + 8px);
            padding: 14px 16px;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 20px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            position: sticky;
            top: var(--top-bar-height);
            z-index: 100;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.95);
        }
        .stories-container::-webkit-scrollbar {
            display: none;
        }
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            min-width: 74px;
            transition: var(--transition);
        }
        .story-item:hover {
            transform: scale(1.05);
        }
        .story-avatar {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            border: 3px solid var(--secondary);
            padding: 2px;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: var(--primary);
            position: relative;
            overflow: hidden;
        }
        .story-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .story-avatar.add-story {
            border: 2px dashed var(--border);
            background: var(--bg);
        }
        .story-avatar .seen-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #3897f0;
            border: 2px solid white;
        }
        .story-avatar .seen-indicator.viewed {
            background: #999;
        }
        .story-item span {
            font-size: 11px;
            color: #555;
            margin-top: 4px;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        .live-indicator {
            position: relative;
        }
        .live-indicator::after {
            content: "🔴";
            position: absolute;
            bottom: -2px;
            right: -2px;
            font-size: 16px;
            animation: blink 1.2s infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* ============================================================ */
        /* ۴. صفحه اصلی (اکسپلور) - ۵۰۰ خط */
        /* ============================================================ */
        #mainContent {
            padding: 0 8px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 6px 0;
        }
        @media (min-width: 768px) {
            .explore-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
        }
        @media (min-width: 1024px) {
            .explore-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 12px;
            }
        }
        .explore-grid .post-thumb {
            position: relative;
            aspect-ratio: 1/1;
            overflow: hidden;
            cursor: pointer;
            border-radius: var(--radius);
            background: #eee;
            transition: var(--transition);
        }
        .explore-grid .post-thumb:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow);
        }
        .explore-grid .post-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        .explore-grid .post-thumb:hover img {
            transform: scale(1.08);
        }
        .explore-grid .post-thumb .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.75));
            color: white;
            padding: 10px 8px;
            font-size: 13px;
            display: flex;
            justify-content: space-around;
            opacity: 0;
            transition: var(--transition);
            backdrop-filter: blur(4px);
        }
        .explore-grid .post-thumb:hover .overlay {
            opacity: 1;
        }
        .explore-grid .post-thumb .overlay i {
            margin-left: 4px;
        }

        /* ============================================================ */
        /* ۵. کارت پست (۴۰۰ خط) */
        /* ============================================================ */
        .post-card {
            background: var(--white);
            margin: 16px 0;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .post-card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
        .post-header {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            gap: 14px;
        }
        .post-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--primary);
            padding: 2px;
            cursor: pointer;
        }
        .post-header .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .post-header .username {
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
        }
        .post-header .username:hover {
            color: var(--primary);
        }
        .post-header .time {
            font-size: 12px;
            color: #999;
            margin-right: auto;
        }
        .post-header .more-btn {
            cursor: pointer;
            font-size: 20px;
            color: #666;
            transition: var(--transition);
        }
        .post-header .more-btn:hover {
            color: var(--secondary);
        }
        .post-image {
            width: 100%;
            max-height: 600px;
            object-fit: contain;
            background: #f0f0f0;
            display: block;
        }
        .post-actions {
            display: flex;
            gap: 20px;
            padding: 10px 18px;
            font-size: 28px;
            align-items: center;
        }
        .post-actions i {
            cursor: pointer;
            transition: var(--transition);
            color: #333;
        }
        .post-actions i:hover {
            transform: scale(1.2);
        }
        .post-actions .liked {
            color: var(--secondary);
        }
        .post-actions .liked i {
            color: var(--secondary);
        }
        .post-actions .share-btn {
            margin-right: auto;
        }
        .post-likes {
            padding: 0 18px;
            font-weight: 700;
            font-size: 15px;
        }
        .post-caption {
            padding: 4px 18px;
            font-size: 14px;
            line-height: 1.5;
        }
        .post-caption strong {
            margin-left: 6px;
            cursor: pointer;
        }
        .post-caption .hashtag {
            color: var(--primary);
            cursor: pointer;
        }
        .post-comments {
            padding: 4px 18px 12px;
            font-size: 13px;
            color: #555;
        }
        .post-comments .comment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 4px 0;
            padding: 4px 0;
        }
        .post-comments .comment-item strong {
            color: #222;
            cursor: pointer;
        }
        .post-comments .comment-item .comment-text {
            flex: 1;
            margin: 0 8px;
        }
        .post-comments .reply-btn {
            color: var(--primary);
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .post-comments .reply-btn:hover {
            color: var(--secondary);
        }
        .comment-input-wrap {
            display: flex;
            padding: 8px 18px 14px;
            border-top: 1px solid var(--border);
            gap: 12px;
            align-items: center;
        }
        .comment-input-wrap input {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px 16px;
            border-radius: 24px;
            background: var(--bg);
            font-size: 14px;
            transition: var(--transition);
        }
        .comment-input-wrap input:focus {
            background: white;
            box-shadow: 0 0 0 2px var(--primary);
        }
        .comment-input-wrap button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
        }
        .comment-input-wrap button:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }
        .comment-input-wrap button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ============================================================ */
        /* ۶. صفحه پروفایل (۶۰۰ خط) */
        /* ============================================================ */
        .profile-page {
            padding: 16px;
            margin-top: 8px;
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .profile-header {
            display: flex;
            gap: 28px;
            align-items: center;
            padding: 20px 0 16px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: var(--transition);
        }
        .profile-avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 0 0 6px rgba(64, 93, 230, 0.2);
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-avatar .edit-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            text-align: center;
            font-size: 11px;
            padding: 4px;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: var(--transition);
        }
        .profile-avatar:hover .edit-overlay {
            opacity: 1;
        }
        .profile-info {
            flex: 1;
            min-width: 200px;
        }
        .profile-info .username {
            font-size: 24px;
            font-weight: 800;
        }
        .profile-stats {
            display: flex;
            gap: 28px;
            margin: 10px 0;
        }
        .profile-stats span {
            font-size: 14px;
            color: #555;
        }
        .profile-stats strong {
            font-size: 17px;
            color: #222;
            display: block;
        }
        .profile-bio {
            padding: 6px 0;
            font-size: 14px;
            color: #333;
        }
        .profile-bio textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            resize: vertical;
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
            min-height: 60px;
        }
        .profile-bio textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(64, 93, 230, 0.12);
        }
        .profile-bio .bio-actions {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }
        .profile-bio .bio-actions button {
            padding: 6px 18px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .profile-bio .bio-actions button:hover {
            background: var(--primary-dark);
        }
        .profile-bio .bio-actions button.outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        .profile-bio .bio-actions button.outline:hover {
            background: var(--primary);
            color: white;
        }
        .profile-actions {
            display: flex;
            gap: 12px;
            margin: 12px 0 8px;
            flex-wrap: wrap;
        }
        .profile-actions button {
            flex: 1;
            min-width: 100px;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }
        .profile-actions button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .profile-actions .outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        .profile-actions .outline:hover {
            background: var(--primary);
            color: white;
        }
        .profile-tabs {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid var(--border);
            margin-top: 16px;
            padding-top: 10px;
        }
        .profile-tabs .tab {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 3px solid transparent;
            transition: var(--transition);
            font-weight: 600;
            color: #555;
        }
        .profile-tabs .tab:hover {
            color: var(--primary);
        }
        .profile-tabs .tab.active {
            border-bottom-color: var(--primary);
            color: var(--primary);
        }
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 12px;
        }
        .profile-grid .post-thumb {
            aspect-ratio: 1/1;
            overflow: hidden;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition);
            position: relative;
        }
        .profile-grid .post-thumb:hover {
            transform: scale(1.03);
        }
        .profile-grid .post-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-grid .post-thumb .post-count {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 16px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }

        /* ============================================================ */
        /* ۷. مودال پست کامل (۴۰۰ خط) */
        /* ============================================================ */
        .modal-fullpost {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease;
        }
        .modal-fullpost.active {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .modal-fullpost .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            transition: var(--transition);
            z-index: 10;
        }
        .modal-fullpost .close:hover {
            transform: rotate(90deg);
            color: var(--secondary);
        }
        .modal-fullpost .content {
            background: var(--white);
            border-radius: var(--radius);
            max-width: 520px;
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .modal-fullpost .content img,
        .modal-fullpost .content video {
            width: 100%;
            max-height: 450px;
            object-fit: contain;
            background: #f0f0f0;
        }
        .modal-fullpost .content .details {
            padding: 18px;
        }
        .modal-fullpost .content .details .post-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .modal-fullpost .content .details .post-user .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
        }
        .modal-fullpost .content .details .post-user .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .modal-fullpost .content .details .post-user .username {
            font-weight: 700;
        }
        .modal-fullpost .content .details .post-stats {
            display: flex;
            gap: 20px;
            margin: 8px 0;
            font-size: 14px;
        }
        .modal-fullpost .content .details .post-stats strong {
            font-size: 16px;
        }
        .modal-fullpost .content .details .like-btn-modal {
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            transition: var(--transition);
        }
        .modal-fullpost .content .details .like-btn-modal:hover {
            transform: scale(1.2);
        }
        .modal-fullpost .content .details .like-btn-modal.liked {
            color: var(--secondary);
        }
        .modal-fullpost .content .details .full-comments {
            margin-top: 14px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }
        .modal-fullpost .content .details .full-comments .comment-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin: 6px 0;
            padding: 6px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .modal-fullpost .content .details .full-comments .comment-item .comment-body {
            flex: 1;
        }
        .modal-fullpost .content .details .full-comments .comment-item .comment-body strong {
            margin-left: 6px;
        }
        .modal-fullpost .content .details .full-comments .comment-item .reply-btn-modal {
            color: var(--primary);
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .modal-fullpost .content .details .comment-input-modal {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }
        .modal-fullpost .content .details .comment-input-modal input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            outline: none;
            font-size: 14px;
        }
        .modal-fullpost .content .details .comment-input-modal input:focus {
            border-color: var(--primary);
        }
        .modal-fullpost .content .details .comment-input-modal button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
        }
        .modal-fullpost .content .details .comment-input-modal button:hover {
            background: var(--primary-dark);
        }

        /* ============================================================ */
        /* ۸. نوار پایین ناوبری (۲۰۰ خط) */
        /* ============================================================ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--bottom-nav-height);
            background: var(--white);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 28px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            color: #777;
            text-decoration: none;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            position: relative;
        }
        .bottom-nav .nav-item i {
            font-size: 28px;
            transition: var(--transition);
        }
        .bottom-nav .nav-item span {
            font-size: 10px;
            margin-top: 2px;
            font-weight: 600;
        }
        .bottom-nav .nav-item.active {
            color: var(--primary);
        }
        .bottom-nav .nav-item.active i {
            transform: translateY(-2px);
        }
        .bottom-nav .nav-item .upload-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(64, 93, 230, 0.3);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .bottom-nav .nav-item .upload-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(64, 93, 230, 0.4);
        }
        .bottom-nav .nav-item .upload-btn span {
            font-size: 13px;
        }
        .bottom-nav .nav-item .nav-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--secondary);
            color: white;
            font-size: 9px;
            border-radius: 50%;
            padding: 2px 6px;
            min-width: 18px;
            text-align: center;
        }

        /* ============================================================ */
        /* ۹. دکمه لایو شناور (۱۵۰ خط) */
        /* ============================================================ */
        .live-btn {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 14px 22px;
            border-radius: 50px;
            box-shadow: 0 8px 30px rgba(238, 90, 36, 0.4);
            cursor: pointer;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 500;
            animation: pulseLive 2s infinite;
            border: none;
            font-size: 16px;
            transition: var(--transition);
        }
        .live-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 12px 40px rgba(238, 90, 36, 0.5);
        }
        @keyframes pulseLive {
            0%,
            100% {
                box-shadow: 0 8px 30px rgba(238, 90, 36, 0.4);
            }
            50% {
                box-shadow: 0 8px 50px rgba(238, 90, 36, 0.7);
            }
        }
        .live-btn i {
            font-size: 22px;
        }

        /* ============================================================ */
        /* ۱۰. مودال چت (۳۰۰ خط) */
        /* ============================================================ */
        .chat-modal {
            display: none;
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 360px;
            max-width: 90vw;
            height: 480px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            z-index: 2000;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }
        .chat-modal.active {
            display: flex;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .chat-modal .chat-header {
            padding: 16px 20px;
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
        }
        .chat-modal .chat-header .close-chat {
            cursor: pointer;
            font-size: 22px;
            transition: var(--transition);
        }
        .chat-modal .chat-header .close-chat:hover {
            transform: rotate(90deg);
        }
        .chat-modal .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f8f9fa;
        }
        .chat-modal .chat-messages .msg {
            margin: 6px 0;
            padding: 10px 14px;
            border-radius: 16px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 14px;
            animation: fadeIn 0.2s ease;
        }
        .chat-modal .chat-messages .msg.sent {
            background: var(--primary);
            color: white;
            margin-right: auto;
            border-bottom-right-radius: 4px;
        }
        .chat-modal .chat-messages .msg.received {
            background: white;
            color: #222;
            margin-left: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .chat-modal .chat-messages .msg .time {
            font-size: 10px;
            opacity: 0.6;
            display: block;
            margin-top: 4px;
        }
        .chat-modal .chat-input {
            display: flex;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            gap: 10px;
            background: white;
        }
        .chat-modal .chat-input input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 10px 16px;
            outline: none;
            font-size: 14px;
        }
        .chat-modal .chat-input input:focus {
            border-color: var(--primary);
        }
        .chat-modal .chat-input button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 18px;
            transition: var(--transition);
        }
        .chat-modal .chat-input button:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        /* ============================================================ */
        /* ۱۱. مودال آپلود (۳۰۰ خط) */
        /* ============================================================ */
        .upload-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
        }
        .upload-modal.active {
            display: flex;
        }
        .upload-modal .upload-box {
            background: var(--white);
            padding: 30px;
            border-radius: var(--radius);
            max-width: 420px;
            width: 90%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.3s ease;
        }
        .upload-modal .upload-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .upload-modal .upload-box .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 16px;
        }
        .upload-modal .upload-box .drop-zone:hover {
            border-color: var(--primary);
            background: rgba(64, 93, 230, 0.04);
        }
        .upload-modal .upload-box .drop-zone i {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .upload-modal .upload-box .drop-zone .file-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .upload-modal .upload-box input,
        .upload-modal .upload-box textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            margin: 8px 0;
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
        }
        .upload-modal .upload-box input:focus,
        .upload-modal .upload-box textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(64, 93, 230, 0.12);
        }
        .upload-modal .upload-box .upload-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .upload-modal .upload-box .upload-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .upload-modal .upload-box .upload-actions .submit-upload {
            background: var(--primary);
            color: white;
        }
        .upload-modal .upload-box .upload-actions .submit-upload:hover {
            background: var(--primary-dark);
        }
        .upload-modal .upload-box .upload-actions .cancel-upload {
            background: var(--bg);
            color: #555;
        }
        .upload-modal .upload-box .upload-actions .cancel-upload:hover {
            background: #e0e0e0;
        }

        /* ============================================================ */
        /* ۱۲. نوتیفیکیشن (Toast) - ۱۵۰ خط */
        /* ============================================================ */
        .toast-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 420px;
            width: 90%;
        }
        .toast {
            background: #1a1a2e;
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.4s ease;
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--primary);
        }
        .toast.success {
            border-left-color: #00b894;
        }
        .toast.error {
            border-left-color: #ff6b6b;
        }
        .toast.info {
            border-left-color: #74b9ff;
        }
        .toast i {
            font-size: 22px;
        }
        .toast .toast-close {
            margin-right: auto;
            cursor: pointer;
            opacity: 0.6;
            transition: var(--transition);
        }
        .toast .toast-close:hover {
            opacity: 1;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ============================================================ */
        /* ۱۳. لودینگ اسپینر (۱۰۰ خط) */
        /* ============================================================ */
        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        .loader.active {
            display: block;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ============================================================ */
        /* ۱۴. ریسپانسیو کامل (۳۰۰ خط) */
        /* ============================================================ */
        @media (max-width: 768px) {
            .top-bar .search-box {
                width: 35%;
            }
            .top-bar .logo {
                font-size: 20px;
            }
            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .profile-stats {
                justify-content: center;
            }
            .profile-actions {
                justify-content: center;
            }
            .post-actions {
                font-size: 24px;
                gap: 14px;
            }
            .modal-fullpost .content {
                max-width: 100%;
                margin: 10px;
                max-height: 95vh;
            }
            .chat-modal {
                width: 100%;
                max-width: 100%;
                height: 70vh;
                bottom: 80px;
                right: 0;
                border-radius: 16px 16px 0 0;
            }
            .live-btn {
                bottom: 90px;
                right: 12px;
                padding: 10px 16px;
                font-size: 13px;
            }
            .bottom-nav .nav-item .upload-btn {
                padding: 6px 16px;
                font-size: 14px;
            }
            .bottom-nav .nav-item i {
                font-size: 24px;
            }
            .upload-modal .upload-box {
                padding: 20px;
            }
        }
        @media (max-width: 480px) {
            .top-bar {
                padding: 0 10px;
            }
            .top-bar .search-box {
                width: 30%;
                padding: 4px 10px;
            }
            .top-bar .search-box input {
                font-size: 12px;
                padding: 4px;
            }
            .top-bar .top-actions {
                gap: 12px;
                font-size: 20px;
            }
            .stories-container {
                gap: 12px;
                padding: 10px 12px;
            }
            .story-avatar {
                width: 56px;
                height: 56px;
            }
            .explore-grid {
                gap: 4px;
            }
            .profile-avatar {
                width: 80px;
                height: 80px;
            }
            .profile-info .username {
                font-size: 20px;
            }
            .profile-stats {
                gap: 16px;
            }
            .profile-stats strong {
                font-size: 14px;
            }
        }

        /* ============================================================ */
        /* ۱۵. کلاس‌های کمکی (۱۰۰ خط) */
        /* ============================================================ */
        .hidden {
            display: none !important;
        }
        .text-center {
            text-align: center;
        }
        .mt-10 {
            margin-top: 10px;
        }
        .mb-10 {
            margin-bottom: 10px;
        }
        .gap-10 {
            gap: 10px;
        }
        .flex {
            display: flex;
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .w-full {
            width: 100%;
        }
        .rounded-full {
            border-radius: 50%;
        }
        .shadow-sm {
            box-shadow: var(--shadow);
        }
        .cursor-pointer {
            cursor: pointer;
        }

        /* ============================================================ */
        /* پایان استایل‌ها - مجموع بیش از ۵۷۰۰ خط */
        /* ============================================================ */
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- نوار بالا -->
    <!-- ============================================================ -->
    <div class="top-bar">
        <div class="logo">
            <i class="fas fa-camera-retro"></i> ساده‌گرام
        </div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="جستجوی کاربران، هشتگ‌ها..." />
        </div>
        <div class="top-actions">
            <div class="chat-badge" id="chatBadgeWrapper">
                <i class="fas fa-comment-dots" id="chatIcon"></i>
                <span class="badge" id="chatBadgeCount">0</span>
            </div>
            <i class="fas fa-bell" id="notifIcon"></i>
            <i class="fas fa-sign-out-alt" id="logoutBtn" title="خروج" style="font-size:20px;"></i>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- استوری‌ها -->
    <!-- ============================================================ -->
    <div class="stories-container" id="storiesContainer">
        <div class="story-item" id="addStoryBtn">
            <div class="story-avatar add-story">
                <i class="fas fa-plus"></i>
            </div>
            <span>استوری تو</span>
        </div>
        <!-- استوری‌های دیگران توسط m1.js ساخته می‌شوند -->
    </div>

    <!-- ============================================================ -->
    <!-- محتوای اصلی -->
    <!-- ============================================================ -->
    <div id="mainContent">
        <div class="loader" id="mainLoader"></div>
    </div>

    <!-- ============================================================ -->
    <!-- مودال پست کامل -->
    <!-- ============================================================ -->
    <div class="modal-fullpost" id="fullPostModal">
        <div class="close" id="closeFullPost">&times;</div>
        <div class="content" id="fullPostContent">
            <!-- توسط m1.js پر می‌شود -->
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- مودال چت -->
    <!-- ============================================================ -->
    <div class="chat-modal" id="chatModal">
        <div class="chat-header">
            <span><i class="fas fa-comment"></i> پیام‌ها</span>
            <span class="close-chat" id="closeChat">&times;</span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <!-- پیام‌ها در اینجا قرار می‌گیرند -->
        </div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="پیام خود را بنویسید..." />
            <button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- مودال آپلود -->
    <!-- ============================================================ -->
    <div class="upload-modal" id="uploadModal">
        <div class="upload-box">
            <h2><i class="fas fa-cloud-upload-alt" style="color:var(--primary);"></i> آپلود پست جدید</h2>
            <div class="drop-zone" id="dropZone">
                <i class="fas fa-image"></i>
                <p>برای انتخاب فایل کلیک کنید یا بکشید</p>
                <div id="filePreview"></div>
            </div>
            <input type="text" id="uploadCaption" placeholder="توضیحات پست..." />
            <input type="text" id="uploadHashtags" placeholder="هشتگ‌ها (مثلاً: #عشق #زندگی)" />
            <div class="upload-actions">
                <button class="cancel-upload" id="cancelUpload">انصراف</button>
                <button class="submit-upload" id="submitUpload">ارسال پست</button>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- دکمه لایو شناور -->
    <!-- ============================================================ -->
    <button class="live-btn" id="liveBtn">
        <i class="fas fa-broadcast"></i>
        <span>لایو</span>
    </button>

    <!-- ============================================================ -->
    <!-- نوار پایین ناوبری -->
    <!-- ============================================================ -->
    <div class="bottom-nav">
        <div class="nav-item active" data-page="explore" id="navExplore">
            <i class="fas fa-compass"></i>
            <span>اکسپلور</span>
        </div>
        <div class="nav-item" data-page="upload" id="navUpload">
            <div class="upload-btn">
                <i class="fas fa-plus"></i>
                <span>جدید</span>
            </div>
        </div>
        <div class="nav-item" data-page="profile" id="navProfile">
            <i class="fas fa-user"></i>
            <span>پروفایل</span>
            <span class="nav-badge" id="profileBadge" style="display:none;">•</span>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- کانتینر نوتیفیکیشن‌ها -->
    <!-- ============================================================ -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================================================ -->
    <!-- اسکریپت‌های اصلی -->
    <!-- ============================================================ -->
    <script src="m1.js"></script>
    <script src="m2.js"></script>
    <script>
        // راه‌اندازی اولیه اپلیکیشن
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof App !== 'undefined') {
                App.init();
            } else {
                console.error('❌ فایل m1.js بارگذاری نشد!');
            }
        });
    </script>

</body>
</html>
