<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>یارِ من - پلتفرم هوشمند اجتماعی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ============================================
   تم‌های چهارگانه
   ============================================ */
:root {
  --bg: #0a0b1a;
  --bg-soft: #111427;
  --bg-card: #161a33;
  --bg-card-hover: #1e2350;
  --border: #262d55;
  --border-light: #323b6e;
  --text: #eeeffb;
  --text-2: #a8b0d6;
  --text-3: #6b74a8;
  --primary: #7c6cf6;
  --primary-dark: #5b4fd6;
  --primary-light: #9a8cff;
  --primary-glow: rgba(124, 108, 246, 0.3);
  --secondary: #f6b93b;
  --secondary-dark: #d49a2a;
  --success: #4ade80;
  --danger: #f45b69;
  --warning: #fbbf24;
  --info: #60a5fa;
  --like: #ff5c8a;
  --like-glow: rgba(255, 92, 138, 0.3);
  --radius: 20px;
  --radius-sm: 12px;
  --radius-full: 99px;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 40px rgba(124, 108, 246, 0.15);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* تم دوم - آبی */
.theme-blue {
  --primary: #3b82f6;
  --primary-dark: #2563eb;
  --primary-glow: rgba(59, 130, 246, 0.3);
  --bg: #0a1628;
  --bg-card: #0f2140;
}

/* تم سوم - صورتی */
.theme-pink {
  --primary: #ec4899;
  --primary-dark: #db2777;
  --primary-glow: rgba(236, 72, 153, 0.3);
  --bg: #1a0a18;
  --bg-card: #2a0f26;
}

/* تم چهارم - سبز */
.theme-green {
  --primary: #22d3ee;
  --primary-dark: #06b6d4;
  --primary-glow: rgba(34, 211, 238, 0.3);
  --bg: #0a1a1a;
  --bg-card: #0f2a2a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Vazirmatn', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 90px;
  overflow-x: hidden;
  background-image: radial-gradient(ellipse at 10% 0%, var(--primary-glow) 0%, transparent 60%);
}

/* ============================================
   اسکرول
   ============================================ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-soft); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 99px; }

/* ============================================
   دکمه‌های بزرگ
   ============================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 28px;
  border: none;
  border-radius: var(--radius-full);
  font-family: inherit;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  min-height: 56px;
  min-width: 60px;
}
.btn:active { transform: scale(0.95); }

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  box-shadow: 0 4px 20px var(--primary-glow);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--primary-glow); }

.btn-secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 2px solid var(--border);
}
.btn-secondary:hover { background: var(--bg-card-hover); border-color: var(--primary); }

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  padding: 10px 18px;
}
.btn-ghost:hover { color: var(--text); background: var(--bg-soft); }

.btn-danger {
  background: linear-gradient(135deg, var(--danger), #d94452);
  color: #fff;
}
.btn-danger:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(244, 91, 105, 0.3); }

.btn-success {
  background: linear-gradient(135deg, var(--success), #22c55e);
  color: #0a0b1a;
}
.btn-success:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(74, 222, 128, 0.3); }

.btn-like {
  background: transparent;
  color: var(--text-2);
  border: none;
  padding: 12px 18px;
  font-size: 18px;
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: var(--transition);
}
.btn-like:hover { background: var(--bg-soft); }
.btn-like.active { color: var(--like); }
.btn-like.active i { animation: likeAnim 0.4s ease; }
@keyframes likeAnim {
  0% { transform: scale(1); }
  50% { transform: scale(1.5); }
  100% { transform: scale(1); }
}

.btn-follow {
  padding: 12px 28px;
  font-size: 15px;
  border-radius: var(--radius-full);
  border: none;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  min-width: 100px;
}
.btn-follow:active { transform: scale(0.95); }
.btn-follow.follow {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
}
.btn-follow.following {
  background: var(--bg-soft);
  color: var(--text-2);
  border: 2px solid var(--border);
}

/* ============================================
   هدر
   ============================================ */
.main-header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: rgba(10, 11, 26, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 2px solid var(--border);
}

.profile-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  background: none;
  border: none;
  color: var(--text);
  padding: 6px 12px;
  border-radius: var(--radius-full);
  transition: var(--transition);
}
.profile-btn:hover { background: var(--bg-soft); }
.profile-btn img {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 3px solid var(--primary);
}
.profile-btn span {
  font-size: 15px;
  font-weight: 600;
}

.header-center { flex: 1; max-width: 420px; }
.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: var(--radius-full);
  padding: 10px 16px;
  transition: var(--transition);
}
.search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 30px var(--primary-glow); }
.search-box input {
  background: none; border: none; outline: none;
  color: var(--text); width: 100%; font-size: 14px;
}

.header-right { display: flex; align-items: center; gap: 10px; }
.user-score {
  font-size: 14px;
  background: var(--bg-card);
  border: 2px solid var(--border);
  padding: 6px 16px;
  border-radius: var(--radius-full);
  color: var(--secondary);
  font-weight: 700;
}
.admin-btn {
  background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
  color: #0a0b1a;
  border: none;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  font-size: 18px;
  display: none;
  align-items: center;
  justify-content: center;
}
.admin-btn.show { display: flex; }
.admin-btn:active { transform: scale(0.9); }

.theme-btn {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  font-size: 16px;
  color: var(--text);
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}
.theme-btn:hover { border-color: var(--primary); }

/* ============================================
   ناوبری
   ============================================ */
.main-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  background: rgba(17, 20, 39, 0.95);
  backdrop-filter: blur(20px);
  border-top: 2px solid var(--border);
  padding: 6px 4px calc(env(safe-area-inset-bottom) + 6px);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--text-3);
  padding: 8px 4px;
  border-radius: 12px;
  font-size: 11px;
  transition: var(--transition);
}
.nav-btn i { font-size: 24px; }
.nav-btn.active { color: var(--primary); }
.nav-btn.active i { transform: translateY(-3px); text-shadow: 0 0 30px var(--primary-glow); }
.nav-btn:active { transform: scale(0.9); }

/* ============================================
   صفحات
   ============================================ */
main { max-width: 720px; margin: 0 auto; padding: 12px 14px 100px; }
.page { display: none; animation: fadeIn 0.4s ease; }
.page.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================================
   کارت پست - بزرگ و حرفه‌ای
   ============================================ */
.post-card {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  transition: var(--transition);
}
.post-card:hover { border-color: var(--border-light); }

.post-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  cursor: pointer;
}
.post-head img {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 3px solid var(--border);
}
.post-head .name { font-size: 16px; font-weight: 700; }
.post-head .time { font-size: 12px; color: var(--text-3); margin-inline-start: auto; }

.post-card .content {
  font-size: 16px;
  line-height: 2;
  white-space: pre-wrap;
  margin-bottom: 14px;
}
.post-card .content .hashtag {
  color: var(--primary);
  font-weight: 600;
}

.post-card .media-wrapper {
  width: 100%;
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 14px;
  background: var(--bg-soft);
  position: relative;
}
.post-card .media-wrapper img,
.post-card .media-wrapper video {
  width: 100%;
  max-height: 500px;
  display: block;
  object-fit: contain;
}
.post-card .media-wrapper .fullscreen-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  font-size: 16px;
  cursor: pointer;
  transition: var(--transition);
}
.post-card .media-wrapper .fullscreen-btn:hover { transform: scale(1.1); }

.post-stats {
  display: flex;
  gap: 20px;
  font-size: 15px;
  color: var(--text-2);
  border-top: 2px solid var(--border);
  padding-top: 14px;
}
.post-stats .btn-like,
.post-stats .btn-comment,
.post-stats .btn-share {
  background: none;
  border: none;
  color: var(--text-2);
  font-size: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: var(--radius-full);
  transition: var(--transition);
}
.post-stats .btn-like:hover,
.post-stats .btn-comment:hover,
.post-stats .btn-share:hover {
  background: var(--bg-soft);
}
.post-stats .btn-like.active { color: var(--like); }
.post-stats .btn-like.active i { animation: likeAnim 0.4s ease; }

/* ============================================
   مودال تمام صفحه برای عکس/ویدیو
   ============================================ */
.fullscreen-modal {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.fullscreen-modal.active { display: flex; }
.fullscreen-modal img,
.fullscreen-modal video {
  max-width: 100%;
  max-height: 90vh;
  object-fit: contain;
  border-radius: var(--radius-sm);
}
.fullscreen-modal .close-fullscreen {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  font-size: 24px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: var(--transition);
}
.fullscreen-modal .close-fullscreen:hover { background: rgba(255,255,255,0.2); }

/* ============================================
   اکسپلور با پست‌های کامل
   ============================================ */
.explore-grid { display: flex; flex-direction: column; gap: 16px; }

.explore-user-card {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: var(--transition);
}
.explore-user-card:hover { border-color: var(--border-light); }

.explore-user-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}
.explore-user-header img {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 3px solid var(--primary);
  cursor: pointer;
}
.explore-user-header .info { flex: 1; cursor: pointer; }
.explore-user-header .info h4 { font-size: 16px; font-weight: 700; }
.explore-user-header .info .meta { font-size: 12px; color: var(--text-2); }

.explore-posts { display: flex; flex-direction: column; gap: 10px; }

.explore-post-mini {
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  cursor: pointer;
  transition: var(--transition);
}
.explore-post-mini:hover { border-color: var(--primary); }
.explore-post-mini p { font-size: 14px; line-height: 1.8; }
.explore-post-mini .mini-media {
  margin-top: 8px;
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.explore-post-mini .mini-media img,
.explore-post-mini .mini-media video {
  width: 100%;
  max-height: 200px;
  display: block;
}
.explore-post-mini .mini-stats {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-3);
  margin-top: 8px;
}

/* ============================================
   چت
   ============================================ */
.chat-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
  height: calc(100vh - 200px);
}
.chat-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
  flex: 1;
}
.chat-item {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  cursor: pointer;
  transition: var(--transition);
}
.chat-item:hover { border-color: var(--primary); }
.chat-item img {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid var(--border);
}
.chat-item .info { flex: 1; }
.chat-item .info strong { font-size: 15px; display: block; }
.chat-item .info p { font-size: 13px; color: var(--text-2); }

.chat-window {
  display: none;
  flex-direction: column;
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  height: 100%;
}
.chat-window.open { display: flex; }

.chat-window-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 2px solid var(--border);
}
.chat-window-head img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}
.chat-window-head strong { font-size: 16px; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--bg-soft);
}
.message {
  padding: 12px 18px;
  border-radius: 18px;
  font-size: 15px;
  max-width: 80%;
  line-height: 1.6;
}
.message.sent {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
}
.message.received {
  align-self: flex-start;
  background: var(--bg-card);
  border: 2px solid var(--border);
}

.chat-input {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  border-top: 2px solid var(--border);
}
.chat-input input {
  flex: 1;
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: var(--radius-full);
  padding: 12px 18px;
  color: var(--text);
  font-size: 15px;
  outline: none;
}
.chat-input input:focus { border-color: var(--primary); }
.chat-input button {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  border: none;
  font-size: 18px;
}

/* ============================================
   مودال ثبت‌نام
   ============================================ */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(16px);
  padding: 20px;
}
.modal-content {
  background: var(--bg-card);
  border: 2px solid var(--border);
  padding: 32px;
  border-radius: 24px;
  max-width: 440px;
  width: 100%;
  text-align: center;
}
.modal-content h2 { font-size: 24px; margin-bottom: 16px; }
.avatar-upload {
  position: relative;
  width: 100px;
  height: 100px;
  margin: 0 auto 16px;
}
.avatar-upload img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 4px solid var(--primary);
}
.avatar-upload label {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 34px;
  height: 34px;
  background: var(--primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  cursor: pointer;
  border: 3px solid var(--bg-card);
}
.avatar-upload input { display: none; }
.name-input {
  width: 100%;
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 14px;
  font-size: 16px;
  margin-bottom: 16px;
  text-align: center;
  outline: none;
}
.name-input:focus { border-color: var(--primary); }

/* ============================================
   پنل مدیریت
   ============================================ */
.admin-panel {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.admin-panel h3 { font-size: 20px; margin-bottom: 16px; color: var(--secondary); }
.admin-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.admin-tab {
  padding: 10px 20px;
  border-radius: var(--radius-full);
  border: 2px solid var(--border);
  background: var(--bg-soft);
  color: var(--text-2);
  font-size: 13px;
  cursor: pointer;
  transition: var(--transition);
}
.admin-tab.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.broadcast-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.broadcast-form input,
.broadcast-form textarea {
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 12px 16px;
  font-size: 14px;
  outline: none;
}
.broadcast-form input:focus,
.broadcast-form textarea:focus { border-color: var(--primary); }

/* ============================================
   نوتیفیکیشن
   ============================================ */
.notification {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-card);
  border: 2px solid var(--border);
  padding: 14px 24px;
  border-radius: var(--radius-full);
  z-index: 999;
  font-size: 14px;
  box-shadow: var(--shadow);
  animation: notifIn 0.4s ease;
  max-width: 90%;
}
@keyframes notifIn {
  from { opacity: 0; transform: translate(-50%, -30px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

.broadcast-notification {
  background: linear-gradient(135deg, rgba(74, 222, 128, 0.15), rgba(34, 197, 94, 0.15));
  border-color: var(--success);
  color: var(--success);
  padding: 16px 24px;
  border-radius: var(--radius);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.broadcast-notification i { font-size: 24px; }

.empty-state {
  text-align: center;
  color: var(--text-3);
  padding: 40px 10px;
}
.empty-state i { font-size: 48px; display: block; margin-bottom: 12px; }

/* ============================================
   ریسپانسیو
   ============================================ */
@media (max-width: 600px) {
  .main-header { padding: 8px 10px; }
  .profile-btn img { width: 36px; height: 36px; }
  .profile-btn span { font-size: 13px; max-width: 60px; overflow: hidden; text-overflow: ellipsis; }
  .user-score { font-size: 12px; padding: 4px 12px; }
  .admin-btn, .theme-btn { width: 38px; height: 38px; font-size: 14px; }
  .search-box { padding: 8px 12px; }
  .search-box input { font-size: 12px; }
  
  .post-card { padding: 14px; }
  .post-head img { width: 40px; height: 40px; }
  .post-head .name { font-size: 14px; }
  .post-card .content { font-size: 14px; }
  .post-stats .btn-like,
  .post-stats .btn-comment,
  .post-stats .btn-share { font-size: 14px; padding: 6px 12px; }
  
  .btn { padding: 10px 18px; font-size: 14px; min-height: 44px; }
  .btn-follow { padding: 10px 20px; font-size: 13px; min-width: 80px; }
  
  .explore-user-header img { width: 44px; height: 44px; }
  .explore-user-header .info h4 { font-size: 14px; }
  
  .chat-item { padding: 10px 12px; }
  .chat-item img { width: 40px; height: 40px; }
  .chat-item .info strong { font-size: 13px; }
  
  .modal-content { padding: 20px; }
  .modal-content h2 { font-size: 20px; }
  .avatar-upload { width: 80px; height: 80px; }
  .avatar-upload img { width: 80px; height: 80px; }
}
</style>
</head>
<body>

<!-- ============================================
   هدر
   ============================================ -->
<header class="main-header">
    <button id="profileBtn" class="profile-btn">
        <img src="" alt="پروفایل" id="avatarImg">
        <span id="userName">کاربر</span>
    </button>
    <div class="header-center">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="جستجوی کاربر یا کانال...">
        </div>
    </div>
    <div class="header-right">
        <span class="user-score" id="userScore">🏆 ۰</span>
        <button class="theme-btn" onclick="toggleTheme()" title="تغییر تم"><i class="fas fa-palette"></i></button>
        <button class="admin-btn" id="adminBtn" onclick="toggleAdminPanel()"><i class="fas fa-crown"></i></button>
    </div>
</header>

<!-- ============================================
   ناوبری
   ============================================ -->
<nav class="main-nav">
    <button class="nav-btn active" data-page="channel"><i class="fas fa-bullhorn"></i><span>کانال</span></button>
    <button class="nav-btn" data-page="assistant"><i class="fas fa-robot"></i><span>دستیار</span></button>
    <button class="nav-btn" data-page="chat"><i class="fas fa-envelope"></i><span>چت</span></button>
    <button class="nav-btn" data-page="explore"><i class="fas fa-compass"></i><span>اکسپلور</span></button>
</nav>

<!-- ============================================
   صفحات
   ============================================ -->
<main id="mainContent">

    <!-- صفحه کانال -->
    <section id="channelPage" class="page active">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
            <h2 style="font-size:20px;">📢 کانال من <span id="boostBadge" class="boost-badge" style="font-size:12px;padding:4px 14px;border-radius:99px;background:var(--bg-soft);color:var(--text-2);">عادی</span></h2>
            <span class="followers-count" style="font-size:14px;background:var(--bg-soft);padding:6px 16px;border-radius:99px;border:2px solid var(--border);" id="followersCount">۰ فالوور</span>
        </div>

        <!-- کامپوزر -->
        <div class="composer" style="background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;">
            <textarea id="postContent" placeholder="چه خبر؟ یه پست جدید بنویس..." rows="3" style="width:100%;background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:14px;font-size:15px;resize:vertical;font-family:inherit;"></textarea>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px;">
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <label class="btn-secondary" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:99px;font-size:14px;">
                        <i class="fas fa-image"></i> عکس
                        <input type="file" id="postImageInput" accept="image/*" style="display:none;">
                    </label>
                    <label class="btn-secondary" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:99px;font-size:14px;">
                        <i class="fas fa-video"></i> ویدیو
                        <input type="file" id="postVideoInput" accept="video/*" style="display:none;">
                    </label>
                </div>
                <button class="btn-primary" onclick="createPost()"><i class="fas fa-paper-plane"></i> انتشار</button>
            </div>
            <div id="mediaPreview" style="display:none;margin-top:12px;position:relative;border-radius:var(--radius-sm);overflow:hidden;background:var(--bg-soft);">
                <button onclick="removeMedia()" style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.8);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer;">✕</button>
                <div id="mediaPreviewContent"></div>
            </div>
        </div>

        <div id="channelPosts"></div>
    </section>

    <!-- صفحه دستیار -->
    <section id="assistantPage" class="page">
        <h2 style="font-size:20px;margin-bottom:14px;"><i class="fas fa-robot"></i> دستیار من</h2>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px;margin-bottom:16px;">
            <div class="stat-chip" style="background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;"><b id="statPosts" style="font-size:20px;">۰</b><span style="font-size:11px;color:var(--text-3);">پست</span></div>
            <div class="stat-chip" style="background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;"><b id="statTrainings" style="font-size:20px;">۰</b><span style="font-size:11px;color:var(--text-3);">آموزش</span></div>
            <div class="stat-chip" style="background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;"><b id="statFollowers" style="font-size:20px;">۰</b><span style="font-size:11px;color:var(--text-3);">فالوور</span></div>
            <div class="stat-chip" style="background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;"><b id="statEngagement" style="font-size:20px;">۰٪</b><span style="font-size:11px;color:var(--text-3);">تعامل</span></div>
        </div>

        <div style="background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;">
            <h3 style="font-size:15px;margin-bottom:10px;">💬 امتحان کن</h3>
            <div id="assistantPreviewChat" style="max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;"></div>
            <div style="display:flex;gap:8px;">
                <input type="text" id="assistantPreviewInput" placeholder="یه چیزی بپرس..." style="flex:1;background:var(--bg-soft);border:2px solid var(--border);border-radius:99px;padding:12px 18px;color:var(--text);font-size:14px;outline:none;">
                <button class="btn-secondary" onclick="testAssistant()">پرسیدن</button>
            </div>
        </div>

        <div style="background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;">
            <h3 style="font-size:15px;margin-bottom:10px;">📝 سوال و جواب</h3>
            <div style="display:flex;flex-direction:column;gap:8px;">
                <input type="text" id="questionInput" placeholder="سوال..." style="background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:12px 16px;font-size:14px;outline:none;">
                <input type="text" id="answerInput" placeholder="جواب..." style="background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:12px 16px;font-size:14px;outline:none;">
                <button class="btn-primary" onclick="trainAssistant()">یاد بده!</button>
            </div>
            <div id="qaList" style="margin-top:10px;display:flex;flex-direction:column;gap:4px;max-height:150px;overflow-y:auto;"></div>
        </div>

        <div style="background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:16px;">
            <h3 style="font-size:15px;margin-bottom:10px;">🔑 کلمات کلیدی</h3>
            <div style="display:flex;flex-direction:column;gap:8px;">
                <input type="text" id="keywordInput" placeholder="کلمه کلیدی..." style="background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:12px 16px;font-size:14px;outline:none;">
                <input type="text" id="keywordResponseInput" placeholder="پاسخ..." style="background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:12px 16px;font-size:14px;outline:none;">
                <button class="btn-primary" onclick="trainKeyword()">ثبت کن</button>
            </div>
            <div id="keywordList" style="margin-top:10px;display:flex;flex-direction:column;gap:4px;max-height:150px;overflow-y:auto;"></div>
        </div>
    </section>

    <!-- صفحه چت -->
    <section id="chatPage" class="page">
        <h2 style="font-size:20px;margin-bottom:14px;"><i class="fas fa-envelope"></i> چت خصوصی</h2>
        <div class="chat-container">
            <div class="chat-list" id="chatList"></div>
            <div class="chat-window" id="chatWindow">
                <div class="chat-window-head">
                    <img id="chatWithAvatar" src="">
                    <strong id="chatWithName"></strong>
                    <button class="btn-ghost" onclick="closeChatWindow()" style="margin-inline-start:auto;font-size:20px;">✕</button>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="پیام...">
                    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </section>

    <!-- صفحه اکسپلور -->
    <section id="explorePage" class="page">
        <h2 style="font-size:20px;margin-bottom:14px;"><i class="fas fa-compass"></i> اکتشاف</h2>
        <div id="exploreContent" class="explore-grid"></div>
    </section>

    <!-- صفحه پروفایل عمومی -->
    <section id="profilePage" class="page">
        <button class="btn-ghost" onclick="backFromProfile()" style="font-size:14px;">← بازگشت</button>
        <div style="text-align:center;padding:16px 0;">
            <img id="viewAvatar" src="" style="width:100px;height:100px;border-radius:50%;border:4px solid var(--primary);">
            <h2 id="viewName" style="font-size:22px;margin-top:10px;"></h2>
            <p id="viewBio" style="color:var(--text-2);font-size:14px;"></p>
            <div style="display:flex;justify-content:center;gap:24px;margin:14px 0;">
                <div><b id="viewFollowers" style="font-size:18px;">۰</b><span style="font-size:12px;color:var(--text-3);display:block;">فالوور</span></div>
                <div><b id="viewPosts" style="font-size:18px;">۰</b><span style="font-size:12px;color:var(--text-3);display:block;">پست</span></div>
                <div><b id="viewScore" style="font-size:18px;">۰</b><span style="font-size:12px;color:var(--text-3);display:block;">امتیاز</span></div>
            </div>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
                <button class="btn-follow follow" id="viewFollowBtn" onclick="toggleFollowView()">فالو</button>
                <button class="btn-secondary" onclick="openChatFromProfile()"><i class="fas fa-comment"></i> پیام</button>
            </div>
        </div>

        <div style="background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;">
            <h3 style="font-size:14px;margin-bottom:10px;">🤖 از دستیار این کاربر بپرس</h3>
            <div id="viewAssistantChat" style="max-height:150px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;"></div>
            <div style="display:flex;gap:8px;">
                <input type="text" id="viewAssistantInput" placeholder="سوالت رو بپرس..." style="flex:1;background:var(--bg-soft);border:2px solid var(--border);border-radius:99px;padding:10px 16px;color:var(--text);font-size:14px;outline:none;">
                <button class="btn-secondary" onclick="askOtherAssistant()">پرسیدن</button>
            </div>
        </div>

        <div id="viewPostsContainer"></div>
    </section>

    <!-- صفحه پنل مدیریت -->
    <section id="adminPage" class="page">
        <div class="admin-panel">
            <h3>👑 پنل مدیریت</h3>
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="stats" onclick="switchAdminTab('stats')">📊 آمار</button>
                <button class="admin-tab" data-tab="broadcast" onclick="switchAdminTab('broadcast')">📢 ارسال همگانی</button>
                <button class="admin-tab" data-tab="users" onclick="switchAdminTab('users')">👥 کاربران</button>
                <button class="admin-tab" data-tab="posts" onclick="switchAdminTab('posts')">📝 پست‌ها</button>
                <button class="admin-tab" data-tab="channels" onclick="switchAdminTab('channels')">📢 کانال‌ها</button>
            </div>
            <div class="admin-content">
                <div id="adminStats" class="admin-tab-content active">
                    <div id="adminStatsContent"></div>
                </div>
                <div id="adminBroadcast" class="admin-tab-content">
                    <div class="broadcast-form">
                        <input type="text" id="broadcastTitle" placeholder="عنوان اعلان...">
                        <textarea id="broadcastMessage" placeholder="متن پیام..." rows="3"></textarea>
                        <button class="btn-primary" onclick="sendBroadcast()">ارسال به همه</button>
                    </div>
                </div>
                <div id="adminUsers" class="admin-tab-content">
                    <div id="adminUsersList"></div>
                </div>
                <div id="adminPosts" class="admin-tab-content">
                    <div id="adminPostsList"></div>
                </div>
                <div id="adminChannels" class="admin-tab-content">
                    <div id="adminChannelsList"></div>
                </div>
            </div>
        </div>
    </section>
</main>

<!-- مودال تمام صفحه برای عکس/ویدیو -->
<div class="fullscreen-modal" id="fullscreenModal" onclick="closeFullscreen()">
    <button class="close-fullscreen" onclick="closeFullscreen()">✕</button>
    <div id="fullscreenContent"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>
