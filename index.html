<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>یارِ من - پلتفرم هوشمند اجتماعی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ============================================
   تم حرفه‌ای - Dark Premium با دکمه‌های استخوانی
   ============================================ */
:root {
  /* تم اصلی - Dark Premium */
  --bg: #0a0b1a;
  --bg-soft: #111427;
  --bg-card: #161a33;
  --bg-card-hover: #1e2350;
  --border: #262d55;
  --border-light: #323b6e;
  
  --text: #eeeffb;
  --text-2: #a8b0d6;
  --text-3: #6b74a8;
  
  --primary: #7c6cf6;
  --primary-dark: #5b4fd6;
  --primary-light: #9a8cff;
  --primary-glow: rgba(124, 108, 246, 0.3);
  
  --secondary: #f6b93b;
  --secondary-dark: #d49a2a;
  
  --success: #4ade80;
  --danger: #f45b69;
  --warning: #fbbf24;
  --info: #60a5fa;
  
  --like: #ff5c8a;
  --like-glow: rgba(255, 92, 138, 0.3);
  
  --radius: 20px;
  --radius-sm: 14px;
  --radius-full: 99px;
  
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 60px rgba(124, 108, 246, 0.2);
  --shadow-glow-large: 0 0 80px rgba(124, 108, 246, 0.15);
  
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  
  --btn-size: 56px;
  --btn-icon-size: 24px;
  --btn-radius: 16px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Vazirmatn', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 90px;
  overflow-x: hidden;
  background-image: 
    radial-gradient(ellipse at 10% 0%, rgba(124, 108, 246, 0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 90% 100%, rgba(246, 185, 59, 0.05) 0%, transparent 50%);
}

/* ============================================
   اسکرول بار سفارشی
   ============================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-soft); }
::-webkit-scrollbar-thumb { 
  background: var(--primary);
  border-radius: 99px;
}
::-webkit-scrollbar-thumb:hover { background: var(--primary-dark); }

/* ============================================
   تایپوگرافی
   ============================================ */
h1, h2, h3, h4, h5, h6 {
  font-weight: 700;
  line-height: 1.3;
}

a { color: var(--primary); text-decoration: none; }

/* ============================================
   دکمه‌های بزرگ استخوانی
   ============================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 28px;
  border: none;
  border-radius: var(--btn-radius);
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  min-height: var(--btn-size);
  min-width: 56px;
  letter-spacing: 0.3px;
}

.btn:active {
  transform: scale(0.95);
}

.btn i {
  font-size: var(--btn-icon-size);
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  box-shadow: 0 4px 24px var(--primary-glow);
}
.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 40px var(--primary-glow);
}

.btn-secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 2px solid var(--border);
}
.btn-secondary:hover {
  background: var(--bg-card-hover);
  border-color: var(--primary);
  transform: translateY(-2px);
}

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  padding: 10px 18px;
  min-height: 44px;
}
.btn-ghost:hover {
  color: var(--text);
  background: var(--bg-soft);
}

.btn-danger {
  background: linear-gradient(135deg, var(--danger), #d94452);
  color: #fff;
  box-shadow: 0 4px 20px rgba(244, 91, 105, 0.25);
}
.btn-danger:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(244, 91, 105, 0.35);
}

.btn-success {
  background: linear-gradient(135deg, var(--success), #22c55e);
  color: #0a0b1a;
  box-shadow: 0 4px 20px rgba(74, 222, 128, 0.25);
}
.btn-success:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(74, 222, 128, 0.35);
}

.btn-like {
  background: transparent;
  color: var(--text-2);
  border: 2px solid var(--border);
  padding: 12px 20px;
  min-height: 52px;
  min-width: 52px;
  border-radius: var(--btn-radius);
  font-size: 14px;
  font-weight: 600;
  transition: var(--transition);
}
.btn-like:hover {
  border-color: var(--like);
  color: var(--like);
  transform: translateY(-2px);
}
.btn-like.liked {
  background: var(--like);
  border-color: var(--like);
  color: #fff;
  box-shadow: 0 4px 24px var(--like-glow);
}
.btn-like.liked i {
  animation: likePulse 0.4s ease;
}

.btn-comment {
  background: transparent;
  color: var(--text-2);
  border: 2px solid var(--border);
  padding: 12px 20px;
  min-height: 52px;
  min-width: 52px;
  border-radius: var(--btn-radius);
  font-size: 14px;
  font-weight: 600;
  transition: var(--transition);
}
.btn-comment:hover {
  border-color: var(--info);
  color: var(--info);
  transform: translateY(-2px);
}

.btn-share {
  background: transparent;
  color: var(--text-2);
  border: 2px solid var(--border);
  padding: 12px 20px;
  min-height: 52px;
  min-width: 52px;
  border-radius: var(--btn-radius);
  font-size: 14px;
  font-weight: 600;
  transition: var(--transition);
}
.btn-share:hover {
  border-color: var(--secondary);
  color: var(--secondary);
  transform: translateY(-2px);
}

.btn-action-group {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}

@keyframes likePulse {
  0% { transform: scale(1); }
  40% { transform: scale(1.5); }
  100% { transform: scale(1); }
}

/* ============================================
   هدر
   ============================================ */
.main-header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  background: rgba(10, 11, 26, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.profile-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  background: none;
  border: none;
  color: var(--text);
  padding: 0;
  min-width: 70px;
  transition: var(--transition);
}
.profile-btn:hover { opacity: 0.8; }
.profile-btn img {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  background: var(--bg-card);
  transition: var(--transition);
}
.profile-btn img:hover { border-color: var(--primary-light); }
.profile-btn span {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 90px;
}

.header-center {
  flex: 1;
  max-width: 480px;
  min-width: 0;
}
.search-box {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: var(--radius-full);
  padding: 8px 18px;
  transition: var(--transition);
}
.search-box:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 30px var(--primary-glow);
}
.search-box i {
  color: var(--text-3);
  font-size: 16px;
}
.search-box input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  width: 100%;
  font-size: 14px;
  padding: 6px 0;
}
.search-box input::placeholder {
  color: var(--text-3);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-score {
  font-size: 13px;
  background: var(--bg-card);
  border: 2px solid var(--border);
  padding: 6px 16px;
  border-radius: var(--radius-full);
  white-space: nowrap;
  color: var(--secondary);
  font-weight: 700;
}
.admin-btn {
  background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
  color: #0a0b1a;
  border: none;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  font-size: 18px;
  display: none;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}
.admin-btn.show { display: flex; }
.admin-btn:hover { transform: scale(1.08); }
.admin-btn:active { transform: scale(0.9); }

/* ============================================
   ناوبری پایین
   ============================================ */
.main-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  background: rgba(17, 20, 39, 0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 6px 8px calc(env(safe-area-inset-bottom) + 6px);
  gap: 4px;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--text-3);
  padding: 8px 4px;
  border-radius: 14px;
  font-size: 10px;
  transition: var(--transition);
  position: relative;
  min-height: 52px;
}
.nav-btn i {
  font-size: 24px;
  transition: var(--transition);
}
.nav-btn span {
  font-size: 10px;
  font-weight: 600;
}
.nav-btn.active {
  color: var(--primary);
}
.nav-btn.active i {
  transform: translateY(-3px);
  text-shadow: 0 0 30px var(--primary-glow);
}
.nav-btn:active { transform: scale(0.92); }
.nav-btn .badge {
  position: absolute;
  top: 2px;
  right: 50%;
  transform: translateX(50%);
  background: var(--danger);
  color: #fff;
  font-size: 9px;
  padding: 1px 8px;
  border-radius: var(--radius-full);
  min-width: 18px;
  text-align: center;
  font-weight: 700;
}

/* ============================================
   صفحات
   ============================================ */
main {
  max-width: 820px;
  margin: 0 auto;
  padding: 14px 18px;
}

.page {
  display: none;
  animation: fadeSlideIn 0.4s ease;
}
.page.active { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.page-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.page-title i { color: var(--primary); }

/* ============================================
   کانال
   ============================================ */
.channel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 10px;
}
.channel-header h2 {
  font-size: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.followers-count {
  font-size: 13px;
  color: var(--text-2);
  background: var(--bg-soft);
  padding: 6px 16px;
  border-radius: var(--radius-full);
  border: 2px solid var(--border);
  font-weight: 600;
}

.boost-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  padding: 4px 14px;
  border-radius: var(--radius-full);
  font-weight: 700;
  text-transform: uppercase;
}
.boost-normal { 
  background: var(--bg-soft); 
  color: var(--text-3);
  border: 2px solid var(--border);
}
.boost-high { 
  background: rgba(96, 165, 250, 0.2); 
  color: var(--info);
  border: 2px solid var(--info);
}
.boost-viral { 
  background: rgba(244, 91, 105, 0.2); 
  color: var(--danger);
  border: 2px solid var(--danger);
}
.boost-superstar { 
  background: linear-gradient(135deg, var(--secondary), var(--like));
  color: #0a0b1a;
  border: none;
}

/* کامپوزر پست */
.composer {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 20px;
  transition: var(--transition);
}
.composer:focus-within {
  border-color: var(--primary);
  box-shadow: var(--shadow-glow);
}
.composer textarea {
  width: 100%;
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 14px 16px;
  resize: vertical;
  min-height: 70px;
  font-size: 15px;
  transition: var(--transition);
  font-family: inherit;
}
.composer textarea:focus {
  border-color: var(--primary);
  outline: none;
}
.composer-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  flex-wrap: wrap;
  gap: 10px;
}
.composer-actions .media-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.composer-actions .media-buttons label {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: var(--radius-full);
  font-size: 13px;
  color: var(--text-2);
  cursor: pointer;
  transition: var(--transition);
  font-weight: 600;
}
.composer-actions .media-buttons label:hover {
  border-color: var(--primary);
  color: var(--text);
  transform: translateY(-2px);
}
.composer-actions .media-buttons label i {
  font-size: 16px;
}
.composer-actions .media-buttons input { display: none; }

.media-preview {
  width: 100%;
  margin-top: 12px;
  border-radius: var(--radius-sm);
  position: relative;
  background: var(--bg-soft);
  overflow: hidden;
}
.media-preview img,
.media-preview video {
  width: 100%;
  max-height: 350px;
  display: block;
  border-radius: var(--radius-sm);
}
.media-preview .remove-media {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0, 0, 0, 0.8);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  font-size: 16px;
  cursor: pointer;
  transition: var(--transition);
}
.media-preview .remove-media:hover { transform: scale(1.1); }

/* کارت پست */
.posts-container {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.post-card {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  transition: var(--transition);
}
.post-card:hover {
  border-color: var(--border-light);
  box-shadow: var(--shadow-glow-large);
}

.post-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  cursor: pointer;
}
.post-head img {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg-soft);
  transition: var(--transition);
}
.post-head img:hover { border-color: var(--primary); }
.post-head .name {
  font-size: 15px;
  font-weight: 700;
}
.post-head .name .verified {
  color: var(--info);
  font-size: 13px;
}
.post-head .time {
  font-size: 12px;
  color: var(--text-3);
  margin-inline-start: auto;
}

.post-card .content {
  font-size: 16px;
  line-height: 2;
  white-space: pre-wrap;
  margin-bottom: 12px;
}

.post-card .media-wrapper {
  width: 100%;
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 12px;
  background: var(--bg-soft);
}
.post-card .media-wrapper img,
.post-card .media-wrapper video {
  width: 100%;
  max-height: 550px;
  display: block;
  object-fit: cover;
}

/* دکمه‌های اکشن بزرگ استخوانی */
.post-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  border-top: 2px solid var(--border);
  padding-top: 14px;
  margin-top: 4px;
}

.post-actions .btn-like,
.post-actions .btn-comment,
.post-actions .btn-share {
  flex: 1;
  min-width: 80px;
  justify-content: center;
}

.post-actions .btn-like i,
.post-actions .btn-comment i,
.post-actions .btn-share i {
  font-size: var(--btn-icon-size);
}

.post-actions .btn-like .count,
.post-actions .btn-comment .count,
.post-actions .btn-share .count {
  margin-right: 6px;
  font-size: 14px;
}

.comments-box {
  margin-top: 14px;
  border-top: 2px solid var(--border);
  padding-top: 14px;
  display: none;
}
.comments-box.open { display: block; }

.comment-item {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 13.5px;
  align-items: flex-start;
}
.comment-item img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
}
.comment-item b { color: var(--text); }
.comment-item .comment-text { color: var(--text-2); }

.comment-form {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.comment-form input {
  flex: 1;
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: var(--radius-full);
  padding: 10px 18px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: var(--transition);
}
.comment-form input:focus { border-color: var(--primary); }
.comment-form button {
  padding: 10px 24px;
  border-radius: var(--radius-full);
  font-size: 13px;
  min-height: 48px;
}

/* ============================================
   اکسپلور - تمام صفحه با کیفیت بالا
   ============================================ */
.explore-grid {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.explore-user-card {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: var(--transition);
}
.explore-user-card:hover {
  border-color: var(--border-light);
  box-shadow: var(--shadow-glow-large);
}

.explore-user-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}
.explore-user-header img {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 3px solid var(--primary);
  cursor: pointer;
  transition: var(--transition);
}
.explore-user-header img:hover { transform: scale(1.05); }
.explore-user-header .info {
  flex: 1;
  cursor: pointer;
}
.explore-user-header .info h4 {
  font-size: 17px;
  font-weight: 700;
}
.explore-user-header .info .meta {
  font-size: 12px;
  color: var(--text-2);
}
.explore-user-header .follow-btn {
  padding: 8px 24px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 700;
  border: none;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  transition: var(--transition);
  min-height: 44px;
}
.explore-user-header .follow-btn:hover { transform: scale(1.05); }
.explore-user-header .follow-btn:active { transform: scale(0.95); }
.explore-user-header .follow-btn.following {
  background: var(--bg-soft);
  border: 2px solid var(--border);
  color: var(--text-2);
}

/* پست‌های اکسپلور - تمام صفحه بزرگ */
.explore-posts {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
  margin-top: 4px;
}

.explore-post-full {
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
  padding: 16px;
}
.explore-post-full:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-glow);
}

.explore-post-full .post-content {
  font-size: 16px;
  line-height: 2;
  white-space: pre-wrap;
  margin-bottom: 12px;
  padding: 0 4px;
}

.explore-post-full .post-media {
  width: 100%;
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 14px;
  background: var(--bg-card);
}
.explore-post-full .post-media img,
.explore-post-full .post-media video {
  width: 100%;
  max-height: 650px;
  display: block;
  object-fit: cover;
}

.explore-post-full .post-stats-mini {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-3);
  padding: 8px 0;
}
.explore-post-full .post-stats-mini i {
  margin-left: 4px;
}

/* دکمه‌های اکشن در اکسپلور - بزرگتر */
.explore-post-full .post-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  border-top: 2px solid var(--border);
  padding-top: 16px;
  margin-top: 6px;
}

.explore-post-full .post-actions .btn-like,
.explore-post-full .post-actions .btn-comment,
.explore-post-full .post-actions .btn-share {
  flex: 1;
  min-width: 100px;
  min-height: 56px;
  padding: 14px 24px;
  justify-content: center;
  font-size: 15px;
}

.explore-post-full .post-actions .btn-like i,
.explore-post-full .post-actions .btn-comment i,
.explore-post-full .post-actions .btn-share i {
  font-size: 26px;
}

/* ============================================
   سایر بخش‌ها
   ============================================ */
/* دستیار، چت، پروفایل، مدیریت - با دکمه‌های بزرگ */
.assistant-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 10px;
  margin-bottom: 18px;
}
.stat-chip {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
  transition: var(--transition);
}
.stat-chip:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
}
.stat-chip b {
  display: block;
  font-size: 22px;
  color: var(--text);
  margin-bottom: 4px;
}
.stat-chip span {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 600;
}

.training-section {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
}
.training-section h3 {
  font-size: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.train-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.train-form input,
.train-form textarea {
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 12px 16px;
  font-size: 14px;
  outline: none;
  transition: var(--transition);
  font-family: inherit;
}
.train-form input:focus,
.train-form textarea:focus {
  border-color: var(--primary);
}

.assistant-chat-preview {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
}
.assistant-chat-preview .mini-chat {
  max-height: 200px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}
.mini-msg {
  padding: 10px 18px;
  border-radius: 16px;
  font-size: 13px;
  max-width: 85%;
  word-wrap: break-word;
}
.mini-msg.me {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  border-bottom-right-radius: 4px;
}
.mini-msg.bot {
  align-self: flex-start;
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-bottom-left-radius: 4px;
}

/* دکمه‌های بزرگ در همه جا */
.btn-large {
  padding: 16px 32px;
  font-size: 16px;
  min-height: 60px;
}

/* ریسپانسیو */
@media (max-width: 600px) {
  :root {
    --btn-size: 48px;
    --btn-icon-size: 20px;
  }
  
  .main-header { padding: 10px 12px; }
  .profile-btn span { max-width: 60px; font-size: 12px; }
  .profile-btn img { width: 36px; height: 36px; }
  .user-score { font-size: 11px; padding: 4px 12px; }
  .search-box { padding: 6px 14px; }
  .search-box input { font-size: 12px; }
  .admin-btn { width: 38px; height: 38px; font-size: 15px; }
  
  .page-title { font-size: 20px; }
  .explore-user-header img { width: 44px; height: 44px; }
  .explore-user-header .info h4 { font-size: 15px; }
  
  .post-card { padding: 14px; }
  .post-card .content { font-size: 14px; }
  .post-head img { width: 36px; height: 36px; }
  
  .post-actions .btn-like,
  .post-actions .btn-comment,
  .post-actions .btn-share {
    min-width: 60px;
    min-height: 44px;
    padding: 10px 14px;
    font-size: 12px;
  }
  .post-actions .btn-like i,
  .post-actions .btn-comment i,
  .post-actions .btn-share i {
    font-size: 18px;
  }
  
  .explore-post-full .post-actions .btn-like,
  .explore-post-full .post-actions .btn-comment,
  .explore-post-full .post-actions .btn-share {
    min-width: 70px;
    min-height: 48px;
    padding: 12px 16px;
    font-size: 13px;
  }
  .explore-post-full .post-actions .btn-like i,
  .explore-post-full .post-actions .btn-comment i,
  .explore-post-full .post-actions .btn-share i {
    font-size: 20px;
  }
  
  .assistant-stats { grid-template-columns: repeat(2, 1fr); }
  .stat-chip b { font-size: 18px; }
  
  .btn { padding: 12px 20px; font-size: 13px; min-height: 48px; }
  .btn i { font-size: 18px; }
  
  .explore-post-full .post-content { font-size: 14px; }
  .explore-post-full .post-media img,
  .explore-post-full .post-media video { max-height: 400px; }
}

@media (max-width: 400px) {
  .nav-btn i { font-size: 20px; }
  .nav-btn { font-size: 9px; padding: 4px 2px; min-height: 44px; }
  .main-nav { padding: 4px 4px calc(env(safe-area-inset-bottom) + 4px); }
  
  .post-actions { gap: 6px; }
  .post-actions .btn-like,
  .post-actions .btn-comment,
  .post-actions .btn-share {
    min-width: 50px;
    min-height: 38px;
    padding: 8px 10px;
    font-size: 11px;
  }
  .post-actions .btn-like i,
  .post-actions .btn-comment i,
  .post-actions .btn-share i {
    font-size: 15px;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!-- هدر -->
<!-- ============================================ -->
<header class="main-header">
    <button id="profileBtn" class="profile-btn">
        <img src="" alt="پروفایل" id="avatarImg">
        <span id="userName">کاربر</span>
    </button>
    <div class="header-center">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="جستجوی کاربر یا کانال...">
        </div>
    </div>
    <div class="header-right">
        <span class="user-score" id="userScore">🏆 ۰</span>
        <button class="admin-btn" id="adminBtn" onclick="toggleAdminPanel()">
            <i class="fas fa-crown"></i>
        </button>
    </div>
</header>

<!-- ============================================ -->
<!-- ناوبری پایین -->
<!-- ============================================ -->
<nav class="main-nav">
    <button class="nav-btn active" data-page="channel">
        <i class="fas fa-bullhorn"></i>
        <span>کانال</span>
    </button>
    <button class="nav-btn" data-page="assistant">
        <i class="fas fa-robot"></i>
        <span>دستیار</span>
    </button>
    <button class="nav-btn" data-page="chat">
        <i class="fas fa-envelope"></i>
        <span>چت</span>
        <span class="badge" id="chatBadge" style="display:none;">0</span>
    </button>
    <button class="nav-btn" data-page="explore">
        <i class="fas fa-compass"></i>
        <span>اکسپلور</span>
    </button>
</nav>

<!-- ============================================ -->
<!-- محتوای اصلی -->
<!-- ============================================ -->
<main id="mainContent">

    <!-- ===== صفحه کانال ===== -->
    <section id="channelPage" class="page active">
        <div class="channel-header">
            <h2>
                📢 کانال من
                <span id="boostBadge" class="boost-badge boost-normal">عادی</span>
            </h2>
            <span class="followers-count" id="followersCount">۰ فالوور</span>
        </div>

        <div class="composer">
            <textarea id="postContent" placeholder="چه خبر؟ یه پست جدید بنویس..." rows="2"></textarea>
            <div class="composer-actions">
                <div class="media-buttons">
                    <label>
                        <i class="fas fa-image"></i> عکس
                        <input type="file" id="postImageInput" accept="image/*">
                    </label>
                    <label>
                        <i class="fas fa-video"></i> ویدیو
                        <input type="file" id="postVideoInput" accept="video/*">
                    </label>
                </div>
                <button class="btn-primary" id="publishPostBtn" onclick="createPost()">
                    <i class="fas fa-paper-plane"></i> انتشار
                </button>
            </div>
            <div id="mediaPreview" class="media-preview" style="display:none;">
                <button class="remove-media" onclick="removeMedia()">✕</button>
                <div id="mediaPreviewContent"></div>
            </div>
        </div>

        <div id="channelPosts" class="posts-container"></div>
    </section>

    <!-- ===== صفحه دستیار ===== -->
    <section id="assistantPage" class="page">
        <h2 class="page-title"><i class="fas fa-robot"></i> دستیار من</h2>
        
        <div class="assistant-stats">
            <div class="stat-chip"><b id="statPosts">۰</b><span>پست</span></div>
            <div class="stat-chip"><b id="statTrainings">۰</b><span>آموزش</span></div>
            <div class="stat-chip"><b id="statFollowers">۰</b><span>فالوور</span></div>
            <div class="stat-chip"><b id="statEngagement">۰٪</b><span>تعامل</span></div>
        </div>

        <div class="assistant-chat-preview">
            <h3 style="font-size:15px;margin-bottom:10px;">💬 امتحان کن</h3>
            <div class="mini-chat" id="assistantPreviewChat"></div>
            <div class="mini-chat-input" style="display:flex;gap:10px;">
                <input type="text" id="assistantPreviewInput" placeholder="یه چیزی بپرس..." style="flex:1;background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-full);padding:12px 18px;color:var(--text);outline:none;font-size:14px;">
                <button class="btn-secondary" onclick="testAssistant()" style="min-height:48px;padding:12px 24px;">پرسیدن</button>
            </div>
        </div>

        <div class="training-section">
            <h3>📝 سوال و جواب</h3>
            <div class="train-form">
                <input type="text" id="questionInput" placeholder="سوال...">
                <input type="text" id="answerInput" placeholder="جواب...">
                <button class="btn-primary" onclick="trainAssistant()">یاد بده!</button>
            </div>
            <div id="qaList" class="qa-list"></div>
        </div>

        <div class="training-section">
            <h3>🔑 کلمات کلیدی</h3>
            <div class="train-form">
                <input type="text" id="keywordInput" placeholder="کلمه کلیدی...">
                <input type="text" id="keywordResponseInput" placeholder="پاسخ...">
                <button class="btn-primary" onclick="trainKeyword()">ثبت کن</button>
            </div>
            <div id="keywordList" class="keyword-list"></div>
        </div>

        <div class="auto-post-section" style="background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:18px;">
            <h3 style="font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px;">📅 زمان‌بندی پست‌ها</h3>
            <button class="btn-secondary" onclick="toggleAutoPost()" style="min-height:48px;padding:12px 24px;">مدیریت زمان‌بندی</button>
            <div id="autoPostPanel" style="display:none;flex-direction:column;gap:10px;margin-top:12px;">
                <input type="number" id="postCount" placeholder="تعداد پست‌ها..." min="1" max="30" style="background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);outline:none;font-size:14px;">
                <textarea id="postDescriptions" placeholder="توضیحات هر پست (یک در هر خط)..." rows="3" style="background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);outline:none;font-size:14px;font-family:inherit;"></textarea>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <input type="time" id="postTime" value="09:00" style="flex:1;background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);outline:none;font-size:14px;min-width:80px;">
                    <input type="number" id="postInterval" placeholder="فاصله (روز)" min="1" value="1" style="flex:1;background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);outline:none;font-size:14px;min-width:80px;">
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <label class="btn-ghost" style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:10px 18px;border:2px solid var(--border);border-radius:var(--radius-full);font-size:13px;">
                        <i class="fas fa-image"></i> عکس‌ها
                        <input type="file" id="scheduleImages" accept="image/*" multiple style="display:none;">
                    </label>
                    <label class="btn-ghost" style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:10px 18px;border:2px solid var(--border);border-radius:var(--radius-full);font-size:13px;">
                        <i class="fas fa-video"></i> ویدیوها
                        <input type="file" id="scheduleVideos" accept="video/*" multiple style="display:none;">
                    </label>
                </div>
                <button class="btn-primary" onclick="schedulePosts()">زمان‌بندی کن</button>
            </div>
            <div id="scheduledPostsList" style="margin-top:10px;"></div>
        </div>
    </section>

    <!-- ===== صفحه چت ===== -->
    <section id="chatPage" class="page">
        <h2 class="page-title"><i class="fas fa-envelope"></i> چت خصوصی</h2>
        <div class="chat-container" style="display:flex;flex-direction:column;gap:12px;height:calc(100vh - 200px);">
            <div class="chat-list" id="chatList" style="display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;"></div>
            <div class="chat-window" id="chatWindow" style="display:none;flex-direction:column;background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;height:100%;">
                <div class="chat-window-head" style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:2px solid var(--border);flex-shrink:0;">
                    <img id="chatWithAvatar" src="" style="width:40px;height:40px;border-radius:50%;">
                    <strong id="chatWithName" style="font-size:15px;"></strong>
                    <button class="btn-ghost" onclick="closeChatWindow()" style="margin-inline-start:auto;font-size:20px;padding:4px 10px;">✕</button>
                </div>
                <div class="chat-messages" id="chatMessages" style="flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px;background:var(--bg-soft);"></div>
                <div class="chat-input" style="display:flex;gap:10px;padding:12px 16px;border-top:2px solid var(--border);flex-shrink:0;background:var(--bg-card);">
                    <input type="text" id="messageInput" placeholder="پیام..." style="flex:1;background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-full);padding:12px 18px;color:var(--text);outline:none;font-size:14px;">
                    <button onclick="sendMessage()" style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;font-size:18px;transition:var(--transition);">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== صفحه اکسپلور ===== -->
    <section id="explorePage" class="page">
        <h2 class="page-title"><i class="fas fa-compass"></i> اکتشاف</h2>
        <div id="exploreContent" class="explore-grid"></div>
    </section>

    <!-- ===== صفحه پروفایل عمومی ===== -->
    <section id="profilePage" class="page">
        <button class="btn-ghost" onclick="backFromProfile()" style="font-size:14px;padding:8px 16px;">← بازگشت</button>
        <div class="profile-header" style="text-align:center;margin:16px 0;">
            <img id="viewAvatar" src="" style="width:88px;height:88px;border-radius:50%;border:3px solid var(--primary);transition:var(--transition);">
            <h2 id="viewName" style="font-size:20px;margin-top:10px;"></h2>
            <p class="bio" id="viewBio" style="color:var(--text-2);font-size:14px;margin-top:4px;"></p>
            <div class="profile-stats" style="display:flex;justify-content:center;gap:24px;margin:14px 0;">
                <div style="text-align:center;"><b id="viewFollowers" style="display:block;font-size:18px;">۰</b><span style="font-size:12px;color:var(--text-3);">فالوور</span></div>
                <div style="text-align:center;"><b id="viewPosts" style="display:block;font-size:18px;">۰</b><span style="font-size:12px;color:var(--text-3);">پست</span></div>
                <div style="text-align:center;"><b id="viewScore" style="display:block;font-size:18px;">۰</b><span style="font-size:12px;color:var(--text-3);">امتیاز</span></div>
            </div>
            <div class="profile-actions" style="display:flex;gap:12px;justify-content:center;margin-top:12px;flex-wrap:wrap;">
                <button class="btn-primary" id="viewFollowBtn" onclick="toggleFollowView()" style="min-height:48px;padding:12px 28px;">فالو</button>
                <button class="btn-secondary" onclick="openChatFromProfile()" style="min-height:48px;padding:12px 28px;">پیام</button>
            </div>
        </div>

        <div class="assistant-chat-preview" style="background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;">
            <h3 style="font-size:15px;margin-bottom:10px;">🤖 از دستیار این کاربر بپرس</h3>
            <div class="mini-chat" id="viewAssistantChat" style="max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;"></div>
            <div class="mini-chat-input" style="display:flex;gap:10px;">
                <input type="text" id="viewAssistantInput" placeholder="سوالت رو بپرس..." style="flex:1;background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-full);padding:12px 18px;color:var(--text);outline:none;font-size:14px;">
                <button class="btn-secondary" onclick="askOtherAssistant()" style="min-height:48px;padding:12px 24px;">پرسیدن</button>
            </div>
        </div>

        <div id="viewPostsContainer" class="posts-container"></div>
    </section>

    <!-- ===== صفحه پنل مدیریت ===== -->
    <section id="adminPage" class="page">
        <div class="admin-panel" style="background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;">
            <h3 style="font-size:18px;margin-bottom:14px;color:var(--secondary);display:flex;align-items:center;gap:10px;">👑 پنل مدیریت</h3>
            <div class="admin-tabs" style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
                <button class="admin-tab active" data-tab="stats" onclick="switchAdminTab('stats')" style="padding:8px 20px;border-radius:var(--radius-full);border:2px solid var(--border);background:var(--bg-soft);color:var(--text-2);font-size:12px;transition:var(--transition);cursor:pointer;font-weight:600;">📊 آمار</button>
                <button class="admin-tab" data-tab="broadcast" onclick="switchAdminTab('broadcast')" style="padding:8px 20px;border-radius:var(--radius-full);border:2px solid var(--border);background:var(--bg-soft);color:var(--text-2);font-size:12px;transition:var(--transition);cursor:pointer;font-weight:600;">📢 ارسال همگانی</button>
                <button class="admin-tab" data-tab="users" onclick="switchAdminTab('users')" style="padding:8px 20px;border-radius:var(--radius-full);border:2px solid var(--border);background:var(--bg-soft);color:var(--text-2);font-size:12px;transition:var(--transition);cursor:pointer;font-weight:600;">👥 کاربران</button>
                <button class="admin-tab" data-tab="posts" onclick="switchAdminTab('posts')" style="padding:8px 20px;border-radius:var(--radius-full);border:2px solid var(--border);background:var(--bg-soft);color:var(--text-2);font-size:12px;transition:var(--transition);cursor:pointer;font-weight:600;">📝 پست‌ها</button>
                <button class="admin-tab" data-tab="channels" onclick="switchAdminTab('channels')" style="padding:8px 20px;border-radius:var(--radius-full);border:2px solid var(--border);background:var(--bg-soft);color:var(--text-2);font-size:12px;transition:var(--transition);cursor:pointer;font-weight:600;">📢 کانال‌ها</button>
            </div>
            <div class="admin-content" style="max-height:500px;overflow-y:auto;">
                <div id="adminStats" class="admin-tab-content active" style="display:block;"></div>
                <div id="adminBroadcast" class="admin-tab-content" style="display:none;">
                    <div class="broadcast-form" style="display:flex;flex-direction:column;gap:10px;">
                        <input type="text" id="broadcastTitle" placeholder="عنوان اعلان..." style="background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);outline:none;font-size:14px;">
                        <textarea id="broadcastMessage" placeholder="متن پیام..." rows="3" style="background:var(--bg-soft);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);outline:none;font-size:14px;font-family:inherit;"></textarea>
                        <button class="btn-primary" onclick="sendBroadcast()" style="min-height:52px;padding:14px 28px;">ارسال به همه</button>
                    </div>
                </div>
                <div id="adminUsers" class="admin-tab-content" style="display:none;"></div>
                <div id="adminPosts" class="admin-tab-content" style="display:none;"></div>
                <div id="adminChannels" class="admin-tab-content" style="display:none;"></div>
            </div>
        </div>
    </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>
