<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>اینستاگرام حرفه‌ای - نسخه مقیاس‌پذیر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet" />
    
    <style>
        /* ============================================================
           همه استایل‌ها - طراحی حرفه‌ای اینستاگرام
           ============================================================ */
        
        /* ----- متغیرها و ریست ----- */
        :root {
            --primary: #0095f6;
            --secondary: #d62976;
            --dark: #262626;
            --light: #fafafa;
            --gray: #8e8e8e;
            --border: #dbdbdb;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background: var(--light);
            padding-top: 70px;
            direction: rtl;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--light);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--secondary);
            border-radius: 10px;
        }

        /* ----- نوار ناوبری ----- */
        .navbar {
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            height: 64px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-left .logo {
            font-size: 32px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text {
            font-weight: 900;
            font-size: 24px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .search-box {
            padding: 8px 20px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--light);
            width: 280px;
            outline: none;
            font-size: 14px;
            transition: var(--transition);
        }

        .search-box:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(0,149,246,0.1);
            width: 320px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-right .nav-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 50%;
            font-size: 24px;
            color: var(--dark);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .nav-right .nav-btn:hover {
            background: rgba(0,0,0,0.05);
            transform: scale(1.05);
        }

        .nav-btn .badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--secondary);
            color: white;
            font-size: 10px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--secondary);
            cursor: pointer;
            object-fit: cover;
            transition: var(--transition);
        }

        .user-avatar:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        /* ----- استوری‌ها ----- */
        .stories-wrapper {
            max-width: 1000px;
            margin: 0 auto 20px;
            padding: 0 16px;
        }

        .stories {
            background: white;
            padding: 16px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            gap: 20px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            box-shadow: var(--shadow);
        }

        .stories::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: var(--transition);
            min-width: 74px;
        }

        .story-item:hover {
            transform: translateY(-2px);
        }

        .story-item .story-ring {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .story-item .story-ring.add-story {
            background: var(--border);
        }

        .story-item img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
            background: white;
        }

        .story-item .story-username {
            font-size: 11px;
            color: var(--gray);
            max-width: 68px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ----- گرید اکسپلور ----- */
        .explore-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .explore-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .explore-grid .post-item {
            position: relative;
            aspect-ratio: 1;
            cursor: pointer;
            overflow: hidden;
            background: #f0f0f0;
        }

        .explore-grid .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .explore-grid .post-item:hover img {
            transform: scale(1.03);
        }

        .explore-grid .post-item .post-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.35);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            opacity: 0;
            transition: var(--transition);
            color: white;
            backdrop-filter: blur(2px);
        }

        .explore-grid .post-item:hover .post-overlay {
            opacity: 1;
        }

        .post-overlay span {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* ----- مودال پست (تمام صفحه) ----- */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.25s ease;
            backdrop-filter: blur(4px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content {
            background: white;
            width: 95%;
            max-width: 1100px;
            max-height: 92vh;
            border-radius: var(--radius);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .close-modal {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 32px;
            color: white;
            cursor: pointer;
            z-index: 3000;
            background: rgba(0,0,0,0.6);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            border: none;
        }

        .close-modal:hover {
            background: rgba(0,0,0,0.9);
            transform: rotate(90deg);
        }

        .modal-body {
            display: flex;
            height: 100%;
            max-height: 85vh;
        }

        .modal-body .post-image {
            width: 58%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .modal-body .post-image img {
            width: 100%;
            height: 100%;
            max-height: 85vh;
            object-fit: contain;
        }

        .modal-details {
            width: 42%;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            background: white;
        }

        .modal-details .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .post-header img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--secondary);
        }

        .post-header .username {
            font-weight: 700;
            font-size: 16px;
            color: var(--dark);
        }

        .post-header .post-time {
            font-size: 12px;
            color: var(--gray);
            margin-right: auto;
        }

        .post-header .follow-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
        }

        .follow-btn:hover {
            background: #0077cc;
            transform: scale(1.02);
        }

        .follow-btn.following {
            background: var(--border);
            color: var(--dark);
        }

        .post-caption {
            font-size: 15px;
            line-height: 1.7;
            color: var(--dark);
            padding: 4px 0;
        }

        .post-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .post-actions button {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--dark);
            padding: 4px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .post-actions button:hover {
            transform: scale(1.15);
            color: var(--secondary);
        }

        .post-actions button.liked {
            color: var(--secondary);
        }

        .post-actions .counts {
            font-size: 14px;
            color: var(--gray);
            font-weight: 500;
        }

        .post-actions .share-btn {
            margin-right: auto;
        }

        /* ----- کامنت‌ها ----- */
        .comments-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
            max-height: 200px;
        }

        .comment-item {
            padding: 6px 0;
            font-size: 14px;
            line-height: 1.6;
            border-bottom: 1px solid #f5f5f5;
        }

        .comment-item strong {
            color: var(--dark);
            margin-left: 8px;
        }

        .comment-item .comment-time {
            font-size: 11px;
            color: var(--gray);
            margin-right: 8px;
        }

        .comment-input-area {
            display: flex;
            gap: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .comment-input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 24px;
            outline: none;
            font-size: 14px;
            transition: var(--transition);
            background: var(--light);
        }

        .comment-input-area input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(0,149,246,0.1);
        }

        .comment-input-area button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .comment-input-area button:hover {
            background: #0077cc;
            transform: scale(1.02);
        }

        /* ----- مودال آپلود ----- */
        .upload-modal {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .upload-modal-content {
            background: white;
            padding: 40px;
            border-radius: var(--radius);
            max-width: 500px;
            width: 92%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .upload-modal-content h2 {
            text-align: center;
            margin-bottom: 24px;
            color: var(--dark);
        }

        .upload-modal-content .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 16px;
        }

        .upload-modal-content .drop-zone:hover {
            border-color: var(--primary);
            background: rgba(0,149,246,0.05);
        }

        .upload-modal-content .drop-zone i {
            font-size: 48px;
            color: var(--gray);
            margin-bottom: 12px;
            display: block;
        }

        .upload-modal-content input[type="file"] {
            display: none;
        }

        .upload-modal-content textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            resize: vertical;
            min-height: 80px;
            font-size: 14px;
            margin: 8px 0;
            font-family: inherit;
        }

        .upload-modal-content .upload-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .upload-modal-content .upload-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .upload-modal-content .upload-actions .submit-btn {
            background: var(--primary);
            color: white;
        }

        .upload-modal-content .upload-actions .submit-btn:hover {
            background: #0077cc;
        }

        .upload-modal-content .upload-actions .cancel-btn {
            background: var(--border);
            color: var(--dark);
        }

        .upload-modal-content .upload-actions .cancel-btn:hover {
            background: #c0c0c0;
        }

        /* ----- مودال چت ----- */
        .chat-modal {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .chat-modal-content {
            background: white;
            border-radius: var(--radius);
            width: 92%;
            max-width: 800px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header .chat-title {
            font-weight: 700;
            font-size: 18px;
        }

        .chat-header .close-chat {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--gray);
            transition: var(--transition);
        }

        .chat-header .close-chat:hover {
            color: var(--dark);
            transform: rotate(90deg);
        }

        .chat-messages {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            min-height: 300px;
            max-height: 500px;
            background: var(--light);
        }

        .chat-message {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        .chat-message.sent {
            align-items: flex-end;
        }

        .chat-message.received {
            align-items: flex-start;
        }

        .chat-message .bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .chat-message.sent .bubble {
            background: var(--primary);
            color: white;
            border-bottom-left-radius: 4px;
        }

        .chat-message.received .bubble {
            background: white;
            color: var(--dark);
            border: 1px solid var(--border);
            border-bottom-right-radius: 4px;
        }

        .chat-message .timestamp {
            font-size: 10px;
            color: var(--gray);
            margin-top: 4px;
            padding: 0 4px;
        }

        .chat-input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            background: white;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 24px;
            outline: none;
            font-size: 14px;
            transition: var(--transition);
        }

        .chat-input-area input:focus {
            border-color: var(--primary);
        }

        .chat-input-area button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .chat-input-area button:hover {
            background: #0077cc;
        }

        .chat-users {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            overflow-x: auto;
        }

        .chat-user-item {
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            background: var(--light);
            border: 1px solid var(--border);
            font-size: 13px;
            white-space: nowrap;
        }

        .chat-user-item:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .chat-user-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ----- مودال احراز هویت ----- */
        .auth-modal {
            display: none;
            position: fixed;
            z-index: 4000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
        }

        .auth-modal-content {
            background: white;
            padding: 40px;
            border-radius: var(--radius);
            max-width: 420px;
            width: 92%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .auth-modal-content .auth-logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 16px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-modal-content h2 {
            text-align: center;
            margin-bottom: 24px;
            color: var(--dark);
        }

        .auth-modal-content input {
            width: 100%;
            padding: 12px 16px;
            margin: 6px 0;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            transition: var(--transition);
            background: var(--light);
        }

        .auth-modal-content input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(0,149,246,0.1);
        }

        .auth-modal-content .auth-btn {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-size: 16px;
        }

        .auth-modal-content .auth-btn:hover {
            background: #0077cc;
            transform: scale(1.01);
        }

        .auth-modal-content .switch-mode {
            text-align: center;
            margin-top: 16px;
            color: var(--gray);
            cursor: pointer;
            transition: var(--transition);
        }

        .auth-modal-content .switch-mode:hover {
            color: var(--dark);
        }

        .auth-modal-content .auth-error {
            color: #ed4956;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
            display: none;
        }

        /* ----- نوتیفیکیشن ----- */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: var(--dark);
            color: white;
            padding: 14px 24px;
            border-radius: var(--radius);
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: slideIn 0.4s ease;
            min-width: 200px;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast.success { background: #00a86b; }
        .toast.error { background: #ed4956; }
        .toast.info { background: var(--primary); }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast .toast-close {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
            opacity: 0.7;
            transition: var(--transition);
            margin-right: auto;
        }

        .toast .toast-close:hover {
            opacity: 1;
        }

        /* ----- لودینگ ----- */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: var(--gray);
        }

        .loading-spinner i {
            font-size: 32px;
            color: var(--secondary);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 56px;
            display: block;
            margin-bottom: 16px;
            color: var(--border);
        }

        .empty-state h3 {
            color: var(--dark);
            margin-bottom: 8px;
        }

        /* ----- واکنش‌گرا ----- */
        @media (max-width: 992px) {
            .modal-body {
                flex-direction: column;
            }
            .modal-body .post-image {
                width: 100%;
                height: 50vh;
                min-height: 250px;
            }
            .modal-details {
                width: 100%;
                max-height: 50vh;
            }
        }

        @media (max-width: 768px) {
            .search-box {
                width: 140px;
                font-size: 13px;
            }
            .search-box:focus {
                width: 180px;
            }
            .nav-right .nav-btn {
                width: 34px;
                height: 34px;
                font-size: 20px;
            }
            .logo-text {
                font-size: 18px;
            }
            .explore-grid {
                gap: 2px;
            }
            .stories {
                padding: 12px 16px;
                gap: 12px;
            }
            .story-item .story-ring {
                width: 56px;
                height: 56px;
            }
            .modal-content {
                width: 100%;
                max-height: 100vh;
                border-radius: 0;
            }
        }

        @media (max-width: 480px) {
            body { padding-top: 60px; }
            .navbar { padding: 0 12px; height: 56px; }
            .search-box { width: 80px; }
            .search-box:focus { width: 120px; }
            .logo-text { display: none; }
            .nav-right .nav-btn { width: 30px; height: 30px; font-size: 18px; }
            .user-avatar { width: 28px; height: 28px; }
            .explore-grid .post-item .post-overlay { display: none; }
            .modal-details { padding: 12px 16px; }
            .post-actions button { font-size: 22px; }
        }
    </style>
</head>
<body>

    <!-- ====== نوار ناوبری ====== -->
    <header class="navbar" id="navbar">
        <div class="nav-left">
            <i class="fab fa-instagram logo"></i>
            <span class="logo-text">اینستاگرام</span>
        </div>
        <div class="nav-center">
            <input type="text" placeholder="جستجوی کاربران..." class="search-box" id="searchBox" />
        </div>
        <div class="nav-right">
            <button class="nav-btn" id="chatNavBtn" title="پیام‌ها">
                <i class="fas fa-paper-plane"></i>
                <span class="badge" id="chatBadge" style="display:none;">0</span>
            </button>
            <button class="nav-btn" id="uploadNavBtn" title="آپلود پست">
                <i class="fas fa-plus-square"></i>
            </button>
            <button class="nav-btn" id="exploreNavBtn" title="اکسپلور">
                <i class="fas fa-compass"></i>
            </button>
            <img src="" class="user-avatar" id="userAvatar" title="پروفایل" />
            <button class="nav-btn" id="logoutBtn" title="خروج" style="font-size:20px;">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <!-- ====== استوری‌ها ====== -->
    <div class="stories-wrapper">
        <div class="stories" id="storiesContainer">
            <div class="loading-spinner"><i class="fas fa-spinner"></i></div>
        </div>
    </div>

    <!-- ====== گرید اکسپلور ====== -->
    <div class="explore-container">
        <div class="explore-grid" id="exploreGrid">
            <div class="loading-spinner"><i class="fas fa-spinner"></i></div>
        </div>
    </div>

    <!-- ====== مودال پست ====== -->
    <div class="modal" id="postModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModal">&times;</button>
            <div class="modal-body">
                <div class="post-image">
                    <img src="" alt="پست" id="modalImg" />
                </div>
                <div class="modal-details">
                    <div class="post-header">
                        <img src="" alt="avatar" id="modalUserAvatar" />
                        <span class="username" id="modalUsername">کاربر</span>
                        <span class="post-time" id="modalTime">لحظاتی پیش</span>
                        <button class="follow-btn" id="modalFollowBtn">فالو</button>
                    </div>
                    <div class="post-caption" id="modalCaption">توضیحات پست</div>
                    <div class="post-actions">
                        <button id="modalLikeBtn"><i class="far fa-heart"></i></button>
                        <span class="counts" id="modalLikeCount">۰</span>
                        <button id="modalCommentBtn"><i class="far fa-comment"></i></button>
                        <span class="counts" id="modalCommentCount">۰</span>
                        <button class="share-btn" id="modalShareBtn"><i class="fas fa-share-alt"></i></button>
                        <button id="modalMessageBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div class="comments-section">
                        <div class="comments-list" id="modalComments"></div>
                        <div class="comment-input-area">
                            <input type="text" id="modalCommentInput" placeholder="کامنت بنویس..." />
                            <button id="modalCommentSubmit">ارسال</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== مودال آپلود ====== -->
    <div class="upload-modal" id="uploadModal">
        <div class="upload-modal-content">
            <h2><i class="fas fa-upload" style="color:var(--secondary);"></i> آپلود پست جدید</h2>
            <div class="drop-zone" id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>برای آپلود کلیک کنید یا عکس را بکشید</p>
                <input type="file" id="uploadFile" accept="image/*" multiple />
            </div>
            <textarea id="uploadCaption" placeholder="توضیحات پست... (اختیاری)"></textarea>
            <div class="upload-actions">
                <button class="submit-btn" id="uploadSubmit">ارسال پست</button>
                <button class="cancel-btn" onclick="document.getElementById('uploadModal').style.display='none'">انصراف</button>
            </div>
        </div>
    </div>

    <!-- ====== مودال چت ====== -->
    <div class="chat-modal" id="chatModal">
        <div class="chat-modal-content">
            <div class="chat-header">
                <span class="chat-title"><i class="fas fa-paper-plane" style="color:var(--primary);"></i> پیام‌ها</span>
                <button class="close-chat" id="closeChat">&times;</button>
            </div>
            <div class="chat-users" id="chatUsers">
                <div class="loading-spinner" style="padding:10px;"><i class="fas fa-spinner"></i></div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state" style="padding:40px 20px;">
                    <i class="fas fa-comments"></i>
                    <h3>هیچ پیامی وجود ندارد</h3>
                    <p>یک کاربر را انتخاب کنید تا چت شروع شود</p>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="پیام خود را بنویسید..." />
                <button id="chatSendBtn">ارسال</button>
            </div>
        </div>
    </div>

    <!-- ====== مودال احراز هویت ====== -->
    <div class="auth-modal" id="authModal">
        <div class="auth-modal-content">
            <div class="auth-logo"><i class="fab fa-instagram"></i></div>
            <h2 id="authTitle">ورود به حساب</h2>
            <input type="text" id="authUsername" placeholder="نام کاربری" />
            <input type="password" id="authPassword" placeholder="رمز عبور" />
            <input type="text" id="authFullname" placeholder="نام کامل (اختیاری)" style="display:none;" />
            <div class="auth-error" id="authError"></div>
            <button class="auth-btn" id="authSubmit">ورود</button>
            <div class="switch-mode" id="authSwitch">حساب ندارید؟ ثبت‌نام کنید</div>
            <div style="margin-top:12px; font-size:12px; color:var(--gray); text-align:center;">
                <i class="fas fa-shield-alt"></i> رمزنگاری AES-256 + JWT امن
            </div>
        </div>
    </div>

    <!-- ====== نوتیفیکیشن ====== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================== جاوااسکریپت ============================== -->
    <script>
        // ============================================================
        //  کلاینت کامل - ارتباط با سرورهای m1.js, m2.js, m3.js
        // ============================================================

        // ===== تنظیمات =====
        const CONFIG = {
            API_GATEWAY: 'http://localhost:3000',
            POST_SERVICE: 'http://localhost:3001',
            CHAT_SERVICE: 'http://localhost:3002',
            WS_URL: 'ws://localhost:3002'
        };

        // ===== وضعیت =====
        let currentUser = null;
        let authToken = localStorage.getItem('token');
        let refreshToken = localStorage.getItem('refreshToken');
        let allPosts = [];
        let currentPostId = null;
        let currentChatUser = null;
        let chatSocket = null;
        let chatHistory = {};

        // ===== توابع کمکی =====
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
            toast.innerHTML = `
                <i class="fas ${icons[type] || icons.info}"></i>
                <span>${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function formatTime(date) {
            const diff = Math.floor((Date.now() - new Date(date).getTime()) / 1000);
            if (diff < 60) return 'لحظاتی پیش';
            if (diff < 3600) return `${Math.floor(diff / 60)} دقیقه پیش`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} ساعت پیش`;
            if (diff < 2592000) return `${Math.floor(diff / 86400)} روز پیش`;
            return new Date(date).toLocaleDateString('fa-IR');
        }

        function getAuthHeaders() {
            return {
                'Authorization': `Bearer ${authToken}`,
                'Content-Type': 'application/json'
            };
        }

        function apiFetch(endpoint, options = {}) {
            return fetch(`${CONFIG.API_GATEWAY}${endpoint}`, {
                ...options,
                headers: {
                    ...(options.body instanceof FormData ? {} : { 'Content-Type': 'application/json' }),
                    'Authorization': `Bearer ${authToken}`,
                    ...options.headers
                }
            });
        }

        // ===== مدیریت توکن =====
        async function refreshAuthToken() {
            try {
                const res = await fetch(`${CONFIG.API_GATEWAY}/api/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken })
                });
                const data = await res.json();
                if (data.token) {
                    authToken = data.token;
                    localStorage.setItem('token', authToken);
                    if (data.refreshToken) {
                        refreshToken = data.refreshToken;
                        localStorage.setItem('refreshToken', refreshToken);
                    }
                    return true;
                }
                return false;
            } catch {
                return false;
            }
        }

        // ===== احراز هویت =====
        async function checkAuth() {
            if (!authToken) {
                document.getElementById('authModal').style.display = 'flex';
                return false;
            }

            try {
                const res = await apiFetch('/api/me');
                if (res.status === 401) {
                    // تلاش برای رفرش توکن
                    if (refreshToken && await refreshAuthToken()) {
                        return checkAuth();
                    }
                    localStorage.removeItem('token');
                    localStorage.removeItem('refreshToken');
                    authToken = null;
                    document.getElementById('authModal').style.display = 'flex';
                    return false;
                }
                const data = await res.json();
                if (data.user) {
                    currentUser = data.user;
                    document.getElementById('userAvatar').src = currentUser.avatar || 'https://picsum.photos/100/100?random=1';
                    document.getElementById('authModal').style.display = 'none';
                    connectChat();
                    loadData();
                    return true;
                }
                return false;
            } catch {
                document.getElementById('authModal').style.display = 'flex';
                return false;
            }
        }

        // ===== اتصال WebSocket چت =====
        function connectChat() {
            if (chatSocket) chatSocket.close();
            if (!currentUser) return;

            chatSocket = new WebSocket(`${CONFIG.WS_URL}?token=${authToken}`);

            chatSocket.onopen = () => {
                console.log('✅ WebSocket چت متصل شد');
                // درخواست لیست کاربران
                chatSocket.send(JSON.stringify({ type: 'get_users' }));
            };

            chatSocket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleChatMessage(data);
                } catch (e) {
                    console.error('خطا در解析 پیام WebSocket:', e);
                }
            };

            chatSocket.onerror = (error) => {
                console.error('❌ خطای WebSocket:', error);
            };

            chatSocket.onclose = () => {
                console.log('🔌 WebSocket قطع شد');
                setTimeout(connectChat, 5000);
            };
        }

        function handleChatMessage(data) {
            switch (data.type) {
                case 'users_list':
                    renderChatUsers(data.users);
                    break;
                case 'messages':
                    chatHistory[data.userId] = data.messages;
                    if (currentChatUser && currentChatUser.id === data.userId) {
                        renderChatMessages(data.messages);
                    }
                    updateChatBadge();
                    break;
                case 'new_message':
                    if (!chatHistory[data.userId]) chatHistory[data.userId] = [];
                    chatHistory[data.userId].push(data.message);
                    if (currentChatUser && currentChatUser.id === data.userId) {
                        renderChatMessages(chatHistory[data.userId]);
                    }
                    updateChatBadge();
                    showToast(`پیام جدید از ${data.message.sender}`, 'info');
                    break;
                case 'message_sent':
                    if (currentChatUser && currentChatUser.id === data.userId) {
                        if (!chatHistory[data.userId]) chatHistory[data.userId] = [];
                        chatHistory[data.userId].push(data.message);
                        renderChatMessages(chatHistory[data.userId]);
                    }
                    break;
                case 'typing':
                    // نمایش تایپینگ (اختیاری)
                    break;
            }
        }

        function renderChatUsers(users) {
            const container = document.getElementById('chatUsers');
            if (!users || users.length === 0) {
                container.innerHTML = '<div style="padding:10px;color:var(--gray);">هیچ کاربری یافت نشد</div>';
                return;
            }
            container.innerHTML = users.filter(u => u.id !== currentUser.id).map(u =>
                `<div class="chat-user-item ${currentChatUser && currentChatUser.id === u.id ? 'active' : ''}" 
                      onclick="selectChatUser(${u.id}, '${u.username}')">
                    ${u.username}
                </div>`
            ).join('');
        }

        function selectChatUser(userId, username) {
            currentChatUser = { id: userId, username };
            document.querySelectorAll('.chat-user-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.chat-user-item[onclick*="${userId}"]`)?.classList.add('active');

            // درخواست تاریخچه پیام‌ها
            if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
                chatSocket.send(JSON.stringify({
                    type: 'get_messages',
                    userId: userId
                }));
            }

            // اگر قبلاً داریم
            if (chatHistory[userId]) {
                renderChatMessages(chatHistory[userId]);
            } else {
                document.getElementById('chatMessages').innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner"></i></div>';
            }
        }

        function renderChatMessages(messages) {
            const container = document.getElementById('chatMessages');
            if (!messages || messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding:40px 20px;">
                        <i class="fas fa-comments"></i>
                        <h3>هیچ پیامی وجود ندارد</h3>
                        <p>اولین پیام را ارسال کنید</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map(m => `
                <div class="chat-message ${m.senderId === currentUser.id ? 'sent' : 'received'}">
                    <div class="bubble">${m.text}</div>
                    <div class="timestamp">${formatTime(m.createdAt)}</div>
                </div>
            `).join('');

            container.scrollTop = container.scrollHeight;
        }

        function updateChatBadge() {
            // شمارش پیام‌های نخوانده
            let totalUnread = 0;
            for (const [userId, messages] of Object.entries(chatHistory)) {
                if (userId === currentUser.id) continue;
                // اگر کاربر فعلی در حال چت نیست
                if (!currentChatUser || currentChatUser.id !== parseInt(userId)) {
                    totalUnread += messages.filter(m => m.senderId !== currentUser.id && !m.read).length;
                }
            }
            const badge = document.getElementById('chatBadge');
            if (totalUnread > 0) {
                badge.textContent = totalUnread;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        }

        // ===== بارگذاری داده‌ها =====
        async function loadData() {
            await Promise.all([loadPosts(), loadStories()]);
        }

        async function loadPosts() {
            try {
                const res = await apiFetch('/api/posts');
                if (res.status === 401) {
                    if (await refreshAuthToken()) return loadPosts();
                    throw new Error('Unauthorized');
                }
                const data = await res.json();
                if (data.posts) {
                    allPosts = data.posts;
                    renderGrid();
                }
            } catch (error) {
                showToast('خطا در بارگذاری پست‌ها', 'error');
                console.error(error);
            }
        }

        async function loadStories() {
            try {
                const res = await apiFetch('/api/stories');
                const data = await res.json();
                renderStories(data.stories || []);
            } catch {
                // استوری‌های نمونه
                renderStories([
                    { username: currentUser?.username || 'شما', avatar: currentUser?.avatar || '', isAdd: true },
                    { username: 'ali_r', avatar: 'https://picsum.photos/100/100?random=10' },
                    { username: 'sara_a', avatar: 'https://picsum.photos/100/100?random=11' },
                    { username: 'reza_k', avatar: 'https://picsum.photos/100/100?random=12' },
                    { username: 'mina_g', avatar: 'https://picsum.photos/100/100?random=13' },
                    { username: 'amir_h', avatar: 'https://picsum.photos/100/100?random=14' },
                ]);
            }
        }

        // ===== رندر استوری‌ها =====
        function renderStories(stories) {
            const container = document.getElementById('storiesContainer');
            if (!stories || stories.length === 0) {
                container.innerHTML = '<div style="padding:10px;color:var(--gray);">هیچ استوری وجود ندارد</div>';
                return;
            }
            container.innerHTML = stories.map(s => `
                <div class="story-item" onclick="showToast('استوری ${s.username}')">
                    <div class="story-ring ${s.isAdd ? 'add-story' : ''}">
                        <img src="${s.avatar || 'https://picsum.photos/100/100?random=' + Date.now()}" />
                    </div>
                    <span class="story-username">${s.isAdd ? 'افزودن' : s.username}</span>
                </div>
            `).join('');
        }

        // ===== رندر گرید =====
        function renderGrid() {
            const grid = document.getElementById('exploreGrid');
            if (!allPosts || allPosts.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-camera"></i>
                        <h3>هیچ پستی وجود ندارد</h3>
                        <p>اولین پست را خودتان آپلود کنید!</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = allPosts.map(post => `
                <div class="post-item" data-id="${post.id}">
                    <img src="${post.image}" alt="${post.caption || 'پست'}" loading="lazy" />
                    <div class="post-overlay">
                        <span><i class="fas fa-heart"></i> ${post.likes || 0}</span>
                        <span><i class="fas fa-comment"></i> ${post.comments?.length || 0}</span>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.post-item').forEach(item => {
                item.addEventListener('click', function() {
                    const postId = parseInt(this.dataset.id);
                    openModal(postId);
                });
            });
        }

        // ===== مودال پست =====
        function openModal(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) {
                showToast('پست یافت نشد', 'error');
                return;
            }

            currentPostId = postId;
            document.getElementById('modalImg').src = post.image;
            document.getElementById('modalUsername').textContent = post.username || 'کاربر ناشناس';
            document.getElementById('modalUserAvatar').src = post.userAvatar || 'https://picsum.photos/100/100?random=1';
            document.getElementById('modalTime').textContent = formatTime(post.createdAt);
            document.getElementById('modalCaption').textContent = post.caption || 'بدون توضیح';
            document.getElementById('modalLikeCount').textContent = post.likes || 0;
            document.getElementById('modalCommentCount').textContent = post.comments?.length || 0;

            // لایک
            const likeBtn = document.getElementById('modalLikeBtn');
            likeBtn.innerHTML = post.liked ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>';
            likeBtn.classList.toggle('liked', post.liked);

            // فالو
            const followBtn = document.getElementById('modalFollowBtn');
            if (post.isFollowing) {
                followBtn.textContent = 'فالو شده';
                followBtn.classList.add('following');
            } else {
                followBtn.textContent = 'فالو';
                followBtn.classList.remove('following');
            }

            renderComments(post.comments || []);
            document.getElementById('postModal').style.display = 'flex';
        }

        function renderComments(comments) {
            const container = document.getElementById('modalComments');
            if (!comments || comments.length === 0) {
                container.innerHTML = '<div style="color:var(--gray);text-align:center;padding:20px 0;">هنوز کامنتی ثبت نشده</div>';
                return;
            }
            container.innerHTML = comments.map(c => `
                <div class="comment-item">
                    <strong>${c.user || 'کاربر ناشناس'}:</strong>
                    ${c.text}
                    <span class="comment-time">${formatTime(c.createdAt)}</span>
                </div>
            `).join('');
        }

        // ===== دکمه‌های مودال =====
        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('postModal').style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('postModal')) {
                document.getElementById('postModal').style.display = 'none';
            }
        });

        // لایک
        document.getElementById('modalLikeBtn').addEventListener('click', async function() {
            if (!currentPostId) return;
            try {
                const res = await apiFetch(`/api/posts/${currentPostId}/like`, { method: 'POST' });
                if (res.status === 401) {
                    if (await refreshAuthToken()) return this.click();
                    throw new Error('Unauthorized');
                }
                const data = await res.json();
                if (data.liked !== undefined) {
                    const post = allPosts.find(p => p.id === currentPostId);
                    if (post) {
                        post.liked = data.liked;
                        post.likes = data.likes;
                        document.getElementById('modalLikeCount').textContent = post.likes;
                        this.innerHTML = post.liked ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>';
                        this.classList.toggle('liked', post.liked);
                        renderGrid();
                    }
                }
            } catch (error) {
                showToast('خطا در لایک کردن', 'error');
            }
        });

        // کامنت
        document.getElementById('modalCommentSubmit').addEventListener('click', async function() {
            if (!currentPostId) return;
            const input = document.getElementById('modalCommentInput');
            const text = input.value.trim();
            if (!text) return;

            try {
                const res = await apiFetch(`/api/posts/${currentPostId}/comment`, {
                    method: 'POST',
                    body: JSON.stringify({ text })
                });
                if (res.status === 401) {
                    if (await refreshAuthToken()) return this.click();
                    throw new Error('Unauthorized');
                }
                const data = await res.json();
                if (data.comment) {
                    const post = allPosts.find(p => p.id === currentPostId);
                    if (post) {
                        if (!post.comments) post.comments = [];
                        post.comments.push(data.comment);
                        renderComments(post.comments);
                        document.getElementById('modalCommentCount').textContent = post.comments.length;
                        input.value = '';
                        renderGrid();
                    }
                }
            } catch (error) {
                showToast('خطا در ارسال کامنت', 'error');
            }
        });

        document.getElementById('modalCommentInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('modalCommentSubmit').click();
        });

        // اشتراک‌گذاری
        document.getElementById('modalShareBtn').addEventListener('click', function() {
            if (!currentPostId) return;
            const post = allPosts.find(p => p.id === currentPostId);
            if (!post) return;

            if (navigator.share) {
                navigator.share({
                    title: 'پست اینستاگرام',
                    text: post.caption || 'یک پست جالب',
                    url: `${window.location.origin}?post=${post.id}`
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(`${window.location.origin}?post=${post.id}`)
                    .then(() => showToast('لینک پست کپی شد!', 'success'))
                    .catch(() => showToast('لینک: ' + window.location.origin + '?post=' + post.id, 'info'));
            }
        });

        // پیام دادن به نویسنده پست
        document.getElementById('modalMessageBtn').addEventListener('click', function() {
            if (!currentPostId) return;
            const post = allPosts.find(p => p.id === currentPostId);
            if (!post) return;
            openChatWithUser(post.userId, post.username);
        });

        // فالو کردن
        document.getElementById('modalFollowBtn').addEventListener('click', async function() {
            if (!currentPostId) return;
            const post = allPosts.find(p => p.id === currentPostId);
            if (!post || !post.userId) return;

            try {
                const res = await apiFetch(`/api/users/${post.userId}/follow`, { method: 'POST' });
                if (res.status === 401) {
                    if (await refreshAuthToken()) return this.click();
                    throw new Error('Unauthorized');
                }
                const data = await res.json();
                if (data.following !== undefined) {
                    post.isFollowing = data.following;
                    this.textContent = post.isFollowing ? 'فالو شده' : 'فالو';
                    this.classList.toggle('following', post.isFollowing);
                    showToast(post.isFollowing ? 'فالو شد ✅' : 'آنفالو شد', 'success');
                }
            } catch (error) {
                showToast('خطا در فالو کردن', 'error');
            }
        });

        // ===== آپلود پست =====
        document.getElementById('uploadNavBtn').addEventListener('click', () => {
            document.getElementById('uploadModal').style.display = 'flex';
        });

        document.getElementById('dropZone').addEventListener('click', () => {
            document.getElementById('uploadFile').click();
        });

        document.getElementById('uploadFile').addEventListener('change', function() {
            if (this.files.length > 0) {
                document.querySelector('.drop-zone p').textContent = this.files[0].name;
            }
        });

        document.getElementById('uploadSubmit').addEventListener('click', async function() {
            const fileInput = document.getElementById('uploadFile');
            const caption = document.getElementById('uploadCaption').value.trim();

            if (!fileInput.files || fileInput.files.length === 0) {
                showToast('لطفاً یک عکس انتخاب کنید', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            if (caption) formData.append('caption', caption);

            try {
                const res = await fetch(`${CONFIG.POST_SERVICE}/api/posts`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` },
                    body: formData
                });

                if (res.status === 401) {
                    if (await refreshAuthToken()) return this.click();
                    throw new Error('Unauthorized');
                }

                const data = await res.json();
                if (data.post) {
                    allPosts.unshift(data.post);
                    renderGrid();
                    document.getElementById('uploadModal').style.display = 'none';
                    document.getElementById('uploadFile').value = '';
                    document.getElementById('uploadCaption').value = '';
                    document.querySelector('.drop-zone p').textContent = 'برای آپلود کلیک کنید یا عکس را بکشید';
                    showToast('پست با موفقیت آپلود شد! 🎉', 'success');
                } else {
                    showToast(data.error || 'خطا در آپلود', 'error');
                }
            } catch (error) {
                showToast('خطا در ارتباط با سرور', 'error');
                console.error(error);
            }
        });

        // درگ & دراپ
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
            dropZone.style.background = 'rgba(0,149,246,0.05)';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.background = 'transparent';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.background = 'transparent';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('uploadFile').files = files;
                document.querySelector('.drop-zone p').textContent = files[0].name;
            }
        });

        // ===== چت =====
        document.getElementById('chatNavBtn').addEventListener('click', () => {
            document.getElementById('chatModal').style.display = 'flex';
            if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
                chatSocket.send(JSON.stringify({ type: 'get_users' }));
            }
        });

        document.getElementById('closeChat').addEventListener('click', () => {
            document.getElementById('chatModal').style.display = 'none';
        });

        document.getElementById('chatSendBtn').addEventListener('click', sendChatMessage);
        document.getElementById('chatInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !currentChatUser) {
                if (!currentChatUser) showToast('لطفاً یک کاربر را انتخاب کنید', 'error');
                return;
            }

            if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
                chatSocket.send(JSON.stringify({
                    type: 'send_message',
                    userId: currentChatUser.id,
                    text: text
                }));
                input.value = '';
            } else {
                showToast('اتصال به سرور چت برقرار نیست', 'error');
                connectChat();
            }
        }

        function openChatWithUser(userId, username) {
            document.getElementById('chatModal').style.display = 'flex';
            setTimeout(() => selectChatUser(userId, username), 300);
        }

        // ===== دکمه‌های ناوبری =====
        document.getElementById('exploreNavBtn').addEventListener('click', () => {
            document.getElementById('exploreGrid').scrollIntoView({ behavior: 'smooth' });
        });

        document.getElementById('userAvatar').addEventListener('click', () => {
            showToast(`پروفایل ${currentUser?.username || 'کاربر'}`, 'info');
        });

        // ===== خروج =====
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('refreshToken');
            authToken = null;
            refreshToken = null;
            currentUser = null;
            if (chatSocket) chatSocket.close();
            document.getElementById('authModal').style.display = 'flex';
            showToast('خارج شدید', 'info');
        });

        // ===== جستجو =====
        document.getElementById('searchBox').addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            if (!query) {
                renderGrid();
                return;
            }
            const filtered = allPosts.filter(p =>
                (p.username && p.username.toLowerCase().includes(query)) ||
                (p.caption && p.caption.toLowerCase().includes(query))
            );
            const grid = document.getElementById('exploreGrid');
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>نتیجه‌ای یافت نشد</h3>
                        <p>برای "${query}" پستی پیدا نشد</p>
                    </div>
                `;
            } else {
                grid.innerHTML = filtered.map(post => `
                    <div class="post-item" data-id="${post.id}">
                        <img src="${post.image}" alt="${post.caption}" loading="lazy" />
                    </div>
                `).join('');
                document.querySelectorAll('.post-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const postId = parseInt(this.dataset.id);
                        openModal(postId);
                    });
                });
            }
        });

        // ===== بستن مودال‌ها با کلیک خارج =====
        document.getElementById('uploadModal').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });

        document.getElementById('chatModal').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });

        // ===== احراز هویت =====
        let isLogin = true;

        document.getElementById('authSwitch').addEventListener('click', function() {
            isLogin = !isLogin;
            document.getElementById('authTitle').textContent = isLogin ? 'ورود به حساب' : 'ثبت‌نام جدید';
            document.getElementById('authFullname').style.display = isLogin ? 'none' : 'block';
            this.textContent = isLogin ? 'حساب ندارید؟ ثبت‌نام کنید' : 'حساب دارید؟ وارد شوید';
            document.getElementById('authSubmit').textContent = isLogin ? 'ورود' : 'ثبت‌نام';
            document.getElementById('authError').style.display = 'none';
        });

        document.getElementById('authSubmit').addEventListener('click', async function() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            const fullname = document.getElementById('authFullname').value.trim();
            const errorEl = document.getElementById('authError');

            if (!username || !password) {
                errorEl.textContent = 'لطفاً همه فیلدها را پر کنید';
                errorEl.style.display = 'block';
                return;
            }

            this.disabled = true;
            this.textContent = 'در حال ارسال...';

            try {
                const endpoint = isLogin ? '/api/login' : '/api/register';
                const body = isLogin ? { username, password } : { username, password, fullname };

                const res = await fetch(`${CONFIG.API_GATEWAY}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (data.token) {
                    authToken = data.token;
                    refreshToken = data.refreshToken || null;
                    localStorage.setItem('token', authToken);
                    if (refreshToken) localStorage.setItem('refreshToken', refreshToken);
                    currentUser = data.user;
                    document.getElementById('authModal').style.display = 'none';
                    document.getElementById('userAvatar').src = currentUser.avatar || 'https://picsum.photos/100/100?random=1';
                    showToast(`خوش آمدید ${currentUser.fullname || currentUser.username}!`, 'success');
                    connectChat();
                    loadData();
                } else {
                    errorEl.textContent = data.error || 'خطا در احراز هویت';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'خطا در ارتباط با سرور';
                errorEl.style.display = 'block';
                console.error(error);
            }

            this.disabled = false;
            this.textContent = isLogin ? 'ورود' : 'ثبت‌نام';
        });

        // ===== شروع برنامه =====
        checkAuth();

        console.log('🚀 اینستاگرام حرفه‌ای با شاردینگ و مقیاس‌پذیری کامل');
        console.log('📦 معماری: API Gateway + Post Service + Chat Service');
        console.log('🔐 امنیت: JWT + Refresh Token + AES-256 + bcrypt');
        console.log('📊 شاردینگ: Consistent Hashing با ۴ شارد');
        console.log('💬 چت: WebSocket Real-time');
    </script>
</body>
</html>
