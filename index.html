<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>یارِ من - پیام‌رسان هوشمند</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ============================================
   CSS VARIABLES & RESET
   ============================================ */
:root {
  --bg: #0a0d1a;
  --bg-soft: #11162b;
  --card: #181f3d;
  --card-2: #1f274a;
  --border: #2a3458;
  --text: #f0f2ff;
  --text-2: #9aa4d4;
  --text-3: #5a6699;
  --primary: #7c6cf6;
  --primary-2: #5b4fd6;
  --primary-glow: rgba(124, 108, 246, 0.3);
  --accent: #f6b93b;
  --danger: #f45b69;
  --like: #ff5c8a;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  --shadow-glow: 0 0 60px rgba(124, 108, 246, 0.15);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Vazirmatn', sans-serif;
  background: radial-gradient(ellipse at 20% 0%, #1a224a 0%, var(--bg) 70%);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

body { padding-bottom: 82px; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

::selection { background: var(--primary); color: #fff; }

button, input, textarea {
  font-family: inherit;
  outline: none;
  border: none;
}

button { cursor: pointer; }
img, video { display: block; max-width: 100%; }

a { text-decoration: none; color: inherit; }

/* ============================================
   HEADER
   ============================================ */
.main-header {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(10, 13, 26, 0.88);
  backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid rgba(42, 52, 88, 0.5);
  transition: var(--transition);
}

.profile-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  color: var(--text);
  padding: 4px 6px;
  border-radius: 99px;
  transition: var(--transition);
  flex-shrink: 0;
}
.profile-btn:hover { background: var(--card); }
.profile-btn img {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  background: var(--card-2);
  object-fit: cover;
}
.profile-btn span { font-size: 13px; font-weight: 500; }

.header-center {
  flex: 1;
  max-width: 380px;
  min-width: 100px;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 7px 14px;
  transition: var(--transition);
}
.search-box:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 20px var(--primary-glow);
}
.search-box i { color: var(--text-3); font-size: 14px; }
.search-box input {
  background: none;
  border: none;
  color: var(--text);
  width: 100%;
  font-size: 13px;
  padding: 4px 0;
}
.search-box input::placeholder { color: var(--text-3); }

.user-score {
  font-size: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 5px 12px;
  border-radius: 99px;
  white-space: nowrap;
  color: var(--accent);
  font-weight: 600;
  flex-shrink: 0;
  transition: var(--transition);
}

/* ============================================
   BOTTOM NAV
   ============================================ */
.main-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 50;
  display: flex;
  background: rgba(10, 13, 26, 0.92);
  backdrop-filter: blur(20px) saturate(1.4);
  border-top: 1px solid rgba(42, 52, 88, 0.4);
  padding: 4px 2px calc(env(safe-area-inset-bottom) + 4px);
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: none;
  color: var(--text-3);
  padding: 8px 2px;
  border-radius: 12px;
  font-size: 10px;
  transition: var(--transition);
  position: relative;
}
.nav-btn i { font-size: 18px; transition: var(--transition); }
.nav-btn.active { color: var(--primary); }
.nav-btn.active i {
  transform: translateY(-3px);
  text-shadow: 0 0 30px var(--primary-glow);
}
.nav-btn:active { transform: scale(0.92); }

.nav-btn .badge {
  position: absolute;
  top: 2px;
  right: 50%;
  transform: translateX(50%);
  background: var(--danger);
  color: #fff;
  font-size: 8px;
  padding: 1px 6px;
  border-radius: 99px;
  font-weight: 700;
}

/* ============================================
   MAIN & PAGES
   ============================================ */
main {
  max-width: 720px;
  margin: 0 auto;
  padding: 14px 12px;
}

.page {
  display: none;
  animation: fadeSlideIn 0.4s ease forwards;
}
.page.active { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(18px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ============================================
   CHANNEL
   ============================================ */
.channel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 6px;
}
.channel-header h2 { font-size: 18px; display: flex; align-items: center; gap: 8px; }

.boost-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 99px;
  font-weight: 700;
  transition: var(--transition);
}
.boost-normal { background: var(--border); color: var(--text-2); }
.boost-high { background: #2a3a7a; color: #8ab4ff; }
.boost-viral { background: #3d2a6a; color: #d4b8ff; }
.boost-superstar {
  background: linear-gradient(135deg, var(--accent), var(--like));
  color: #1a1a1a;
  animation: pulseGlow 1.8s ease-in-out infinite;
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 10px rgba(246, 185, 59, 0.3); }
  50% { box-shadow: 0 0 30px rgba(246, 185, 59, 0.6); }
}

.followers-count {
  font-size: 12px;
  color: var(--text-2);
  background: var(--card);
  padding: 3px 12px;
  border-radius: 99px;
  border: 1px solid var(--border);
}

/* --- Composer --- */
.composer {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-glow);
  transition: var(--transition);
}
.composer textarea {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 10px 12px;
  resize: vertical;
  min-height: 56px;
  font-size: 14px;
  transition: var(--transition);
}
.composer textarea:focus { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }

.composer-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  flex-wrap: wrap;
  gap: 6px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  color: #fff;
  padding: 9px 22px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 600;
  transition: var(--transition);
  box-shadow: 0 4px 20px rgba(124, 108, 246, 0.3);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(124, 108, 246, 0.45);
}
.btn-primary:active { transform: scale(0.95); }

.btn-secondary {
  background: var(--card-2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 9px 18px;
  border-radius: 99px;
  font-size: 13px;
  transition: var(--transition);
}
.btn-secondary:hover { background: var(--border); }

.btn-ghost {
  background: none;
  color: var(--text-2);
  font-size: 13px;
  padding: 6px 10px;
  border-radius: 99px;
  transition: var(--transition);
}
.btn-ghost:hover { color: var(--text); background: var(--card); }

/* --- Posts --- */
.posts-container {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.post-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  transition: var(--transition);
  animation: fadeSlideIn 0.4s ease forwards;
}
.post-card:hover { border-color: var(--primary); }

.post-card .post-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}
.post-card .post-head img {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--card-2);
  object-fit: cover;
  border: 2px solid var(--border);
}
.post-card .post-head .name { font-size: 13px; font-weight: 600; }
.post-card .post-head .time {
  font-size: 11px;
  color: var(--text-3);
  margin-inline-start: auto;
}

.post-card p.content {
  font-size: 14px;
  line-height: 1.9;
  white-space: pre-wrap;
  margin-bottom: 10px;
  word-break: break-word;
}

.post-card .media-wrapper {
  position: relative;
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 10px;
  background: var(--bg-soft);
  cursor: pointer;
}
.post-card .media-wrapper img,
.post-card .media-wrapper video {
  width: 100%;
  max-height: 420px;
  object-fit: contain;
  background: var(--bg-soft);
  transition: var(--transition);
}
.post-card .media-wrapper:hover img,
.post-card .media-wrapper:hover video { filter: brightness(0.95); }

.post-card .media-wrapper .play-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.3);
  opacity: 0;
  transition: var(--transition);
  font-size: 48px;
  color: #fff;
}
.post-card .media-wrapper:hover .play-overlay { opacity: 1; }

.post-stats {
  display: flex;
  gap: 18px;
  font-size: 12px;
  color: var(--text-2);
  border-top: 1px solid var(--border);
  padding-top: 10px;
  flex-wrap: wrap;
}
.post-stats button {
  background: none;
  border: none;
  color: var(--text-2);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 8px;
  border-radius: 99px;
  transition: var(--transition);
}
.post-stats button:hover { background: var(--bg-soft); }
.post-stats button.liked { color: var(--like); }
.post-stats button:active { transform: scale(0.9); }

.comments-box {
  margin-top: 10px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
  display: none;
}
.comments-box.open { display: block; }
.comment-item {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 12.5px;
  align-items: flex-start;
}
.comment-item img {
  width: 26px; height: 26px;
  border-radius: 50%;
  flex-shrink: 0;
  object-fit: cover;
}
.comment-item b { color: var(--text); }

.comment-form {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.comment-form input {
  flex: 1;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 8px 14px;
  color: var(--text);
  font-size: 12.5px;
  transition: var(--transition);
}
.comment-form input:focus { border-color: var(--primary); }

/* ============================================
   ASSISTANT
   ============================================ */
.assistant-panel h2 { font-size: 19px; margin-bottom: 12px; }

.assistant-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
  gap: 8px;
  margin-bottom: 16px;
}
.stat-chip {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  font-size: 11px;
  color: var(--text-2);
  text-align: center;
  transition: var(--transition);
}
.stat-chip b {
  display: block;
  font-size: 17px;
  color: var(--text);
  margin-bottom: 2px;
}

.assistant-chat-preview {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
}
.assistant-chat-preview .mini-chat {
  max-height: 200px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 10px;
}
.mini-msg {
  padding: 8px 14px;
  border-radius: 16px;
  font-size: 12.5px;
  max-width: 82%;
  animation: fadeSlideIn 0.3s ease;
}
.mini-msg.me {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  color: #fff;
  border-bottom-right-radius: 4px;
}
.mini-msg.bot {
  align-self: flex-start;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.mini-chat-input {
  display: flex;
  gap: 6px;
}
.mini-chat-input input {
  flex: 1;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 9px 14px;
  color: var(--text);
  font-size: 13px;
  transition: var(--transition);
}
.mini-chat-input input:focus { border-color: var(--primary); }

.training-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
}
.training-section h3 { font-size: 14px; margin-bottom: 10px; }

.train-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.train-form input,
.train-form textarea {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 9px 12px;
  font-size: 13px;
  transition: var(--transition);
}
.train-form input:focus,
.train-form textarea:focus { border-color: var(--primary); }
.train-form button { align-self: flex-start; }

.qa-list, .keyword-list {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 220px;
  overflow-y: auto;
}
.qa-item, .keyword-item {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  font-size: 12.5px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.auto-post-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
#autoPostPanel {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 10px;
}
#autoPostPanel input,
#autoPostPanel textarea {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 9px 12px;
  font-size: 13px;
}
#autoPostPanel input:focus,
#autoPostPanel textarea:focus { border-color: var(--primary); }

/* ============================================
   CHAT
   ============================================ */
.chat-container { display: flex; flex-direction: column; gap: 10px; }

.chat-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.chat-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  cursor: pointer;
  transition: var(--transition);
}
.chat-item:hover { border-color: var(--primary); background: var(--card-2); }
.chat-item:active { transform: scale(0.97); }
.chat-item img {
  width: 40px; height: 40px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--card-2);
}
.chat-item p { font-size: 11.5px; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }

.chat-window {
  display: none;
  flex-direction: column;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeSlideIn 0.3s ease;
}
.chat-window.open { display: flex; }

.chat-window-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-soft);
}
.chat-window-head img {
  width: 34px; height: 34px;
  border-radius: 50%;
  object-fit: cover;
}

.chat-messages {
  height: 340px;
  max-height: 60vh;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--bg-soft);
}
.message {
  padding: 9px 14px;
  border-radius: 16px;
  font-size: 13.5px;
  max-width: 78%;
  line-height: 1.6;
  word-break: break-word;
  animation: fadeSlideIn 0.25s ease;
}
.message.sent {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  color: #fff;
  border-bottom-left-radius: 4px;
}
.message.received {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-right-radius: 4px;
}

.chat-input {
  display: flex;
  gap: 8px;
  padding: 10px;
  border-top: 1px solid var(--border);
  background: var(--bg-soft);
}
.chat-input input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 10px 16px;
  color: var(--text);
  font-size: 13.5px;
  transition: var(--transition);
}
.chat-input input:focus { border-color: var(--primary); }
.chat-input button {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  color: #fff;
  font-size: 16px;
  transition: var(--transition);
  flex-shrink: 0;
}
.chat-input button:hover { transform: scale(1.05); }
.chat-input button:active { transform: scale(0.92); }

/* ============================================
   EXPLORE
   ============================================ */
.explore-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
@media (max-width: 480px) {
  .explore-grid { grid-template-columns: repeat(2, 1fr); }
}

.explore-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  animation: fadeSlideIn 0.4s ease forwards;
}
.explore-card:hover {
  transform: translateY(-3px);
  border-color: var(--primary);
  box-shadow: var(--shadow-glow);
}
.explore-card:active { transform: scale(0.96); }
.explore-card img {
  width: 56px; height: 56px;
  border-radius: 50%;
  margin: 0 auto 8px;
  object-fit: cover;
  background: var(--card-2);
  border: 2px solid var(--border);
}
.explore-card h4 { font-size: 13px; margin-bottom: 3px; }
.explore-card .meta {
  font-size: 10px;
  color: var(--text-2);
  margin-bottom: 6px;
}
.explore-card .follow-btn {
  width: 100%;
  padding: 6px;
  border-radius: 99px;
  font-size: 11px;
  background: var(--primary);
  color: #fff;
  transition: var(--transition);
}
.explore-card .follow-btn:hover { opacity: 0.85; }
.explore-card .follow-btn.following {
  background: var(--card-2);
  border: 1px solid var(--border);
  color: var(--text-2);
}

/* ============================================
   PROFILE PAGE
   ============================================ */
#profilePage .profile-stats {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin: 12px 0;
}
#profilePage .profile-stats div { text-align: center; }
#profilePage .profile-stats b { display: block; font-size: 16px; }
#profilePage .profile-stats span { font-size: 11px; color: var(--text-3); }

/* ============================================
   MODAL
   ============================================ */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(6, 7, 18, 0.82);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 16px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-content {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 28px 24px;
  border-radius: 24px;
  max-width: 400px;
  width: 100%;
  text-align: center;

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script>
// ============================================
// CONFIG & STATE
// ============================================
const SOCKET_URL = window.location.origin;
const socket = io(SOCKET_URL, { transports: ['websocket', 'polling'], reconnection: true });

let currentUser = null;
let currentChatUser = null;
let viewingProfileId = null;
let viewingProfileFollowing = false;
let pendingPostImage = null;
let pendingPostVideo = null;

// ============================================
// ENCRYPTION (AES-256-GCM - Military Grade)
// ============================================
// کلید رمزنگاری - در تولید از کلید محیطی استفاده کنید
// اینجا برای سادگی از یک کلید ثابت استفاده شده، اما در تولید از کلید تصادفی هر جلسه استفاده کنید
const ENCRYPTION_KEY = crypto.getRandomValues(new Uint8Array(32));
const IV_LENGTH = 12;

function encryptMessage(text) {
  try {
    const iv = crypto.getRandomValues(new Uint8Array(IV_LENGTH));
    const encoded = new TextEncoder().encode(text);
    const key = crypto.subtle.importKey('raw', ENCRYPTION_KEY, 'AES-GCM', false, ['encrypt']);
    return key.then(k => {
      return crypto.subtle.encrypt({ name: 'AES-GCM', iv }, k, encoded);
    }).then(encrypted => {
      const combined = new Uint8Array(iv.length + encrypted.byteLength);
      combined.set(iv, 0);
      combined.set(new Uint8Array(encrypted), iv.length);
      return btoa(String.fromCharCode(...combined));
    });
  } catch (e) {
    console.error('Encryption error:', e);
    return text; // fallback
  }
}

function decryptMessage(encryptedBase64) {
  try {
    const combined = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
    const iv = combined.slice(0, IV_LENGTH);
    const encrypted = combined.slice(IV_LENGTH);
    const key = crypto.subtle.importKey('raw', ENCRYPTION_KEY, 'AES-GCM', false, ['decrypt']);
    return key.then(k => {
      return crypto.subtle.decrypt({ name: 'AES-GCM', iv }, k, encrypted);
    }).then(decrypted => {
      return new TextDecoder().decode(decrypted);
    });
  } catch (e) {
    console.error('Decryption error:', e);
    return encryptedBase64; // fallback
  }
}

// ============================================
// INIT
// ============================================
async function initApp() {
  const savedId = localStorage.getItem('yareman_user_id');
  if (savedId) {
    try {
      const res = await fetch(`/api/user/${savedId}`);
      if (res.ok) {
        currentUser = await res.json();
        afterLogin();
        return;
      }
    } catch (e) { /* continue to register */ }
  }
  showRegisterModal();
}

function showRegisterModal() {
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.id = 'registerModal';
  modal.innerHTML = `
    <div class="modal-content">
      <h2>👋 خوش اومدی!</h2>
      <div class="avatar-upload">
        <img id="regAvatarPreview" src="https://api.dicebear.com/7.x/thumbs/svg?seed=guest">
        <label><i class="fas fa-camera"></i><input type="file" id="regAvatarInput" accept="image/*"></label>
      </div>
      <input type="text" id="regNameInput" class="name-input" placeholder="اسمت چیه؟" maxlength="30">
      <button class="btn-primary" style="width:100%;padding:12px;margin-top:10px;" onclick="registerUser()">ورود به یارِ من</button>
    </div>`;
  document.body.appendChild(modal);

  document.getElementById('regAvatarInput').addEventListener('change', function(e) {
    readFileAsBase64(e.target.files[0], (b64) => {
      document.getElementById('regAvatarPreview').src = b64;
    });
  });
}

async function registerUser() {
  const name = document.getElementById('regNameInput').value.trim();
  if (!name) { alert('اسمت رو بنویس!'); return; }
  const avatar = document.getElementById('regAvatarPreview').src;

  try {
    const res = await fetch('/api/user/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, avatar })
    });
    const data = await res.json();
    if (data.success) {
      currentUser = data.user;
      localStorage.setItem('yareman_user_id', currentUser.id);
      document.getElementById('registerModal').remove();
      afterLogin();
    } else {
      alert('خطا: ' + data.error);
    }
  } catch (e) { alert('خطا در ارتباط با سرور'); }
}

function afterLogin() {
  document.getElementById('userName').textContent = currentUser.name;
  document.getElementById('avatarImg').src = currentUser.avatar || defaultAvatar(currentUser.name);
  document.getElementById('userScore').textContent = `🏆 ${currentUser.score || 0}`;
  socket.emit('join', currentUser.id);
  setupNav();
  loadPageData('channel');
}

function defaultAvatar(seed) {
  return `https://api.dicebear.com/7.x/thumbs/svg?seed=${encodeURIComponent(seed || 'user')}`;
}

function readFileAsBase64(file, cb) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => cb(e.target.result);
  reader.readAsDataURL(file);
}

// ============================================
// NAVIGATION
// ============================================
function setupNav() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      const pageId = this.dataset.page + 'Page';
      const el = document.getElementById(pageId);
      if (el) el.classList.add('active');
      loadPageData(this.dataset.page);
    });
  });
}

async function loadPageData(page) {
  switch (page) {
    case 'channel': await loadChannelPosts(); break;
    case 'assistant': await loadAssistantData(); break;
    case 'chat': await loadChatList(); break;
    case 'explore': await loadExplore(); break;
  }
}

// ============================================
// PROFILE MODAL
// ============================================
document.getElementById('profileBtn').addEventListener('click', showProfileModal);

async function showProfileModal() {
  const res = await fetch(`/api/user/${currentUser.id}`);
  currentUser = { ...currentUser, ...(await res.json()) };

  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `
    <div class="modal-content">
      <div class="avatar-upload">
        <img id="myAvatarPreview" src="${currentUser.avatar || defaultAvatar(currentUser.name)}">
        <label><i class="fas fa-camera"></i><input type="file" id="myAvatarInput" accept="image/*"></label>
      </div>
      <h3>${currentUser.name}</h3>
      <div class="profile-stats">
        <div><b>${currentUser.followers || 0}</b><span>فالوور</span></div>
        <div><b>${currentUser.score || 0}</b><span>امتیاز</span></div>
      </div>
      <div class="profile-actions">
        <button class="btn-secondary" onclick="document.querySelector('[data-page=assistant]').click(); closeModal();">🤖 مدیریت دستیار</button>
        <button class="btn-ghost" onclick="closeModal()">بستن</button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  document.getElementById('myAvatarInput').addEventListener('change', function(e) {
    readFileAsBase64(e.target.files[0], async (b64) => {
      document.getElementById('myAvatarPreview').src = b64;
      document.getElementById('avatarImg').src = b64;
      currentUser.avatar = b64;
      await fetch('/api/user/avatar', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id, avatar: b64 })
      });
    });
  });
}

function closeModal() {
  const m = document.querySelector('.modal');
  if (m) m.remove();
}

// ============================================
// CHANNEL - POSTS
// ============================================
document.getElementById('postImageInput').addEventListener('change', function(e) {
  readFileAsBase64(e.target.files[0], (b64) => { pendingPostImage = b64; pendingPostVideo = null; });
});
document.getElementById('postVideoInput').addEventListener('change', function(e) {
  readFileAsBase64(e.target.files[0], (b64) => { pendingPostVideo = b64; pendingPostImage = null; });
});

async function createPost() {
  const content = document.getElementById('postContent').value.trim();
  if (!content) { alert('یه متنی برای پست بنویس!'); return; }

  const mediaUrl = pendingPostImage || pendingPostVideo;
  const mediaType = pendingPostImage ? 'image' : (pendingPostVideo ? 'video' : null);

  try {
    const res = await fetch('/api/post/create', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId: currentUser.id, content,
        mediaUrl, mediaType
      })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('postContent').value = '';
      pendingPostImage = null;
      pendingPostVideo = null;
      showNotification('✅ پست منتشر شد');
      if (data.boost) updateBoostBadge(data.boost.boostLevel);
      loadChannelPosts();
    } else {
      alert('خطا: ' + data.error);
    }
  } catch (e) { alert('خطا در ارتباط با سرور'); }
}

async function loadChannelPosts() {
  try {
    const res = await fetch(`/api/channel/${currentUser.id}/posts`);
    const posts = await res.json();
    document.getElementById('channelPosts').innerHTML = posts.length ? posts.map(p => renderPostCard(p, currentUser)).join('') :
      '<p class="empty-state">هنوز پستی منتشر نکردی. اولین پستت رو بنویس! ✍️</p>';

    const ures = await fetch(`/api/user/${currentUser.id}`);
    const u = await ures.json();
    document.getElementById('followersCount').textContent = `${u.followers || 0} فالوور`;
  } catch (e) { console.error(e); }
}

function renderPostCard(post, author) {
  const name = author?.name || post.channel_name || 'کاربر';
  const avatar = author?.avatar || defaultAvatar(name);
  const mediaHtml = post.media_url ? (
    post.media_type === 'video' ?
      `<div class="media-wrapper" onclick="openFullscreen('${post.media_url}', 'video', '${escapeHtml(post.content)}')">
         <video src="${post.media_url}" controls preload="metadata" poster="${post.media_url}#t=0.1"></video>
       </div>` :
      `<div class="media-wrapper" onclick="openFullscreen('${post.media_url}', 'image', '${escapeHtml(post.content)}')">
         <img src="${post.media_url}" alt="پست" loading="lazy">
       </div>`
  ) : '';

  return `
  <div class="post-card" data-post-id="${post.id}">
    <div class="post-head">
      <img src="${avatar}" onerror="this.src='${defaultAvatar(name)}'">
      <span class="name">${name}</span>
      <span class="time">${timeAgo(post.created_at)}</span>
    </div>
    <p class="content">${escapeHtml(post.content)}</p>
    ${mediaHtml}
    <div class="post-stats">
      <button onclick="toggleLike('${post.id}', this)"><i class="far fa-heart"></i> <span class="like-count">${post.likes || 0}</span></button>
      <button onclick="toggleComments('${post.id}', this)"><i class="far fa-comment"></i> <span class="comment-count">${post.comments || 0}</span></button>
      <button disabled><i class="far fa-eye"></i> ${post.views || 0}</button>
    </div>
    <div class="comments-box" id="comments-${post.id}"></div>
  </div>`;
}

function openFullscreen(mediaUrl, type, caption) {
  const existing = document.querySelector('.fullscreen-viewer');
  if (existing) existing.remove();

  const viewer = document.createElement('div');
  viewer.className = 'fullscreen-viewer';
  viewer.innerHTML = `
    <button class="close-btn" onclick="this.closest('.fullscreen-viewer').remove()">✕</button>
    <div class="content">
      ${type === 'video' ? `<video src="${mediaUrl}" controls autoplay></video>` : `<img src="${mediaUrl}" alt="پست">`}
      ${caption ? `<p class="caption">${caption}</p>` : ''}
    </div>
  `;
  viewer.addEventListener('click', (e) => {
    if (e.target === viewer) viewer.remove();
  });
  document.body.appendChild(viewer);
}

async function toggleLike(postId, btn) {
  const res = await fetch(`/api/post/${postId}/like`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id })
  });
  const data = await res.json();
  if (data.success) {
    btn.classList.toggle('liked', data.liked);
    btn.querySelector('i').className = data.liked ? 'fas fa-heart' : 'far fa-heart';
    btn.querySelector('.like-count').textContent = data.likes;
  }
}

async function toggleComments(postId, btn) {
  const box = document.getElementById(`comments-${postId}`);
  box.classList.toggle('open');
  if (box.classList.contains('open') && !box.dataset.loaded) {
    box.dataset.loaded = '1';
    const res = await fetch(`/api/post/${postId}/comments`);
    const comments = await res.json();
    box.innerHTML = (comments.map(c => `
      <div class="comment-item"><img src="${c.avatar || defaultAvatar(c.name)}"><span><b>${c.name}</b>: ${escapeHtml(c.text)}</span></div>
    `).join('') || '') + `
      <div class="comment-form">
        <input type="text" id="commentInput-${postId}" placeholder="کامنت بنویس...">
        <button class="btn-secondary" onclick="submitComment('${postId}')">ارسال</button>
      </div>`;
  }
}

async function submitComment(postId) {
  const input = document.getElementById(`commentInput-${postId}`);
  const text = input.value.trim();
  if (!text) return;
  const res = await fetch(`/api/post/${postId}/comment`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id, text })
  });
  const data = await res.json();
  if (data.success) {
    input.value = '';
    const box = document.getElementById(`comments-${postId}`);
    const form = box.querySelector('.comment-form');
    const item = document.createElement('div');
    item.className = 'comment-item';
    item.innerHTML = `<img src="${data.comment.avatar || defaultAvatar(data.comment.name)}"><span><b>${data.comment.name}</b>: ${escapeHtml(data.comment.text)}</span>`;
    box.insertBefore(item, form);
    const card = document.querySelector(`[data-post-id="${postId}"] .comment-count`);
    if (card) card.textContent = parseInt(card.textContent) + 1;
  }
}

function updateBoostBadge(level) {
  const badge = document.getElementById('boostBadge');
  const labels = { normal: 'عادی', high: '🔥 داغ', viral: '🚀 وایرال', superstar: '⭐ ستاره' };
  badge.textContent = labels[level] || 'عادی';
  badge.className = 'boost-badge boost-' + level;
}

// ============================================
// ASSISTANT
// ============================================
async function loadAssistantData() {
  const res = await fetch(`/api/assistant/${currentUser.id}`);
  const data = await res.json();

  document.getElementById('statPosts').textContent = data.stats?.totalPosts ?? 0;
  document.getElementById('statTrainings').textContent = data.stats?.totalTrainings ?? 0;
  document.getElementById('statFollowers').textContent = data.stats?.followers ?? 0;
  document.getElementById('statEngagement').textContent = data.stats?.engagementRate ?? '0%';

  document.getElementById('qaList').innerHTML = data.qa?.length ? data.qa.map(q => `
    <div class="qa-item"><span>❓ ${escapeHtml(q.question)}</span><span>💬 ${escapeHtml(q.answer)}</span></div>
  `).join('') : '<p class="empty-state">هنوز آموزشی ثبت نشده.</p>';

  document.getElementById('keywordList').innerHTML = data.keywords?.length ? data.keywords.map(k => `
    <div class="keyword-item"><span>🔑 ${escapeHtml(k.keyword)}</span><span>💬 ${escapeHtml(k.response)}</span></div>
  `).join('') : '<p class="empty-state">هنوز کلمه کلیدی ثبت نشده.</p>';
}

async function trainAssistant() {
  const question = document.getElementById('questionInput').value.trim();
  const answer = document.getElementById('answerInput').value.trim();
  if (!question || !answer) { alert('سوال و جواب رو کامل کن!'); return; }

  const res = await fetch('/api/assistant/train', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id, question, answer })
  });
  const data = await res.json();
  if (data.success) {
    showNotification('✅ دستیار یاد گرفت');
    document.getElementById('questionInput').value = '';
    document.getElementById('answerInput').value = '';
    if (data.boost) updateBoostBadge(data.boost.boostLevel);
    loadAssistantData();
  }
}

async function trainKeyword() {
  const keyword = document.getElementById('keywordInput').value.trim();
  const response = document.getElementById('keywordResponseInput').value.trim();
  if (!keyword || !response) { alert('کلمه کلیدی و پاسخ رو کامل کن!'); return; }

  const res = await fetch('/api/assistant/keyword', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id, keyword, response })
  });
  const data = await res.json();
  if (data.success) {
    showNotification('✅ کلمه کلیدی ثبت شد');
    document.getElementById('keywordInput').value = '';
    document.getElementById('keywordResponseInput').value = '';
    if (data.boost) updateBoostBadge(data.boost.boostLevel);
    loadAssistantData();
  }
}

function showAutoPostPanel() {
  const panel = document.getElementById('autoPostPanel');
  panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
}

async function schedulePosts() {
  const count = parseInt(document.getElementById('postCount').value);
  const descriptions = document.getElementById('postDescriptions').value.split('\n').filter(s => s.trim());
  const time = document.getElementById('postTime').value;
  if (!count || count < 1) { alert('تعداد پست‌ها رو مشخص کن!'); return; }
  if (descriptions.length < count) { alert(`حداقل ${count} توضیح وارد کن.`); return; }

  const res = await fetch('/api/assistant/schedule', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id, postCount: count, descriptions: descriptions.slice(0, count), time })
  });
  const data = await res.json();
  if (data.success) { showNotification(`✅ ${count} پست زمان‌بندی شد`); }
}

async function testAssistant() {
  const input = document.getElementById('assistantPreviewInput');
  const msg = input.value.trim();
  if (!msg) return;
  appendMiniMsg('assistantPreviewChat', msg, 'me');
  input.value = '';

  const res = await fetch(`/api/assistant/chat/${currentUser.id}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg })
  });
  const data = await res.json();
  appendMiniMsg('assistantPreviewChat', data.reply, 'bot');
}

function appendMiniMsg(containerId, text, who) {
  const c = document.getElementById(containerId);
  const div = document.createElement('div');
  div.className = 'mini-msg ' + who;
  div.textContent = text;
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

// EXPLORE
// ============================================
async function loadExplore() {
  const res = await fetch('/api/explore');
  const items = await res.json();
  const labels = { normal: 'عادی', high: '🔥 داغ', viral: '🚀 وایرال', superstar: '⭐ ستاره' };

}

async function quickFollow(userId, btn) {
  if (userId === currentUser.id) return;
  const res = await fetch('/api/follow', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ followerId: currentUser.id, followingId: userId })
  });
  const data = await res.json();
  if (data.success) { btn.textContent = 'فالو شد ✓'; btn.classList.add('following'); }
}

// ============================================
// PROFILE VIEW
// ============================================
async function openProfile(userId) {
  viewingProfileId = userId;
  const res = await fetch(`/api/profile/${userId}?viewerId=${currentUser.id}`);
  const data = await res.json();

  document.getElementById('viewAvatar').src = data.user.avatar || defaultAvatar(data.user.name);
  document.getElementById('viewName').textContent = data.user.name;
  document.getElementById('viewFollowers').textContent = data.channel?.followers_count || 0;
  document.getElementById('viewPosts').textContent = data.channel?.posts_count || 0;
  document.getElementById('viewScore').textContent = data.user.score || 0;

  viewingProfileFollowing = data.isFollowing;
  const followBtn = document.getElementById('viewFollowBtn');
  followBtn.textContent = viewingProfileFollowing ? 'فالو شده ✓' : 'فالو';

  document.getElementById('viewPostsContainer').innerHTML = data.posts.length ?
    data.posts.map(p => renderPostCard(p, data.user)).join('') :
    '<p class="empty-state">هنوز پستی منتشر نکرده.</p>';

  document.getElementById('viewAssistantChat').innerHTML = '';

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('profilePage').classList.add('active');
}

function backFromProfile() {
  document.querySelector('[data-page="explore"]').click();
}

async function toggleFollowView() {
  const endpoint = viewingProfileFollowing ? '/api/unfollow' : '/api/follow';
  const res = await fetch(endpoint, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ followerId: currentUser.id, followingId: viewingProfileId })
  });
  const data = await res.json();
  if (data.success) {
    viewingProfileFollowing = !viewingProfileFollowing;
    document.getElementById('viewFollowBtn').textContent = viewingProfileFollowing ? 'فالو شده ✓' : 'فالو';
    const count = document.getElementById('viewFollowers');
    count.textContent = parseInt(count.textContent) + (viewingProfileFollowing ? 1 : -1);
  }
}

async function askOtherAssistant() {
  const input = document.getElementById('viewAssistantInput');
  const msg = input.value.trim();
  if (!msg || !viewingProfileId) return;
  appendMiniMsg('viewAssistantChat', msg, 'me');

  const res = await fetch(`/api/assistant/chat/${viewingProfileId}`, {

  });
  const data = await res.json();

function openChatFromProfile() {
  document.querySelector('[data-page="chat"]').click();
  openChat(viewingProfileId, document.getElementById('viewName').textContent, document.getElementById('viewAvatar').src);
}

async function loadChatList() {
  const res = await fetch(`/api/chat/list/${currentUser.id}`);
  const chats = await res.json();
  document.getElementById('chatList').innerHTML = chats.length ? chats.map(c => `
    <div class="chat-item" onclick="openChat('${c.id}', '${escapeHtml(c.name)}', '${c.avatar || defaultAvatar(c.name)}')">
      <img src="${c.avatar || defaultAvatar(c.name)}" onerror="this.src='${defaultAvatar(c.name)}'">
      <div><strong>${c.name}</strong><p style="font-size:11.5px;color:var(--text-2);">${escapeHtml(c.lastMessage || '')}</p></div>
    </div>`).join('') : '<p class="empty-state">هنوز چتی نداری. از اکسپلور یکی رو پیدا کن و پیام بده!</p>';
}

async function openChat(userId, name, avatar) {
  currentChatUser = { id: userId, name, avatar };
  document.getElementById('chatWithName').textContent = name || 'کاربر';
  document.getElementById('chatWithAvatar').src = avatar || defaultAvatar(name);
  document.getElementById('chatWindow').classList.add('open');
  document.getElementById('chatMessages').innerHTML = '';

  const res = await fetch(`/api/chat/history/${currentUser.id}/${userId}`);
  const messages = await res.json();
  const container = document.getElementById('chatMessages');

  // Decrypt messages
  for (const m of messages) {
    const decrypted = await decryptMessage(m.message);
    m.message = decrypted;
  }

  container.innerHTML = messages.map(m => `<div class="message ${m.from_user === currentUser.id ? 'sent' : 'received'}">${escapeHtml(m.message)}</div>`).join('');
  container.scrollTop = container.scrollHeight;
}

function closeChatWindow() {
  document.getElementById('chatWindow').classList.remove('open');
  currentChatUser = null;
}

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const message = input.value.trim();
  if (!message || !currentChatUser) return;

  // Encrypt before sending
  const encrypted = await encryptMessage(message);

  socket.emit('private_message', {
    from: currentUser.id,
    to: currentChatUser.id,
    message: encrypted,
    timestamp: Date.now()
  });
  displayMessage(message, 'sent');
  input.value = '';
}

function displayMessage(text, type) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `message ${type}`;
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

socket.on('new_message', async (data) => {
  if (currentChatUser && data.from === currentChatUser.id) {
    const decrypted = await decryptMessage(data.message);
    displayMessage(decrypted, 'received');
  } else {
    showNotification('📩 پیام جدید');
  }
});

document.getElementById('searchInput').addEventListener('input', debounce(async function(e) {
  const q = e.target.value.trim();
  if (q.length < 2) return;
  const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
  const results = await res.json();
  console.log('نتایج جستجو:', results);
  // نمایش نتایج ساده
  if (results.length) {
    showNotification(`🔍 ${results.length} نتیجه پیدا شد`);
  }
}, 450));

// ============================================
// UTILITY FUNCTIONS
// ============================================
function debounce(fn, wait) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
}

function showNotification(text) {
  const n = document.createElement('div');
  n.className = 'notification';
  n.textContent = text;
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 2800);
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  try {
    const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
    if (diff < 60) return 'همین الان';
    if (diff < 3600) return Math.floor(diff / 60) + ' دقیقه پیش';
    if (diff < 86400) return Math.floor(diff / 3600) + ' ساعت پیش';
    if (diff < 604800) return Math.floor(diff / 86400) + ' روز پیش';
    return Math.floor(diff / 604800) + ' هفته پیش';
  } catch { return ''; }
}
