<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>یارِ من - پیام‌رسان هوشمند</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #0a0d1a;
  --bg-soft: #11162b;
  --card: #171d3a;
  --card-2: #1f264a;
  --border: #2a3155;
  --text: #eef0fb;
  --text-2: #9aa1c7;
  --text-3: #6b7299;
  --primary: #7c6cf6;
  --primary-2: #5b4fd6;
  --accent: #f6b93b;
  --danger: #f45b69;
  --success: #4ade80;
  --like: #ff5c8a;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 10px 30px rgba(0,0,0,.5);
  --transition: all 0.3s cubic-bezier(.4,0,.2,1);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Vazirmatn', sans-serif;
  background: radial-gradient(ellipse at 30% 0%, #1a2050 0%, var(--bg) 55%);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 78px;
  overflow-x: hidden;
}

button {
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
}
input, textarea {
  font-family: inherit;
}
img, video {
  object-fit: cover;
  max-width: 100%;
}
::selection {
  background: var(--primary);
  color: #fff;
}

/* ===== اسکرول ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ===== هدر ===== */
.main-header {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(10,13,26,.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}

.profile-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  color: var(--text);
  padding: 0;
  min-width: 70px;
}
.profile-btn img {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  background: var(--card-2);
}
.profile-btn span {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 80px;
}

.header-center {
  flex: 1;
  max-width: 400px;
  min-width: 0;
}
.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 6px 12px;
}
.search-box i {
  color: var(--text-3);
  font-size: 13px;
}
.search-box input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  width: 100%;
  font-size: 12.5px;
  padding: 4px 0;
}
.search-box input::placeholder {
  color: var(--text-3);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.user-score {
  font-size: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 99px;
  white-space: nowrap;
  color: var(--accent);
  font-weight: 600;
}
.admin-btn {
  background: var(--danger);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 34px;
  height: 34px;
  font-size: 14px;
  display: none;
  align-items: center;
  justify-content: center;
}
.admin-btn.show {
  display: flex;
}
.admin-btn:active {
  transform: scale(.9);
}

/* ===== ناوبری ===== */
.main-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 50;
  display: flex;
  background: rgba(17,22,43,.92);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 4px 4px calc(env(safe-area-inset-bottom) + 4px);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--text-3);
  padding: 6px 2px;
  border-radius: 10px;
  font-size: 10px;
  transition: var(--transition);
}
.nav-btn i {
  font-size: 18px;
  transition: var(--transition);
}
.nav-btn.active {
  color: var(--primary);
}
.nav-btn.active i {
  transform: translateY(-2px);
}
.nav-btn:active {
  transform: scale(.92);
}

/* ===== صفحات ===== */
main {
  max-width: 640px;
  margin: 0 auto;
  padding: 12px 14px;
}
.page {
  display: none;
  animation: fadeIn .3s ease;
}
.page.active {
  display: block;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== کانال ===== */
.channel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 6px;
}
.channel-header h2 {
  font-size: 17px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.followers-count {
  font-size: 11.5px;
  color: var(--text-2);
}
.boost-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 700;
}
.boost-normal { background: #2b3155; color: var(--text-2); }
.boost-high { background: #33406b; color: #a9c2ff; }
.boost-viral { background: #402a5e; color: #d9b6ff; }
.boost-superstar { background: linear-gradient(90deg,#f6b93b,#ff5c8a); color: #1a1a1a; }

.composer {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 14px;
}
.composer textarea {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 10px;
  resize: vertical;
  min-height: 56px;
  font-size: 13px;
  transition: var(--transition);
}
.composer textarea:focus {
  border-color: var(--primary);
  outline: none;
}
.composer-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
  flex-wrap: wrap;
  gap: 6px;
}
.media-preview {
  width: 100%;
  margin-top: 8px;
  border-radius: var(--radius-sm);
  position: relative;
}
.media-preview img, .media-preview video {
  width: 100%;
  border-radius: var(--radius-sm);
  max-height: 300px;
}
.media-preview .remove-media {
  position: absolute;
  top: 6px;
  left: 6px;
  background: rgba(0,0,0,.7);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  font-size: 14px;
  cursor: pointer;
}
.media-preview .remove-media:active {
  transform: scale(.9);
}

.btn-primary {
  background: linear-gradient(90deg, var(--primary), var(--primary-2));
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: 99px;
  font-size: 12.5px;
  font-weight: 600;
  transition: var(--transition);
}
.btn-primary:active {
  transform: scale(.94);
}
.btn-primary:disabled {
  opacity: .5;
  transform: none;
}

.btn-secondary {
  background: var(--card-2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 99px;
  font-size: 12.5px;
  transition: var(--transition);
}
.btn-secondary:active {
  transform: scale(.94);
}
.btn-ghost {
  background: none;
  border: none;
  color: var(--text-2);
  font-size: 12.5px;
  transition: var(--transition);
  padding: 6px 10px;
}
.btn-ghost:active {
  opacity: .6;
}
.btn-danger {
  background: var(--danger);
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: 99px;
  font-size: 12.5px;
  font-weight: 600;
}
.btn-success {
  background: var(--success);
  color: #0a0d1a;
  border: none;
  padding: 8px 18px;
  border-radius: 99px;
  font-size: 12.5px;
  font-weight: 600;
}

.posts-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.post-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  box-shadow: var(--shadow);
  transition: var(--transition);
}
.post-card:active {
  transform: scale(.99);
}
.post-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  cursor: pointer;
}
.post-head img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--card-2);
}
.post-head .name {
  font-size: 12.5px;
  font-weight: 600;
}
.post-head .time {
  font-size: 10.5px;
  color: var(--text-3);
  margin-inline-start: auto;
}
.post-card p.content {
  font-size: 13px;
  line-height: 1.8;
  white-space: pre-wrap;
  margin-bottom: 8px;
}
.post-card .media-wrapper {
  width: 100%;
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 8px;
}
.post-card .media-wrapper img,
.post-card .media-wrapper video {
  width: 100%;
  max-height: 400px;
  display: block;
}
.post-stats {
  display: flex;
  gap: 14px;
  font-size: 11.5px;
  color: var(--text-2);
  border-top: 1px solid var(--border);
  padding-top: 8px;
}
.post-stats button {
  background: none;
  border: none;
  color: var(--text-2);
  font-size: 11.5px;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: var(--transition);
  padding: 4px 6px;
}
.post-stats button:active {
  transform: scale(.9);
}
.post-stats button.liked {
  color: var(--like);
}
.post-stats button:disabled {
  opacity: .5;
  cursor: default;
}
.comments-box {
  margin-top: 8px;
  border-top: 1px solid var(--border);
  padding-top: 8px;
  display: none;
}
.comments-box.open {
  display: block;
}
.comment-item {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
  font-size: 12px;
  align-items: flex-start;
}
.comment-item img {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  flex-shrink: 0;
}
.comment-item b {
  color: var(--text);
}
.comment-form {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}
.comment-form input {
  flex: 1;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 6px 12px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  transition: var(--transition);
}
.comment-form input:focus {
  border-color: var(--primary);
}
.comment-form button {
  padding: 6px 14px;
  border-radius: 99px;
  font-size: 11.5px;
}

/* ===== دستیار ===== */
.assistant-panel h2 {
  font-size: 18px;
  margin-bottom: 10px;
}
.assistant-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
  gap: 8px;
  margin-bottom: 14px;
}
.stat-chip {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  font-size: 11px;
  color: var(--text-2);
  text-align: center;
}
.stat-chip b {
  display: block;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 1px;
}
.training-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 12px;
}
.training-section h3 {
  font-size: 13px;
  margin-bottom: 8px;
}
.train-form {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.train-form input,
.train-form textarea {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 8px 12px;
  font-size: 12.5px;
  outline: none;
  transition: var(--transition);
}
.train-form input:focus,
.train-form textarea:focus {
  border-color: var(--primary);
}
.train-form button {
  align-self: flex-start;
  margin-top: 4px;
}
.qa-list,
.keyword-list {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 180px;
  overflow-y: auto;
}
.qa-item,
.keyword-item {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.auto-post-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}
.auto-post-section h3 {
  font-size: 13px;
  margin-bottom: 8px;
}
.auto-post-section .btn-secondary {
  margin-bottom: 6px;
}
#autoPostPanel {
  display: none;
  flex-direction: column;
  gap: 6px;
  margin-top: 8px;
}
#autoPostPanel input,
#autoPostPanel textarea {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 8px 12px;
  font-size: 12.5px;
  outline: none;
}
#autoPostPanel input:focus,
#autoPostPanel textarea:focus {
  border-color: var(--primary);
}
.assistant-chat-preview {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 12px;
}
.assistant-chat-preview .mini-chat {
  max-height: 180px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 8px;
}
.mini-msg {
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 12px;
  max-width: 85%;
  word-wrap: break-word;
}
.mini-msg.me {
  align-self: flex-end;
  background: var(--primary);
  color: #fff;
}
.mini-msg.bot {
  align-self: flex-start;
  background: var(--bg-soft);
  border: 1px solid var(--border);
}
.mini-chat-input {
  display: flex;
  gap: 6px;
}
.mini-chat-input input {
  flex: 1;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 7px 14px;
  color: var(--text);
  font-size: 12.5px;
  outline: none;
}
.mini-chat-input input:focus {
  border-color: var(--primary);
}

/* ===== چت ===== */
.chat-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
  height: calc(100vh - 180px);
}
.chat-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  flex: 1;
}
.chat-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  cursor: pointer;
  transition: var(--transition);
}
.chat-item:active {
  transform: scale(.97);
}
.chat-item img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--card-2);
}
.chat-item div {
  flex: 1;
  min-width: 0;
}
.chat-item strong {
  font-size: 13px;
  display: block;
}
.chat-item p {
  font-size: 11px;
  color: var(--text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-window {
  display: none;
  flex-direction: column;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  height: 100%;
}
.chat-window.open {
  display: flex;
}
.chat-window-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-window-head img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
}
.chat-window-head strong {
  font-size: 13px;
}
.chat-window-head .btn-ghost {
  margin-inline-start: auto;
  font-size: 16px;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.message {
  padding: 8px 13px;
  border-radius: 14px;
  font-size: 13px;
  max-width: 80%;
  line-height: 1.5;
  word-wrap: break-word;
}
.message.sent {
  align-self: flex-end;
  background: linear-gradient(90deg, var(--primary), var(--primary-2));
  color: #fff;
  border-bottom-left-radius: 4px;
}
.message.received {
  align-self: flex-start;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-bottom-right-radius: 4px;
}
.chat-input {
  display: flex;
  gap: 6px;
  padding: 8px 10px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-input input {
  flex: 1;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 8px 14px;
  color: var(--text);
  outline: none;
  font-size: 13px;
}
.chat-input input:focus {
  border-color: var(--primary);
}
.chat-input button {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  border: none;
  font-size: 14px;
  transition: var(--transition);
}
.chat-input button:active {
  transform: scale(.9);
}

/* ===== اکسپلور ===== */
.explore-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}
.explore-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
}
.explore-card:active {
  transform: scale(.95);
}
.explore-card img {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  margin-bottom: 6px;
  background: var(--card-2);
}
.explore-card h4 {
  font-size: 12.5px;
  margin-bottom: 2px;
}
.explore-card .meta {
  font-size: 10.5px;
  color: var(--text-2);
  margin-bottom: 4px;
}
.explore-card .follow-btn {
  width: 100%;
  padding: 5px;
  border-radius: 99px;
  font-size: 11px;
  border: none;
  background: var(--primary);
  color: #fff;
  transition: var(--transition);
}
.explore-card .follow-btn:active {
  transform: scale(.95);
}
.explore-card .follow-btn.following {
  background: var(--card-2);
  border: 1px solid var(--border);
  color: var(--text-2);
}

/* ===== پروفایل عمومی ===== */
.profile-header {
  text-align: center;
  margin: 12px 0;
}
.profile-header img {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 3px solid var(--primary);
}
.profile-header h2 {
  font-size: 17px;
  margin-top: 6px;
}
.profile-stats {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin: 8px 0;
}
.profile-stats div {
  text-align: center;
}
.profile-stats b {
  display: block;
  font-size: 14px;
}
.profile-stats span {
  font-size: 10.5px;
  color: var(--text-3);
}
.profile-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 8px;
  flex-wrap: wrap;
}

/* ===== مودال ===== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(6,7,15,.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(8px);
  padding: 16px;
}
.modal-content {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 20px;
  max-width: 400px;
  width: 100%;
  text-align: center;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-content h2 {
  font-size: 17px;
  margin-bottom: 12px;
}
.avatar-upload {
  position: relative;
  width: 80px;
  height: 80px;
  margin: 0 auto 10px;
}
.avatar-upload img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 3px solid var(--primary);
  background: var(--card-2);
}
.avatar-upload label {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 26px;
  height: 26px;
  background: var(--primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #fff;
  cursor: pointer;
  border: 2px solid var(--card);
}
.avatar-upload input {
  display: none;
}
.name-input {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 10px;
  font-size: 13px;
  margin-bottom: 10px;
  text-align: center;
  outline: none;
}
.name-input:focus {
  border-color: var(--primary);
}

/* ===== پنل مدیریت ===== */
.admin-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.admin-panel h3 {
  font-size: 15px;
  margin-bottom: 10px;
  color: var(--accent);
}
.admin-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.admin-tab {
  padding: 6px 14px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--bg-soft);
  color: var(--text-2);
  font-size: 11.5px;
  transition: var(--transition);
}
.admin-tab.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.admin-content {
  max-height: 400px;
  overflow-y: auto;
}
.admin-user-item,
.admin-post-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  flex-wrap: wrap;
  gap: 4px;
}
.admin-user-item .name {
  font-weight: 500;
}
.admin-user-item .actions {
  display: flex;
  gap: 4px;
}
.admin-user-item .actions button {
  padding: 2px 10px;
  border-radius: 99px;
  border: none;
  font-size: 10.5px;
  cursor: pointer;
}
.broadcast-form {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.broadcast-form input,
.broadcast-form textarea {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 8px 12px;
  font-size: 12.5px;
  outline: none;
}
.broadcast-form input:focus,
.broadcast-form textarea:focus {
  border-color: var(--primary);
}

/* ===== نوتیفیکیشن ===== */
.notification {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 10px 18px;
  border-radius: 99px;
  z-index: 999;
  font-size: 12px;
  box-shadow: var(--shadow);
  animation: slideDown .3s ease;
  max-width: 90%;
}
@keyframes slideDown {
  from { transform: translate(-50%, -20px); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}

/* ===== وضعیت خالی ===== */
.empty-state {
  text-align: center;
  color: var(--text-3);
  font-size: 12.5px;
  padding: 24px 10px;
}

/* ===== بارگذاری ===== */
.loading {
  text-align: center;
  color: var(--text-2);
  padding: 20px;
}
.loading i {
  animation: spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===== ریسپانسیو ===== */
@media (max-width: 480px) {
  .main-header { padding: 8px 10px; }
  .profile-btn span { max-width: 60px; font-size: 12px; }
  .user-score { font-size: 10px; padding: 3px 8px; }
  .explore-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .assistant-stats { grid-template-columns: repeat(2, 1fr); }
  .post-card { padding: 10px; }
  .profile-stats { gap: 12px; }
  .modal-content { padding: 16px; }
  .chat-container { height: calc(100vh - 160px); }
}

@media (max-width: 380px) {
  .explore-grid { grid-template-columns: 1fr 1fr; }
  .nav-btn i { font-size: 16px; }
  .nav-btn { font-size: 9px; }
  .admin-btn { width: 30px; height: 30px; font-size: 12px; }
}
</style>
</head>
<body>

<header class="main-header">
    <button id="profileBtn" class="profile-btn">
        <img src="" alt="پروفایل" id="avatarImg">
        <span id="userName">کاربر</span>
    </button>
    <div class="header-center">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="جستجوی کاربر یا کانال...">
        </div>
    </div>
    <div class="header-right">
        <span class="user-score" id="userScore">🏆 ۰</span>
        <button class="admin-btn" id="adminBtn" onclick="toggleAdminPanel()">
            <i class="fas fa-crown"></i>
        </button>
    </div>
</header>

<nav class="main-nav">
    <button class="nav-btn active" data-page="channel"><i class="fas fa-bullhorn"></i><span>کانال</span></button>
    <button class="nav-btn" data-page="assistant"><i class="fas fa-robot"></i><span>دستیار</span></button>
    <button class="nav-btn" data-page="chat"><i class="fas fa-envelope"></i><span>چت</span></button>
    <button class="nav-btn" data-page="explore"><i class="fas fa-compass"></i><span>اکسپلور</span></button>
</nav>

<main id="mainContent">
    <!-- صفحه کانال -->
    <section id="channelPage" class="page active">
        <div class="channel-header">
            <h2>📢 کانال من <span id="boostBadge" class="boost-badge boost-normal">عادی</span></h2>
            <span class="followers-count" id="followersCount">۰ فالوور</span>
        </div>

        <div class="composer">
            <textarea id="postContent" placeholder="چه خبر؟ یه پست جدید بنویس..." rows="2"></textarea>
            <div class="composer-actions">
                <div style="display:flex;gap:6px;flex-wrap:wrap;">
                    <label class="btn-ghost" style="cursor:pointer;display:flex;align-items:center;gap:4px;">
                        <i class="fas fa-image"></i> عکس
                        <input type="file" id="postImageInput" accept="image/*" style="display:none;">
                    </label>
                    <label class="btn-ghost" style="cursor:pointer;display:flex;align-items:center;gap:4px;">
                        <i class="fas fa-video"></i> ویدیو
                        <input type="file" id="postVideoInput" accept="video/*" style="display:none;">
                    </label>
                </div>
                <button class="btn-primary" id="publishPostBtn" onclick="createPost()">انتشار پست</button>
            </div>
            <div id="mediaPreview" class="media-preview" style="display:none;">
                <button class="remove-media" onclick="removeMedia()">✕</button>
                <div id="mediaPreviewContent"></div>
            </div>
        </div>

        <div id="channelPosts" class="posts-container"></div>
    </section>

    <!-- صفحه دستیار -->
    <section id="assistantPage" class="page">
        <div class="assistant-panel">
            <h2>🤖 دستیار من</h2>
            <div class="assistant-stats">
                <div class="stat-chip"><b id="statPosts">۰</b>پست</div>
                <div class="stat-chip"><b id="statTrainings">۰</b>آموزش</div>
                <div class="stat-chip"><b id="statFollowers">۰</b>فالوور</div>
                <div class="stat-chip"><b id="statEngagement">۰٪</b>تعامل</div>
            </div>

            <div class="assistant-chat-preview">
                <h3 style="font-size:13px;margin-bottom:8px;">💬 امتحان کن</h3>
                <div class="mini-chat" id="assistantPreviewChat"></div>
                <div class="mini-chat-input">
                    <input type="text" id="assistantPreviewInput" placeholder="یه چیزی بپرس...">
                    <button class="btn-secondary" onclick="testAssistant()">پرسیدن</button>
                </div>
            </div>

            <div class="training-section">
                <h3>📝 سوال و جواب</h3>
                <div class="train-form">
                    <input type="text" id="questionInput" placeholder="سوال...">
                    <input type="text" id="answerInput" placeholder="جواب...">
                    <button class="btn-primary" onclick="trainAssistant()">یاد بده!</button>
                </div>
                <div id="qaList" class="qa-list"></div>
            </div>

            <div class="training-section">
                <h3>🔑 کلمات کلیدی</h3>
                <div class="train-form">
                    <input type="text" id="keywordInput" placeholder="کلمه کلیدی...">
                    <input type="text" id="keywordResponseInput" placeholder="پاسخ...">
                    <button class="btn-primary" onclick="trainKeyword()">ثبت کن</button>
                </div>
                <div id="keywordList" class="keyword-list"></div>
            </div>

            <div class="auto-post-section">
                <h3>📅 زمان‌بندی پست‌ها</h3>
                <button class="btn-secondary" onclick="toggleAutoPost()">مدیریت زمان‌بندی</button>
                <div id="autoPostPanel">
                    <div style="display:grid;gap:6px;">
                        <input type="number" id="postCount" placeholder="تعداد پست‌ها..." min="1" max="30">
                        <textarea id="postDescriptions" placeholder="توضیحات هر پست (یک در هر خط)..." rows="3"></textarea>
                        <div style="display:flex;gap:6px;flex-wrap:wrap;">
                            <input type="time" id="postTime" value="09:00" style="flex:1;">
                            <input type="number" id="postInterval" placeholder="فاصله (روز)" min="1" value="1" style="flex:1;">
                        </div>
                        <div style="display:flex;gap:6px;flex-wrap:wrap;">
                            <label class="btn-ghost" style="cursor:pointer;display:flex;align-items:center;gap:4px;">
                                <i class="fas fa-image"></i> عکس‌ها
                                <input type="file" id="scheduleImages" accept="image/*" multiple style="display:none;">
                            </label>
                            <label class="btn-ghost" style="cursor:pointer;display:flex;align-items:center;gap:4px;">
                                <i class="fas fa-video"></i> ویدیوها
                                <input type="file" id="scheduleVideos" accept="video/*" multiple style="display:none;">
                            </label>
                        </div>
                        <button class="btn-primary" onclick="schedulePosts()">زمان‌بندی کن</button>
                    </div>
                </div>
                <div id="scheduledPostsList" style="margin-top:8px;"></div>
            </div>
        </div>
    </section>

    <!-- صفحه چت -->
    <section id="chatPage" class="page">
        <div class="chat-container">
            <div class="chat-list" id="chatList"></div>
            <div class="chat-window" id="chatWindow">
                <div class="chat-window-head">
                    <img id="chatWithAvatar" src="">
                    <strong id="chatWithName"></strong>
                    <button class="btn-ghost" onclick="closeChatWindow()">✕</button>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="پیام...">
                    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </section>

    <!-- صفحه اکسپلور -->
    <section id="explorePage" class="page">
        <h2 style="font-size:17px;margin-bottom:12px;">🌍 اکتشاف</h2>
        <div id="exploreContent" class="explore-grid"></div>
    </section>

    <!-- صفحه پروفایل عمومی -->
    <section id="profilePage" class="page">
        <button class="btn-ghost" onclick="backFromProfile()">← بازگشت</button>
        <div class="profile-header">
            <img id="viewAvatar" src="">
            <h2 id="viewName"></h2>
            <div class="profile-stats">
                <div><b id="viewFollowers">۰</b><span>فالوور</span></div>
                <div><b id="viewPosts">۰</b><span>پست</span></div>
                <div><b id="viewScore">۰</b><span>امتیاز</span></div>
            </div>
            <div class="profile-actions">
                <button class="btn-primary" id="viewFollowBtn" onclick="toggleFollowView()">فالو</button>
                <button class="btn-secondary" onclick="openChatFromProfile()">پیام</button>
            </div>
        </div>

        <div class="assistant-chat-preview">
            <h3 style="font-size:13px;margin-bottom:8px;">🤖 از دستیار این کاربر بپرس</h3>
            <div class="mini-chat" id="viewAssistantChat"></div>
            <div class="mini-chat-input">
                <input type="text" id="viewAssistantInput" placeholder="سوالت رو بپرس...">
                <button class="btn-secondary" onclick="askOtherAssistant()">پرسیدن</button>
            </div>
        </div>

        <div id="viewPostsContainer" class="posts-container"></div>
    </section>

    <!-- صفحه پنل مدیریت -->
    <section id="adminPage" class="page">
        <div class="admin-panel">
            <h3>👑 پنل مدیریت</h3>
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="broadcast" onclick="switchAdminTab('broadcast')">📢 ارسال همگانی</button>
                <button class="admin-tab" data-tab="users" onclick="switchAdminTab('users')">👥 کاربران</button>
                <button class="admin-tab" data-tab="posts" onclick="switchAdminTab('posts')">📝 پست‌ها</button>
                <button class="admin-tab" data-tab="channels" onclick="switchAdminTab('channels')">📢 کانال‌ها</button>
            </div>
            <div class="admin-content">
                <div id="adminBroadcast" class="admin-tab-content">
                    <div class="broadcast-form">
                        <input type="text" id="broadcastTitle" placeholder="عنوان اعلان...">
                        <textarea id="broadcastMessage" placeholder="متن پیام..." rows="3"></textarea>
                        <button class="btn-primary" onclick="sendBroadcast()">ارسال به همه</button>
                    </div>
                </div>
                <div id="adminUsers" class="admin-tab-content" style="display:none;">
                    <div id="adminUsersList"></div>
                </div>
                <div id="adminPosts" class="admin-tab-content" style="display:none;">
                    <div id="adminPostsList"></div>
                </div>
                <div id="adminChannels" class="admin-tab-content" style="display:none;">
                    <div id="adminChannelsList"></div>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>
