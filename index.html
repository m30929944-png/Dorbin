<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یارِ من - پیام‌رسان هوشمند</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazir:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- هدر با جستجو و پروفایل -->
    <header class="main-header">
        <div class="header-left">
            <button id="profileBtn" class="profile-btn">
                <img src="default-avatar.png" alt="پروفایل" id="avatarImg">
                <span id="userName">کاربر</span>
            </button>
        </div>
        <div class="header-center">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="جستجوی کاربر، کانال یا محتوا...">
            </div>
        </div>
        <div class="header-right">
            <span class="user-score" id="userScore">🏆 ۰ امتیاز</span>
        </div>
    </header>

    <!-- دکمه‌های اصلی -->
    <nav class="main-nav">
        <button class="nav-btn active" data-page="channel">
            <i class="fas fa-bullhorn"></i>
            <span>کانال</span>
        </button>
        <button class="nav-btn" data-page="assistant">
            <i class="fas fa-robot"></i>
            <span>دستیار</span>
        </button>
        <button class="nav-btn" data-page="chat">
            <i class="fas fa-envelope"></i>
            <span>چت خصوصی</span>
        </button>
        <button class="nav-btn" data-page="explore">
            <i class="fas fa-compass"></i>
            <span>اکسپلور</span>
        </button>
    </nav>

    <!-- محتوای صفحات -->
    <main id="mainContent">
        <!-- صفحه‌ی کانال -->
        <section id="channelPage" class="page active">
            <div class="channel-header">
                <h2>📢 کانال من</h2>
                <span class="followers-count" id="followersCount">۰ فالوور</span>
            </div>
            <div id="channelPosts" class="posts-container">
                <!-- پست‌ها توسط JavaScript بارگذاری می‌شوند -->
            </div>
        </section>

        <!-- صفحه‌ی دستیار -->
        <section id="assistantPage" class="page">
            <div class="assistant-panel">
                <h2>🤖 دستیار من</h2>
                <div class="assistant-stats">
                    <span id="assistantPostsCount">۰ پست</span>
                    <span id="assistantTasksCount">۰ وظیفه</span>
                </div>
                
                <!-- بخش آموزش سوال و جواب -->
                <div class="training-section">
                    <h3>📝 آموزش سوال و جواب</h3>
                    <div class="train-form">
                        <input type="text" id="questionInput" placeholder="سوال...">
                        <input type="text" id="answerInput" placeholder="جواب...">
                        <button onclick="trainAssistant()">یاد بده!</button>
                    </div>
                    <div id="qaList" class="qa-list"></div>
                </div>

                <!-- بخش آموزش کلمات کلیدی -->
                <div class="training-section">
                    <h3>🔑 کلمات کلیدی</h3>
                    <div class="train-form">
                        <input type="text" id="keywordInput" placeholder="کلمه کلیدی...">
                        <input type="text" id="keywordResponseInput" placeholder="پاسخ...">
                        <button onclick="trainKeyword()">ثبت کن</button>
                    </div>
                    <div id="keywordList" class="keyword-list"></div>
                </div>

                <!-- بخش مدیریت پست‌های اتومات -->
                <div class="auto-post-section">
                    <h3>📅 پست‌های اتومات</h3>
                    <button onclick="showAutoPostPanel()">مدیریت پست‌ها</button>
                    <div id="autoPostPanel" style="display:none;">
                        <input type="number" id="postCount" placeholder="تعداد پست‌ها...">
                        <textarea id="postDescriptions" placeholder="توضیحات هر پست (یک در هر خط)..."></textarea>
                        <input type="time" id="postTime" value="09:00">
                        <button onclick="schedulePosts()">ثبت و زمان‌بندی</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- صفحه‌ی چت خصوصی -->
        <section id="chatPage" class="page">
            <div class="chat-container">
                <div class="chat-list" id="chatList">
                    <!-- لیست چت‌ها -->
                </div>
                <div class="chat-window" id="chatWindow">
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input">
                        <input type="text" id="messageInput" placeholder="پیام...">
                        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <!-- صفحه‌ی اکسپلور -->
        <section id="explorePage" class="page">
            <h2>🌍 اکتشاف</h2>
            <div id="exploreContent" class="explore-grid">
                <!-- کانال‌های محبوب و پست‌های وایرال -->
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
