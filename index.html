<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>یارِ من - پلتفرم هوشمند اجتماعی</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ============================================
           تم حرفه‌ای - اینستاگرامی با رنگ‌های مدرن
           ============================================ */
        :root {
            --bg-primary: #0a0b1a;
            --bg-secondary: #111427;
            --bg-card: #161a33;
            --bg-card-hover: #1e2350;
            --bg-input: #0f1128;
            --border-color: #262d55;
            --border-light: #323b6e;
            
            --text-primary: #ffffff;
            --text-secondary: #a8b0d6;
            --text-muted: #6b74a8;
            
            --primary: #7c6cf6;
            --primary-dark: #5b4fd6;
            --primary-light: #9a8cff;
            --primary-glow: rgba(124, 108, 246, 0.3);
            
            --secondary: #f6b93b;
            --secondary-dark: #d49a2a;
            
            --success: #4ade80;
            --danger: #f45b69;
            --warning: #fbbf24;
            --info: #60a5fa;
            
            --like-color: #ff5c8a;
            --like-glow: rgba(255, 92, 138, 0.3);
            
            --pistachio: #a6d573;
            --pistachio-dark: #6e9e3f;
            --plastic-red: #f0525c;
            --plastic-red-dark: #c22832;
            
            --radius: 16px;
            --radius-sm: 10px;
            --radius-full: 99px;
            
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 40px rgba(124, 108, 246, 0.15);
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            
            --header-height: 60px;
            --nav-height: 72px;
        }

        /* تم روشن */
        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f2f3f8;
            --bg-card: #ffffff;
            --bg-card-hover: #f5f6fb;
            --bg-input: #f0f1f6;
            --border-color: #e3e5f0;
            --border-light: #cfd2e6;
            --text-primary: #12131f;
            --text-secondary: #4c5070;
            --text-muted: #7a7e9c;
            --shadow: 0 8px 32px rgba(20, 22, 50, 0.08);
            --shadow-glow: 0 0 40px rgba(124, 108, 246, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: calc(var(--nav-height) + 20px);
            background-image: 
                radial-gradient(ellipse at 10% 0%, rgba(124, 108, 246, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 90% 100%, rgba(246, 185, 59, 0.05) 0%, transparent 50%);
        }

        /* ============================================
           اسکرول بار سفارشی
           ============================================ */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { 
            background: var(--primary);
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-dark); }

        /* ============================================
           هدر
           ============================================ */
        .main-header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            height: var(--header-height);
            background: rgba(10, 11, 26, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 18px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            flex-shrink: 0;
        }

        .profile-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: var(--text-primary);
            padding: 0;
            min-width: 50px;
            transition: var(--transition);
            cursor: pointer;
        }
        .profile-btn:hover { opacity: 0.8; }
        .profile-btn img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: var(--bg-card);
            transition: var(--transition);
            object-fit: cover;
        }
        .profile-btn img:hover { border-color: var(--primary-light); }
        .profile-btn .name {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70px;
        }

        .header-center {
            flex: 1;
            min-width: 0;
            padding: 0 8px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            padding: 4px 12px;
            transition: var(--transition);
        }
        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .search-box i {
            color: var(--text-muted);
            font-size: 13px;
        }
        .search-box input {
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            width: 100%;
            font-size: 12px;
            padding: 6px 0;
            font-family: inherit;
        }
        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .user-score {
            font-size: 11px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 3px 10px;
            border-radius: var(--radius-full);
            white-space: nowrap;
            color: var(--secondary);
            font-weight: 700;
        }

        .header-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }
        .header-btn:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }
        .header-btn:active { transform: scale(0.9); }

        .admin-btn {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
            color: #0a0b1a;
            display: none;
        }
        .admin-btn.show { display: flex; }
        .admin-btn:hover { transform: scale(1.05); }

        /* ============================================
           ناوبری پایین - اینستاگرامی
           ============================================ */
        .main-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -8px 28px rgba(0,0,0,0.18);
            padding: 6px 8px calc(env(safe-area-inset-bottom) + 6px);
            height: var(--nav-height);
            transition: var(--transition);
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            padding: 4px 2px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            transition: var(--transition);
            position: relative;
            cursor: pointer;
            min-height: 56px;
        }
        .nav-btn i {
            font-size: 22px;
            transition: var(--transition);
        }
        .nav-btn span {
            font-size: 9px;
            font-weight: 600;
        }

        .nav-btn.active {
            color: var(--primary);
        }
        .nav-btn.active i {
            transform: scale(1.05);
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .nav-btn:active {
            transform: scale(0.9);
        }

        .nav-btn .badge {
            position: absolute;
            top: 2px;
            right: 50%;
            transform: translateX(calc(50% + 10px));
            background: var(--danger);
            color: #fff;
            font-size: 8px;
            padding: 1px 5px;
            border-radius: var(--radius-full);
            min-width: 16px;
            text-align: center;
            border: 2px solid var(--bg-card);
        }

        /* ============================================
           صفحات
           ============================================ */
        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 8px 12px;
        }

        .page {
            display: none;
            animation: fadeSlideIn 0.35s ease;
        }
        .page.active { display: block; }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title {
            font-size: 18px;
            font-weight: 700;
            margin: 8px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .page-title i { color: var(--primary); }

        /* ============================================
           کانال - بخش پست‌ها
           ============================================ */
        .channel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .channel-header h2 {
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .followers-count {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg-input);
            padding: 3px 10px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
        }

        .boost-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-weight: 700;
            text-transform: uppercase;
        }
        .boost-normal { 
            background: var(--bg-input); 
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }
        .boost-high { 
            background: rgba(96, 165, 250, 0.2); 
            color: var(--info);
            border: 1px solid var(--info);
        }
        .boost-viral { 
            background: rgba(244, 91, 105, 0.2); 
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        .boost-superstar { 
            background: linear-gradient(135deg, var(--secondary), var(--like-color));
            color: #0a0b1a;
            border: none;
        }
        .boost-legend {
            background: linear-gradient(135deg, var(--primary), var(--like-color), var(--secondary));
            color: #fff;
            border: none;
            animation: boostPulse 2s infinite;
        }
        @keyframes boostPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* کامپوزر پست - اینستاگرامی */
        .composer {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 14px;
            transition: var(--transition);
        }
        .composer:focus-within {
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
        }
        .composer .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .composer .user-info img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            object-fit: cover;
        }
        .composer .user-info span {
            font-size: 12px;
            font-weight: 600;
        }

        .composer textarea {
            width: 100%;
            background: var(--bg-input);
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            padding: 10px 12px;
            resize: vertical;
            min-height: 50px;
            font-size: 13px;
            font-family: inherit;
            transition: var(--transition);
        }
        .composer textarea:focus {
            outline: none;
            background: var(--bg-secondary);
        }
        .composer textarea::placeholder {
            color: var(--text-muted);
        }

        .composer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .composer-actions .media-buttons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .composer-actions .media-buttons label {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        .composer-actions .media-buttons label:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }
        .composer-actions .media-buttons label i { font-size: 13px; }
        .composer-actions .media-buttons input { display: none; }

        .composer-actions .publish-btn {
            padding: 6px 16px;
            border: none;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }
        .composer-actions .publish-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--primary-glow);
        }
        .composer-actions .publish-btn:active { transform: scale(0.95); }
        .composer-actions .publish-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .media-preview {
            width: 100%;
            margin-top: 8px;
            border-radius: var(--radius-sm);
            position: relative;
            background: var(--bg-input);
            overflow: hidden;
            max-height: 300px;
        }
        .media-preview img,
        .media-preview video {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            display: block;
            border-radius: var(--radius-sm);
        }
        .media-preview .remove-media {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .media-preview .remove-media:hover { transform: scale(1.1); }

        /* ============================================
           کارت پست - اینستاگرامی
           ============================================ */
        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 10px;
        }

        .post-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
        }
        .post-card:hover {
            border-color: var(--border-light);
        }

        .post-head {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px 6px;
            cursor: pointer;
        }
        .post-head img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: var(--bg-input);
            transition: var(--transition);
            object-fit: cover;
        }
        .post-head img:hover { border-color: var(--primary); }
        .post-head .name {
            font-size: 12px;
            font-weight: 600;
            flex: 1;
        }
        .post-head .name .verified {
            color: var(--info);
            font-size: 10px;
            margin-right: 2px;
        }
        .post-head .time {
            font-size: 10px;
            color: var(--text-muted);
        }
        .post-head .post-menu-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            padding: 4px 6px;
            cursor: pointer;
            border-radius: 50%;
            transition: var(--transition);
        }
        .post-head .post-menu-btn:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .post-card .content {
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-wrap;
            padding: 2px 12px 6px;
            word-wrap: break-word;
        }

        .post-card .media-wrapper {
            width: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            max-height: 500px;
            overflow: hidden;
        }
        .post-card .media-wrapper img,
        .post-card .media-wrapper video {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            display: block;
        }

        .post-stats {
            display: flex;
            gap: 12px;
            padding: 8px 12px 4px;
            border-top: 1px solid var(--border-color);
        }
        .post-stats button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: var(--radius-full);
            transition: var(--transition);
            cursor: pointer;
            font-family: inherit;
        }
        .post-stats button:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .post-stats button:active { transform: scale(0.9); }
        .post-stats button.liked {
            color: var(--like-color);
        }
        .post-stats button.liked i {
            animation: likePulse 0.3s ease;
        }
        @keyframes likePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .comments-box {
            padding: 4px 12px 10px;
            border-top: 1px solid var(--border-color);
            display: none;
        }
        .comments-box.open { display: block; }

        .comment-item {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
            align-items: flex-start;
        }
        .comment-item img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
        }
        .comment-item b {
            color: var(--text-primary);
            font-size: 11px;
        }
        .comment-item .comment-text {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .comment-form {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .comment-form input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            padding: 6px 12px;
            color: var(--text-primary);
            font-size: 11px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }
        .comment-form input:focus {
            border-color: var(--primary);
        }
        .comment-form button {
            padding: 6px 14px;
            border-radius: var(--radius-full);
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }
        .comment-form button:hover {
            transform: scale(1.02);
        }
        .comment-form button:active { transform: scale(0.95); }

        /* ============================================
           اکسپلور - گرید اینستاگرامی
           ============================================ */
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin: 0 -12px;
        }

        .explore-tile {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
            background: var(--bg-card);
        }
        .explore-tile img,
        .explore-tile video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }
        .explore-tile:active img,
        .explore-tile:active video {
            transform: scale(1.05);
        }
        .explore-tile .tile-badge {
            position: absolute;
            top: 4px;
            left: 4px;
            color: #fff;
            font-size: 12px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }
        .explore-tile .tile-overlay {
            position: absolute;
            inset: auto 0 0 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.7), transparent);
            padding: 16px 6px 4px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .explore-tile:hover .tile-overlay {
            opacity: 1;
        }
        .explore-tile .tile-overlay span i {
            margin-left: 3px;
        }

        .explore-tile.no-media {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            text-align: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }
        .explore-tile.no-media p {
            font-size: 10px;
            line-height: 1.6;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .explore-loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
        }
        .explore-loading i {
            font-size: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           پروفایل عمومی
           ============================================ */
        .profile-header {
            text-align: center;
            padding: 12px 0 16px;
        }
        .profile-header .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            object-fit: cover;
            transition: var(--transition);
        }
        .profile-header .avatar:hover { transform: scale(1.05); }
        .profile-header h2 {
            font-size: 17px;
            margin-top: 6px;
        }
        .profile-header .bio {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 2px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 10px 0;
        }
        .profile-stats div {
            text-align: center;
        }
        .profile-stats b {
            display: block;
            font-size: 15px;
        }
        .profile-stats span {
            font-size: 10px;
            color: var(--text-muted);
        }

        .profile-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .profile-actions .btn {
            padding: 7px 18px;
            border-radius: var(--radius-full);
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }
        .profile-actions .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
        }
        .profile-actions .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--primary-glow);
        }
        .profile-actions .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .profile-actions .btn-secondary:hover {
            background: var(--bg-card-hover);
        }
        .profile-actions .btn:active { transform: scale(0.95); }

        /* ============================================
           چت - اینستاگرامی
           ============================================ */
        .chat-list-container {
            display: flex;
            flex-direction: column;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 12px 4px;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            text-align: right;
            font-family: inherit;
        }
        .chat-item:active {
            background: var(--bg-card-hover);
        }
        .chat-item img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            flex-shrink: 0;
            object-fit: cover;
        }
        .chat-item .info {
            flex: 1;
            min-width: 0;
            text-align: right;
        }
        .chat-item .info strong {
            font-size: 14px;
            display: block;
            margin-bottom: 2px;
        }
        .chat-item .info p {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-item .info .last-time {
            font-size: 9px;
            color: var(--text-muted);
            display: block;
        }
        .chat-item .unread {
            background: var(--primary);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* صفحه مکالمه تمام‌صفحه */
        .chat-thread-overlay {
            position: fixed;
            inset: 0;
            z-index: 320;
            background: var(--bg-primary);
            display: none;
            flex-direction: column;
        }
        .chat-thread-overlay.open {
            display: flex;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .chat-thread-head {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            padding-top: calc(env(safe-area-inset-top) + 10px);
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card);
            flex-shrink: 0;
        }
        .chat-thread-back {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 18px;
            padding: 4px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .chat-thread-head img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            object-fit: cover;
        }
        .chat-thread-head strong {
            font-size: 14px;
            cursor: pointer;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chat-thread-head .status {
            font-size: 9px;
            color: var(--text-muted);
        }

        .chat-thread-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: var(--bg-primary);
        }
        .message {
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 13px;
            max-width: 78%;
            line-height: 1.6;
            word-wrap: break-word;
            animation: messageSlide 0.2s ease;
        }
        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }
        .message .time {
            font-size: 8px;
            opacity: 0.6;
            margin-top: 2px;
            display: block;
        }
        .message .media-preview-msg {
            margin-top: 4px;
            border-radius: 8px;
            overflow: hidden;
            max-width: 200px;
        }
        .message .media-preview-msg img,
        .message .media-preview-msg video {
            width: 100%;
            max-height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .chat-thread-input {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            padding-bottom: calc(env(safe-area-inset-bottom) + 8px);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            background: var(--bg-card);
        }
        .chat-thread-input .file-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .chat-thread-input .file-btn:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }
        .chat-thread-input .file-btn input {
            display: none;
        }
        .chat-thread-input input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            padding: 8px 14px;
            color: var(--text-primary);
            outline: none;
            font-size: 13px;
            transition: var(--transition);
            font-family: inherit;
        }
        .chat-thread-input input:focus {
            border-color: var(--primary);
        }
        .chat-thread-input .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            font-size: 14px;
            flex-shrink: 0;
            cursor: pointer;
            transition: var(--transition);
        }
        .chat-thread-input .send-btn:active { transform: scale(0.9); }

        /* ============================================
           مودال
           ============================================ */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 16px;
            animation: fadeIn 0.3s ease;
        }
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-content h2 {
            font-size: 17px;
            margin-bottom: 10px;
        }

        .avatar-upload {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 10px;
        }
        .avatar-upload img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            background: var(--bg-input);
            object-fit: cover;
        }
        .avatar-upload label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 28px;
            height: 28px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #fff;
            cursor: pointer;
            border: 2px solid var(--bg-card);
            transition: var(--transition);
        }
        .avatar-upload label:hover { transform: scale(1.1); }
        .avatar-upload input { display: none; }

        .modal-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            padding: 10px 12px;
            font-size: 13px;
            margin-bottom: 10px;
            text-align: center;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }
        .modal-input:focus {
            border-color: var(--primary);
        }

        .modal-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }
        .modal-btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
        }
        .modal-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        /* ============================================
           نوتیفیکیشن
           ============================================ */
        .toast {
            position: fixed;
            top: calc(var(--header-height) + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: var(--radius-full);
            z-index: 999;
            font-size: 12px;
            box-shadow: var(--shadow);
            animation: toastSlide 0.4s ease;
            max-width: 90%;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        @keyframes toastSlide {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* ============================================
           وضعیت خالی
           ============================================ */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            padding: 30px 10px;
        }
        .empty-state i {
            font-size: 28px;
            display: block;
            margin-bottom: 6px;
            opacity: 0.5;
        }

        /* ============================================
           بارگذاری
           ============================================ */
        .loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 16px;
        }
        .loading i {
            animation: spin 1s linear infinite;
        }

        /* ============================================
           پیشرفت آپلود
           ============================================ */
        .upload-progress {
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }
        .upload-progress i {
            font-size: 20px;
            color: var(--primary);
        }
        .progress-bar-track {
            width: 100%;
            height: 4px;
            background: var(--bg-input);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius-full);
            transition: width 0.15s ease;
        }

        /* ============================================
           ریسپانسیو
           ============================================ */
        @media (max-width: 600px) {
            .main-header { padding: 6px 10px; height: 54px; }
            .logo { font-size: 15px; }
            .profile-btn .name { max-width: 50px; font-size: 10px; }
            .profile-btn img { width: 28px; height: 28px; }
            .user-score { font-size: 9px; padding: 2px 6px; }
            .header-btn { width: 28px; height: 28px; font-size: 12px; }
            
            .page-title { font-size: 15px; margin: 4px 0 8px; }
            .post-card .content { font-size: 12px; }
            .post-head img { width: 28px; height: 28px; }
            
            .message { max-width: 88%; font-size: 12px; }
            
            .explore-grid { gap: 1px; margin: 0 -10px; }
            .explore-tile .tile-overlay { font-size: 8px; padding: 10px 4px 2px; }
            
            .nav-btn i { font-size: 18px; }
            .nav-btn span { font-size: 8px; }
            .main-nav { height: 60px; padding: 4px 4px calc(env(safe-area-inset-bottom) + 4px); }
            .nav-btn { min-height: 46px; padding: 2px; }
            .nav-btn .badge { font-size: 7px; min-width: 14px; }
            
            .modal-content { padding: 14px; }
            
            .chat-item img { width: 40px; height: 40px; }
            .chat-item .info strong { font-size: 12px; }
            
            .profile-header .avatar { width: 64px; height: 64px; }
        }

        @media (max-width: 400px) {
            .main-header { height: 48px; padding: 4px 8px; gap: 4px; }
            .logo { font-size: 13px; }
            .profile-btn img { width: 24px; height: 24px; }
            .header-btn { width: 24px; height: 24px; font-size: 10px; }
            .search-box { padding: 2px 8px; }
            .search-box input { font-size: 10px; }
            
            .nav-btn i { font-size: 15px; }
            .nav-btn span { font-size: 7px; }
            .main-nav { height: 52px; }
            .nav-btn { min-height: 40px; }
            
            .composer textarea { font-size: 12px; min-height: 40px; }
            .composer-actions .media-buttons label { font-size: 9px; padding: 3px 8px; }
            .composer-actions .publish-btn { font-size: 10px; padding: 4px 12px; }
        }

        /* ============================================
           پنل مدیریت
           ============================================ */
        .admin-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 12px;
        }
        .admin-panel h3 {
            font-size: 15px;
            margin-bottom: 10px;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .admin-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .admin-tab {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-secondary);
            font-size: 10px;
            transition: var(--transition);
            cursor: pointer;
        }
        .admin-tab:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }
        .admin-tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .admin-content {
            max-height: 400px;
            overflow-y: auto;
        }
        .admin-tab-content { display: none; }
        .admin-tab-content.active { display: block; }

        .admin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 11px;
            flex-wrap: wrap;
            gap: 4px;
        }
        .admin-item .actions {
            display: flex;
            gap: 3px;
        }
        .admin-item .actions button {
            padding: 2px 8px;
            border-radius: var(--radius-full);
            border: none;
            font-size: 9px;
            cursor: pointer;
            transition: var(--transition);
        }
        .admin-item .actions button:hover { transform: scale(1.05); }
        .admin-item .actions .btn-sm-success {
            background: var(--success);
            color: #0a0b1a;
        }
        .admin-item .actions .btn-sm-danger {
            background: var(--danger);
            color: #fff;
        }
        .admin-item .actions .btn-sm-secondary {
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .broadcast-form {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .broadcast-form input,
        .broadcast-form textarea {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            padding: 8px 12px;
            font-size: 12px;
            outline: none;
            font-family: inherit;
            transition: var(--transition);
        }
        .broadcast-form input:focus,
        .broadcast-form textarea:focus {
            border-color: var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 6px;
        }
        .stat-item {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px;
            text-align: center;
        }
        .stat-item b {
            display: block;
            font-size: 14px;
        }
        .stat-item span {
            font-size: 9px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<!-- ============================================
   هدر
   ============================================ -->
<header class="main-header">
    <button class="profile-btn" id="profileBtn">
        <img src="" alt="پروفایل" id="avatarImg">
        <span class="name" id="userName">کاربر</span>
    </button>
    <span class="logo">یارِ من</span>
    <div class="header-center">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="جستجو...">
        </div>
    </div>
    <div class="header-right">
        <span class="user-score" id="userScore">🏆 ۰</span>
        <button class="header-btn" id="themeToggle" onclick="toggleTheme()" title="تغییر تم">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="header-btn admin-btn" id="adminBtn" onclick="toggleAdmin()">
            <i class="fas fa-crown"></i>
        </button>
    </div>
</header>

<!-- ============================================
   ناوبری پایین
   ============================================ -->
<nav class="main-nav">
    <button class="nav-btn active" data-page="channel">
        <i class="fas fa-house"></i>
        <span>خانه</span>
    </button>
    <button class="nav-btn" data-page="explore">
        <i class="fas fa-compass"></i>
        <span>اکسپلور</span>
    </button>
    <button class="nav-btn" data-page="chat">
        <i class="fas fa-message"></i>
        <span>چت</span>
        <span class="badge" id="chatBadge" style="display:none;">0</span>
    </button>
    <button class="nav-btn" data-page="assistant">
        <i class="fas fa-robot"></i>
        <span>دستیار</span>
    </button>
</nav>

<!-- ============================================
   محتوای اصلی
   ============================================ -->
<main id="mainContent">

    <!-- ==========================================
    صفحه خانه (کانال)
    ========================================== -->
    <section id="channelPage" class="page active">
        <div class="channel-header">
            <h2>
                📢 کانال من
                <span id="boostBadge" class="boost-badge boost-normal">عادی</span>
            </h2>
            <span class="followers-count" id="followersCount">۰ فالوور</span>
        </div>

        <!-- کامپوزر -->
        <div class="composer">
            <div class="user-info">
                <img id="composerAvatar" src="" alt="">
                <span id="composerName">کاربر</span>
            </div>
            <textarea id="postContent" placeholder="چیزی بنویس..." rows="2"></textarea>
            <div class="composer-actions">
                <div class="media-buttons">
                    <label>
                        <i class="fas fa-image"></i>
                        <input type="file" id="postImageInput" accept="image/*">
                    </label>
                    <label>
                        <i class="fas fa-video"></i>
                        <input type="file" id="postVideoInput" accept="video/*">
                    </label>
                </div>
                <button class="publish-btn" id="publishBtn" onclick="createPost()">
                    <i class="fas fa-paper-plane"></i> انتشار
                </button>
            </div>
            <div id="mediaPreview" class="media-preview" style="display:none;">
                <button class="remove-media" onclick="removeMedia()">✕</button>
                <div id="mediaPreviewContent"></div>
            </div>
        </div>

        <!-- پست‌ها -->
        <div id="channelPosts" class="posts-container"></div>
    </section>

    <!-- ==========================================
    صفحه اکسپلور
    ========================================== -->
    <section id="explorePage" class="page">
        <h2 class="page-title"><i class="fas fa-compass"></i> اکتشاف</h2>
        <div id="exploreContent" class="explore-grid"></div>
        <div id="exploreLoading" class="explore-loading" style="display:none;">
            <i class="fas fa-spinner"></i> بارگذاری...
        </div>
    </section>

    <!-- ==========================================
    صفحه چت
    ========================================== -->
    <section id="chatPage" class="page">
        <h2 class="page-title"><i class="fas fa-message"></i> پیام‌ها</h2>
        <div class="chat-list-container" id="chatList"></div>
    </section>

    <!-- صفحه مکالمه تمام‌صفحه -->
    <div class="chat-thread-overlay" id="chatThreadOverlay">
        <div class="chat-thread-head">
            <button class="chat-thread-back" onclick="closeChatWindow()"><i class="fas fa-arrow-right"></i></button>
            <img id="chatWithAvatar" src="" onclick="openProfileFromChat()">
            <div>
                <strong id="chatWithName" onclick="openProfileFromChat()"></strong>
                <span class="status" id="chatStatus">آفلاین</span>
            </div>
            <button class="header-btn" onclick="toggleChatMenu()" style="margin-right:auto;">
                <i class="fas fa-ellipsis-vertical"></i>
            </button>
        </div>
        <div class="chat-thread-messages" id="chatMessages"></div>
        <div class="chat-thread-input">
            <label class="file-btn">
                <i class="fas fa-paperclip"></i>
                <input type="file" id="chatFileInput" accept="image/*,video/*,application/*" onchange="sendChatFile(this)">
            </label>
            <input type="text" id="messageInput" placeholder="پیام..." onkeydown="if(event.key==='Enter'){sendMessage();}">
            <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- ==========================================
    صفحه دستیار
    ========================================== -->
    <section id="assistantPage" class="page">
        <h2 class="page-title"><i class="fas fa-robot"></i> دستیار هوشمند</h2>
        
        <!-- آمار -->
        <div class="stats-grid" style="margin-bottom:12px;">
            <div class="stat-item"><b id="astPosts">۰</b><span>پست</span></div>
            <div class="stat-item"><b id="astTrain">۰</b><span>آموزش</span></div>
            <div class="stat-item"><b id="astFollowers">۰</b><span>فالوور</span></div>
            <div class="stat-item"><b id="astEngagement">۰٪</b><span>تعامل</span></div>
        </div>

        <!-- چت با دستیار -->
        <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:12px;margin-bottom:12px;">
            <h3 style="font-size:13px;margin-bottom:6px;">💬 با دستیار چت کن</h3>
            <div class="chat-thread-messages" id="assistantChat" style="max-height:150px;padding:4px 0;"></div>
            <div class="chat-thread-input" style="padding:6px 0 0;">
                <input type="text" id="assistantInput" placeholder="سوالت رو بپرس..." onkeydown="if(event.key==='Enter'){askAssistant();}">
                <button class="send-btn" onclick="askAssistant()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <!-- آموزش سوال و جواب -->
        <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:12px;margin-bottom:10px;">
            <h3 style="font-size:13px;margin-bottom:6px;">📝 سوال و جواب</h3>
            <div style="display:flex;flex-direction:column;gap:6px;">
                <input class="modal-input" id="questionInput" placeholder="سوال..." style="text-align:right;">
                <input class="modal-input" id="answerInput" placeholder="جواب..." style="text-align:right;">
                <button class="modal-btn modal-btn-primary" onclick="trainAssistant()">یاد بده!</button>
            </div>
            <div id="qaList" style="margin-top:8px;max-height:120px;overflow-y:auto;"></div>
        </div>

        <!-- کلمات کلیدی -->
        <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:12px;margin-bottom:10px;">
            <h3 style="font-size:13px;margin-bottom:6px;">🔑 کلمات کلیدی</h3>
            <div style="display:flex;flex-direction:column;gap:6px;">
                <input class="modal-input" id="keywordInput" placeholder="کلمه کلیدی..." style="text-align:right;">
                <input class="modal-input" id="keywordResponseInput" placeholder="پاسخ..." style="text-align:right;">
                <button class="modal-btn modal-btn-primary" onclick="trainKeyword()">ثبت کن</button>
            </div>
            <div id="keywordList" style="margin-top:8px;max-height:120px;overflow-y:auto;"></div>
        </div>

        <!-- زمان‌بندی پست -->
        <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:12px;">
            <h3 style="font-size:13px;margin-bottom:6px;">📅 زمان‌بندی پست</h3>
            <button class="modal-btn" style="background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border-color);" onclick="toggleAutoPost()">مدیریت زمان‌بندی</button>
            <div id="autoPostPanel" style="display:none;margin-top:8px;flex-direction:column;gap:6px;">
                <input class="modal-input" id="postCount" type="number" placeholder="تعداد پست..." min="1" style="text-align:right;">
                <textarea class="modal-input" id="postDescriptions" placeholder="متن هر پست (یک در هر خط)..." rows="2" style="text-align:right;min-height:60px;"></textarea>
                <div style="display:flex;gap:6px;flex-wrap:wrap;">
                    <input class="modal-input" id="postTime" type="time" value="09:00" style="flex:1;text-align:center;">
                    <input class="modal-input" id="postInterval" type="number" placeholder="فاصله (روز)" min="1" value="1" style="flex:1;text-align:center;">
                </div>
                <button class="modal-btn modal-btn-primary" onclick="schedulePosts()">زمان‌بندی کن</button>
            </div>
            <div id="scheduledPostsList" style="margin-top:6px;max-height:100px;overflow-y:auto;"></div>
        </div>
    </section>

    <!-- ==========================================
    صفحه پروفایل عمومی
    ========================================== -->
    <section id="profilePage" class="page">
        <button class="header-btn" onclick="backFromProfile()" style="margin-bottom:8px;">
            <i class="fas fa-arrow-right"></i>
        </button>
        <div class="profile-header">
            <img class="avatar" id="viewAvatar" src="">
            <h2 id="viewName"></h2>
            <p class="bio" id="viewBio"></p>
            <div class="profile-stats">
                <div><b id="viewFollowers">۰</b><span>فالوور</span></div>
                <div><b id="viewPosts">۰</b><span>پست</span></div>
                <div><b id="viewScore">۰</b><span>امتیاز</span></div>
            </div>
            <div class="profile-actions">
                <button class="btn btn-primary" id="viewFollowBtn" onclick="toggleFollowView()">فالو</button>
                <button class="btn btn-secondary" onclick="openChatFromProfile()">پیام</button>
            </div>
        </div>

        <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:10px;margin-bottom:10px;">
            <h3 style="font-size:12px;margin-bottom:4px;">🤖 از دستیار این کاربر بپرس</h3>
            <div class="chat-thread-messages" id="viewAssistantChat" style="max-height:100px;padding:4px 0;"></div>
            <div class="chat-thread-input" style="padding:4px 0 0;">
                <input type="text" id="viewAssistantInput" placeholder="سوال..." onkeydown="if(event.key==='Enter'){askOtherAssistant();}">
                <button class="send-btn" onclick="askOtherAssistant()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="viewPostsContainer" class="posts-container"></div>
    </section>

    <!-- ==========================================
    صفحه مدیریت
    ========================================== -->
    <section id="adminPage" class="page">
        <div class="admin-panel">
            <h3>👑 پنل مدیریت</h3>
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="stats" onclick="switchAdminTab('stats')">📊 آمار</button>
                <button class="admin-tab" data-tab="broadcast" onclick="switchAdminTab('broadcast')">📢 ارسال</button>
                <button class="admin-tab" data-tab="users" onclick="switchAdminTab('users')">👥 کاربران</button>
                <button class="admin-tab" data-tab="posts" onclick="switchAdminTab('posts')">📝 پست‌ها</button>
                <button class="admin-tab" data-tab="reports" onclick="switchAdminTab('reports')">🚩 گزارش‌ها</button>
                <button class="admin-tab" data-tab="ads" onclick="switchAdminTab('ads')">🎯 تبلیغات</button>
            </div>
            <div class="admin-content">
                <div id="adminStats" class="admin-tab-content active">
                    <div id="adminStatsContent"></div>
                </div>
                <div id="adminBroadcast" class="admin-tab-content">
                    <div class="broadcast-form">
                        <input type="text" id="broadcastTitle" placeholder="عنوان...">
                        <textarea id="broadcastMessage" placeholder="متن پیام..." rows="2"></textarea>
                        <button class="modal-btn modal-btn-primary" onclick="sendBroadcast()">ارسال به همه</button>
                    </div>
                </div>
                <div id="adminUsers" class="admin-tab-content">
                    <div id="adminUsersList"></div>
                </div>
                <div id="adminPosts" class="admin-tab-content">
                    <div id="adminPostsList"></div>
                </div>
                <div id="adminReports" class="admin-tab-content">
                    <div id="adminReportsList"></div>
                </div>
                <div id="adminAds" class="admin-tab-content">
                    <div class="broadcast-form">
                        <input type="text" id="adTitle" placeholder="عنوان تبلیغ...">
                        <textarea id="adContent" placeholder="متن..." rows="2"></textarea>
                        <input type="text" id="adLink" placeholder="لینک (اختیاری)...">
                        <button class="modal-btn modal-btn-primary" onclick="createAd()">ساخت تبلیغ</button>
                    </div>
                    <div id="adminAdsList" style="margin-top:10px;"></div>
                </div>
            </div>
        </div>
    </section>

</main>

<!-- ============================================
   اسکریپت‌ها
   ============================================ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>
