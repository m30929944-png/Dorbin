<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>یارِ من - پلتفرم هوشمند اجتماعی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ============================================
   تم حرفه‌ای - رنگ‌های مدرن و جذاب
   ============================================ */
:root {
  /* تم اصلی - Dark Premium */
  --bg: #0a0b1a;
  --bg-soft: #111427;
  --bg-card: #161a33;
  --bg-card-hover: #1e2350;
  --border: #262d55;
  --border-light: #323b6e;
  
  --text: #eeeffb;
  --text-2: #a8b0d6;
  --text-3: #6b74a8;
  
  --primary: #7c6cf6;
  --primary-dark: #5b4fd6;
  --primary-light: #9a8cff;
  --primary-glow: rgba(124, 108, 246, 0.3);
  
  --secondary: #f6b93b;
  --secondary-dark: #d49a2a;
  
  --success: #4ade80;
  --danger: #f45b69;
  --warning: #fbbf24;
  --info: #60a5fa;
  
  --like: #ff5c8a;
  --like-glow: rgba(255, 92, 138, 0.3);
  
  --radius: 16px;
  --radius-sm: 10px;
  --radius-full: 99px;
  
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 40px rgba(124, 108, 246, 0.15);
  
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Vazirmatn', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
  overflow-x: hidden;
  background-image: 
    radial-gradient(ellipse at 10% 0%, rgba(124, 108, 246, 0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 90% 100%, rgba(246, 185, 59, 0.05) 0%, transparent 50%);
}

/* ============================================
   اسکرول بار سفارشی
   ============================================ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg-soft); }
::-webkit-scrollbar-thumb { 
  background: var(--primary);
  border-radius: 99px;
}
::-webkit-scrollbar-thumb:hover { background: var(--primary-dark); }

/* ============================================
   تایپوگرافی
   ============================================ */
h1, h2, h3, h4, h5, h6 {
  font-weight: 700;
  line-height: 1.3;
}

a {
  color: var(--primary);
  text-decoration: none;
}

/* ============================================
   دکمه‌ها
   ============================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 22px;
  border: none;
  border-radius: var(--radius-full);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.btn:active {
  transform: scale(0.95);
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  box-shadow: 0 4px 20px var(--primary-glow);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--primary-glow);
}

.btn-secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  background: var(--bg-card-hover);
  border-color: var(--primary);
}

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  padding: 8px 14px;
}
.btn-ghost:hover {
  color: var(--text);
  background: var(--bg-soft);
}

.btn-danger {
  background: linear-gradient(135deg, var(--danger), #d94452);
  color: #fff;
}
.btn-danger:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(244, 91, 105, 0.3);
}

.btn-success {
  background: linear-gradient(135deg, var(--success), #22c55e);
  color: #0a0b1a;
}
.btn-success:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(74, 222, 128, 0.3);
}

/* ============================================
   هدر
   ============================================ */
.main-header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: rgba(10, 11, 26, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.profile-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  color: var(--text);
  padding: 0;
  min-width: 60px;
  transition: var(--transition);
}
.profile-btn:hover {
  opacity: 0.8;
}
.profile-btn img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  background: var(--bg-card);
  transition: var(--transition);
}
.profile-btn img:hover {
  border-color: var(--primary-light);
}
.profile-btn span {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 80px;
}

.header-center {
  flex: 1;
  max-width: 420px;
  min-width: 0;
}
.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 6px 14px;
  transition: var(--transition);
}
.search-box:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 20px var(--primary-glow);
}
.search-box i {
  color: var(--text-3);
  font-size: 14px;
}
.search-box input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  width: 100%;
  font-size: 13px;
  padding: 6px 0;
}
.search-box input::placeholder {
  color: var(--text-3);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.user-score {
  font-size: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: var(--radius-full);
  white-space: nowrap;
  color: var(--secondary);
  font-weight: 700;
}
.admin-btn {
  background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
  color: #0a0b1a;
  border: none;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  font-size: 14px;
  display: none;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}
.admin-btn.show {
  display: flex;
}
.admin-btn:hover {
  transform: scale(1.05);
}
.admin-btn:active {
  transform: scale(0.9);
}

/* ============================================
   ناوبری پایین
   ============================================ */
.main-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  background: rgba(17, 20, 39, 0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 4px 4px calc(env(safe-area-inset-bottom) + 4px);
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--text-3);
  padding: 6px 4px;
  border-radius: 12px;
  font-size: 10px;
  transition: var(--transition);
  position: relative;
}
.nav-btn i {
  font-size: 20px;
  transition: var(--transition);
}
.nav-btn span {
  font-size: 9px;
  font-weight: 500;
}
.nav-btn.active {
  color: var(--primary);
}
.nav-btn.active i {
  transform: translateY(-3px);
  text-shadow: 0 0 20px var(--primary-glow);
}
.nav-btn:active {
  transform: scale(0.9);
}
.nav-btn .badge {
  position: absolute;
  top: 2px;
  right: 50%;
  transform: translateX(50%);
  background: var(--danger);
  color: #fff;
  font-size: 8px;
  padding: 1px 6px;
  border-radius: var(--radius-full);
  min-width: 16px;
  text-align: center;
}

/* ============================================
   صفحات
   ============================================ */
main {
  max-width: 720px;
  margin: 0 auto;
  padding: 12px 14px;
}

.page {
  display: none;
  animation: fadeSlideIn 0.4s ease;
}
.page.active {
  display: block;
}

@keyframes fadeSlideIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.page-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.page-title i {
  color: var(--primary);
}

/* ============================================
   کانال
   ============================================ */
.channel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 8px;
}
.channel-header h2 {
  font-size: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.followers-count {
  font-size: 12px;
  color: var(--text-2);
  background: var(--bg-soft);
  padding: 4px 12px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
}

.boost-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  font-weight: 700;
  text-transform: uppercase;
}
.boost-normal { 
  background: var(--bg-soft); 
  color: var(--text-3);
  border: 1px solid var(--border);
}
.boost-high { 
  background: rgba(96, 165, 250, 0.2); 
  color: var(--info);
  border: 1px solid var(--info);
}
.boost-viral { 
  background: rgba(244, 91, 105, 0.2); 
  color: var(--danger);
  border: 1px solid var(--danger);
}
.boost-superstar { 
  background: linear-gradient(135deg, var(--secondary), var(--like));
  color: #0a0b1a;
  border: none;
}

/* کامپوزر پست */
.composer {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 16px;
  transition: var(--transition);
}
.composer:focus-within {
  border-color: var(--primary);
  box-shadow: var(--shadow-glow);
}
.composer textarea {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 12px;
  resize: vertical;
  min-height: 60px;
  font-size: 14px;
  transition: var(--transition);
  font-family: inherit;
}
.composer textarea:focus {
  border-color: var(--primary);
  outline: none;
}
.composer-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  flex-wrap: wrap;
  gap: 8px;
}
.composer-actions .media-buttons {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.composer-actions .media-buttons label {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  font-size: 12px;
  color: var(--text-2);
  cursor: pointer;
  transition: var(--transition);
}
.composer-actions .media-buttons label:hover {
  border-color: var(--primary);
  color: var(--text);
}
.composer-actions .media-buttons label i {
  font-size: 14px;
}
.composer-actions .media-buttons input {
  display: none;
}

.media-preview {
  width: 100%;
  margin-top: 10px;
  border-radius: var(--radius-sm);
  position: relative;
  background: var(--bg-soft);
  overflow: hidden;
}
.media-preview img,
.media-preview video {
  width: 100%;
  max-height: 300px;
  display: block;
  border-radius: var(--radius-sm);
}
.media-preview .remove-media {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0, 0, 0, 0.8);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  font-size: 14px;
  cursor: pointer;
  transition: var(--transition);
}
.media-preview .remove-media:hover {
  transform: scale(1.1);
}

/* کارت پست */
.posts-container {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.post-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  transition: var(--transition);
}
.post-card:hover {
  border-color: var(--border-light);
}
.post-card:active {
  transform: scale(0.99);
}

.post-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  cursor: pointer;
}
.post-head img {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg-soft);
  transition: var(--transition);
}
.post-head img:hover {
  border-color: var(--primary);
}
.post-head .name {
  font-size: 13px;
  font-weight: 600;
}
.post-head .name .verified {
  color: var(--info);
  font-size: 11px;
}
.post-head .time {
  font-size: 11px;
  color: var(--text-3);
  margin-inline-start: auto;
}

.post-card .content {
  font-size: 14px;
  line-height: 1.9;
  white-space: pre-wrap;
  margin-bottom: 10px;
}

.post-card .media-wrapper {
  width: 100%;
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 10px;
  background: var(--bg-soft);
}
.post-card .media-wrapper img,
.post-card .media-wrapper video {
  width: 100%;
  max-height: 450px;
  display: block;
}

.post-stats {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text-2);
  border-top: 1px solid var(--border);
  padding-top: 10px;
}
.post-stats button {
  background: none;
  border: none;
  color: var(--text-2);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: var(--radius-full);
  transition: var(--transition);
}
.post-stats button:hover {
  background: var(--bg-soft);
}
.post-stats button:active {
  transform: scale(0.9);
}
.post-stats button.liked {
  color: var(--like);
}
.post-stats button.liked i {
  animation: likePulse 0.3s ease;
}
@keyframes likePulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); }
  100% { transform: scale(1); }
}

.comments-box {
  margin-top: 10px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
  display: none;
}
.comments-box.open {
  display: block;
}

.comment-item {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 12.5px;
  align-items: flex-start;
}
.comment-item img {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  flex-shrink: 0;
}
.comment-item b {
  color: var(--text);
}
.comment-item .comment-text {
  color: var(--text-2);
}

.comment-form {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.comment-form input {
  flex: 1;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 7px 14px;
  color: var(--text);
  font-size: 12.5px;
  outline: none;
  transition: var(--transition);
}
.comment-form input:focus {
  border-color: var(--primary);
}
.comment-form button {
  padding: 7px 16px;
  border-radius: var(--radius-full);
  font-size: 12px;
}

/* ============================================
   دستیار
   ============================================ */
.assistant-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
  gap: 8px;
  margin-bottom: 16px;
}
.stat-chip {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
  transition: var(--transition);
}
.stat-chip:hover {
  border-color: var(--primary);
}
.stat-chip b {
  display: block;
  font-size: 18px;
  color: var(--text);
  margin-bottom: 2px;
}
.stat-chip span {
  font-size: 10px;
  color: var(--text-3);
}

.training-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
}
.training-section h3 {
  font-size: 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.train-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.train-form input,
.train-form textarea {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 10px 14px;
  font-size: 13px;
  outline: none;
  transition: var(--transition);
  font-family: inherit;
}
.train-form input:focus,
.train-form textarea:focus {
  border-color: var(--primary);
}

.qa-list,
.keyword-list {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 180px;
  overflow-y: auto;
}
.qa-item,
.keyword-item {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.qa-item .q,
.keyword-item .k {
  color: var(--text-2);
  font-size: 11px;
}
.qa-item .a,
.keyword-item .r {
  color: var(--text);
}

.auto-post-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.auto-post-section h3 {
  font-size: 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

#autoPostPanel {
  display: none;
  flex-direction: column;
  gap: 8px;
  margin-top: 10px;
}
#autoPostPanel input,
#autoPostPanel textarea {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 10px 14px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
}
#autoPostPanel input:focus,
#autoPostPanel textarea:focus {
  border-color: var(--primary);
}
#autoPostPanel .row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
#autoPostPanel .row input {
  flex: 1;
  min-width: 80px;
}

.assistant-chat-preview {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
}
.assistant-chat-preview .mini-chat {
  max-height: 180px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 10px;
}
.mini-msg {
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 12.5px;
  max-width: 85%;
  word-wrap: break-word;
}
.mini-msg.me {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  border-bottom-right-radius: 4px;
}
.mini-msg.bot {
  align-self: flex-start;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.mini-chat-input {
  display: flex;
  gap: 8px;
}
.mini-chat-input input {
  flex: 1;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 8px 16px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: var(--transition);
}
.mini-chat-input input:focus {
  border-color: var(--primary);
}

/* ============================================
   چت
   ============================================ */
.chat-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
  height: calc(100vh - 200px);
}
.chat-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  flex: 1;
}
.chat-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  cursor: pointer;
  transition: var(--transition);
}
.chat-item:hover {
  border-color: var(--primary);
  background: var(--bg-card-hover);
}
.chat-item:active {
  transform: scale(0.98);
}
.chat-item img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg-soft);
  border: 2px solid var(--border);
}
.chat-item .info {
  flex: 1;
  min-width: 0;
}
.chat-item .info strong {
  font-size: 13px;
  display: block;
}
.chat-item .info p {
  font-size: 11.5px;
  color: var(--text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-item .unread {
  background: var(--primary);
  color: #fff;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: var(--radius-full);
}

.chat-window {
  display: none;
  flex-direction: column;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  height: 100%;
}
.chat-window.open {
  display: flex;
}

.chat-window-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-window-head img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
}
.chat-window-head strong {
  font-size: 14px;
}
.chat-window-head .btn-ghost {
  margin-inline-start: auto;
  font-size: 18px;
  padding: 4px 8px;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  background: var(--bg-soft);
}
.message {
  padding: 9px 15px;
  border-radius: 16px;
  font-size: 13px;
  max-width: 80%;
  line-height: 1.6;
  word-wrap: break-word;
}
.message.sent {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  border-bottom-right-radius: 4px;
}
.message.received {
  align-self: flex-start;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message .time {
  font-size: 9px;
  opacity: 0.6;
  margin-top: 2px;
  display: block;
}

.chat-input {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg-card);
}
.chat-input input {
  flex: 1;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 9px 16px;
  color: var(--text);
  outline: none;
  font-size: 13px;
  transition: var(--transition);
}
.chat-input input:focus {
  border-color: var(--primary);
}
.chat-input button {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  border: none;
  font-size: 15px;
  transition: var(--transition);
}
.chat-input button:hover {
  transform: scale(1.05);
}
.chat-input button:active {
  transform: scale(0.9);
}

/* ============================================
   اکسپلور
   ============================================ */
.explore-grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.explore-user-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  transition: var(--transition);
}
.explore-user-card:hover {
  border-color: var(--border-light);
}

.explore-user-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.explore-user-header img {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  cursor: pointer;
  transition: var(--transition);
}
.explore-user-header img:hover {
  transform: scale(1.05);
}
.explore-user-header .info {
  flex: 1;
  cursor: pointer;
}
.explore-user-header .info h4 {
  font-size: 14px;
  font-weight: 600;
}
.explore-user-header .info .meta {
  font-size: 11px;
  color: var(--text-2);
}
.explore-user-header .follow-btn {
  padding: 5px 16px;
  border-radius: var(--radius-full);
  font-size: 11.5px;
  font-weight: 600;
  border: none;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  transition: var(--transition);
}
.explore-user-header .follow-btn:hover {
  transform: scale(1.05);
}
.explore-user-header .follow-btn:active {
  transform: scale(0.95);
}
.explore-user-header .follow-btn.following {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  color: var(--text-2);
}

.explore-posts {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.explore-post-mini {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  cursor: pointer;
  transition: var(--transition);
}
.explore-post-mini:hover {
  border-color: var(--primary);
}
.explore-post-mini p {
  font-size: 12.5px;
  line-height: 1.7;
}
.explore-post-mini .mini-media {
  margin-top: 6px;
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.explore-post-mini .mini-media img,
.explore-post-mini .mini-media video {
  width: 100%;
  max-height: 150px;
  display: block;
}
.explore-post-mini .mini-stats {
  display: flex;
  gap: 12px;
  font-size: 10.5px;
  color: var(--text-3);
  margin-top: 4px;
}
.explore-post-mini .mini-stats i {
  margin-left: 2px;
}

/* ============================================
   پروفایل عمومی
   ============================================ */
.profile-header {
  text-align: center;
  margin: 16px 0;
}
.profile-header img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 3px solid var(--primary);
  transition: var(--transition);
}
.profile-header img:hover {
  transform: scale(1.05);
}
.profile-header h2 {
  font-size: 18px;
  margin-top: 8px;
}
.profile-header .bio {
  color: var(--text-2);
  font-size: 13px;
  margin-top: 4px;
}

.profile-stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 12px 0;
}
.profile-stats div {
  text-align: center;
}
.profile-stats b {
  display: block;
  font-size: 16px;
}
.profile-stats span {
  font-size: 11px;
  color: var(--text-3);
}

.profile-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 12px;
  flex-wrap: wrap;
}

/* ============================================
   مودال
   ============================================ */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(12px);
  padding: 16px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-content {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 24px;
  border-radius: 20px;
  max-width: 420px;
  width: 100%;
  text-align: center;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.modal-content h2 {
  font-size: 18px;
  margin-bottom: 12px;
}

.avatar-upload {
  position: relative;
  width: 88px;
  height: 88px;
  margin: 0 auto 12px;
}
.avatar-upload img {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: 3px solid var(--primary);
  background: var(--bg-soft);
}
.avatar-upload label {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 30px;
  height: 30px;
  background: var(--primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #fff;
  cursor: pointer;
  border: 2px solid var(--bg-card);
  transition: var(--transition);
}
.avatar-upload label:hover {
  transform: scale(1.1);
}
.avatar-upload input {
  display: none;
}

.name-input {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 12px;
  font-size: 14px;
  margin-bottom: 12px;
  text-align: center;
  outline: none;
  transition: var(--transition);
}
.name-input:focus {
  border-color: var(--primary);
}

/* ============================================
   پنل مدیریت
   ============================================ */
.admin-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.admin-panel h3 {
  font-size: 16px;
  margin-bottom: 12px;
  color: var(--secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.admin-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.admin-tab {
  padding: 6px 16px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
  background: var(--bg-soft);
  color: var(--text-2);
  font-size: 11.5px;
  transition: var(--transition);
  cursor: pointer;
}
.admin-tab:hover {
  border-color: var(--primary);
  color: var(--text);
}
.admin-tab.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.admin-content {
  max-height: 450px;
  overflow-y: auto;
}
.admin-tab-content {
  display: none;
}
.admin-tab-content.active {
  display: block;
}

.admin-user-item,
.admin-post-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 12.5px;
  flex-wrap: wrap;
  gap: 4px;
}
.admin-user-item .name {
  font-weight: 500;
}
.admin-user-item .actions {
  display: flex;
  gap: 4px;
}
.admin-user-item .actions button {
  padding: 3px 12px;
  border-radius: var(--radius-full);
  border: none;
  font-size: 10.5px;
  cursor: pointer;
  transition: var(--transition);
}
.admin-user-item .actions button:hover {
  transform: scale(1.05);
}

.broadcast-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.broadcast-form input,
.broadcast-form textarea {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 10px 14px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
  transition: var(--transition);
}
.broadcast-form input:focus,
.broadcast-form textarea:focus {
  border-color: var(--primary);
}

/* ============================================
   نوتیفیکیشن
   ============================================ */
.notification {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 10px 22px;
  border-radius: var(--radius-full);
  z-index: 999;
  font-size: 12.5px;
  box-shadow: var(--shadow);
  animation: notificationSlide 0.4s ease;
  max-width: 90%;
  display: flex;
  align-items: center;
  gap: 8px;
}
@keyframes notificationSlide {
  from {
    opacity: 0;
    transform: translate(-50%, -20px);
  }
  to {
    opacity: 1;
    transform: translate(-50%, 0);
  }
}

/* ============================================
   وضعیت خالی
   ============================================ */
.empty-state {
  text-align: center;
  color: var(--text-3);
  font-size: 13px;
  padding: 30px 10px;
}
.empty-state i {
  font-size: 32px;
  display: block;
  margin-bottom: 8px;
  opacity: 0.5;
}

/* ============================================
   بارگذاری
   ============================================ */
.loading {
  text-align: center;
  color: var(--text-2);
  padding: 20px;
}
.loading i {
  animation: spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ============================================
   ریسپانسیو
   ============================================ */
@media (max-width: 600px) {
  .main-header { padding: 8px 12px; }
  .profile-btn span { max-width: 50px; font-size: 11px; }
  .user-score { font-size: 10px; padding: 3px 8px; }
  .search-box { padding: 4px 10px; }
  .search-box input { font-size: 11px; }
  
  .page-title { font-size: 17px; }
  .explore-user-header img { width: 36px; height: 36px; }
  .explore-user-header .info h4 { font-size: 12.5px; }
  
  .post-card { padding: 10px; }
  .post-card .content { font-size: 13px; }
  .post-head img { width: 28px; height: 28px; }
  
  .chat-container { height: calc(100vh - 170px); }
  .message { max-width: 90%; font-size: 12.5px; }
  
  .assistant-stats { grid-template-columns: repeat(2, 1fr); }
  .stat-chip b { font-size: 15px; }
  
  .modal-content { padding: 16px; }
  .admin-tabs { gap: 4px; }
  .admin-tab { font-size: 10px; padding: 4px 10px; }
}

@media (max-width: 400px) {
  .nav-btn i { font-size: 16px; }
  .nav-btn { font-size: 8px; padding: 4px 2px; }
  .main-nav { padding: 2px 2px calc(env(safe-area-inset-bottom) + 2px); }
  .profile-btn img { width: 28px; height: 28px; }
  .admin-btn { width: 30px; height: 30px; font-size: 12px; }
}
</style>
</head>
<body>

<header class="main-header">
    <button id="profileBtn" class="profile-btn">
        <img src="" alt="پروفایل" id="avatarImg">
        <span id="userName">کاربر</span>
    </button>
    <div class="header-center">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="جستجوی کاربر یا کانال...">
        </div>
    </div>
    <div class="header-right">
        <span class="user-score" id="userScore">🏆 ۰</span>
        <button class="admin-btn" id="adminBtn" onclick="toggleAdminPanel()">
            <i class="fas fa-crown"></i>
        </button>
    </div>
</header>

<nav class="main-nav">
    <button class="nav-btn active" data-page="channel">
        <i class="fas fa-bullhorn"></i>
        <span>کانال</span>
    </button>
    <button class="nav-btn" data-page="assistant">
        <i class="fas fa-robot"></i>
        <span>دستیار</span>
    </button>
    <button class="nav-btn" data-page="chat">
        <i class="fas fa-envelope"></i>
        <span>چت</span>
        <span class="badge" id="chatBadge" style="display:none;">0</span>
    </button>
    <button class="nav-btn" data-page="explore">
        <i class="fas fa-compass"></i>
        <span>اکسپلور</span>
    </button>
</nav>

<main id="mainContent">
    <!-- صفحه کانال -->
    <section id="channelPage" class="page active">
        <div class="channel-header">
            <h2>
                📢 کانال من
                <span id="boostBadge" class="boost-badge boost-normal">عادی</span>
            </h2>
            <span class="followers-count" id="followersCount">۰ فالوور</span>
        </div>

        <div class="composer">
            <textarea id="postContent" placeholder="چه خبر؟ یه پست جدید بنویس..." rows="2"></textarea>
            <div class="composer-actions">
                <div class="media-buttons">
                    <label>
                        <i class="fas fa-image"></i> عکس
                        <input type="file" id="postImageInput" accept="image/*">
                    </label>
                    <label>
                        <i class="fas fa-video"></i> ویدیو
                        <input type="file" id="postVideoInput" accept="video/*">
                    </label>
                </div>
                <button class="btn-primary" id="publishPostBtn" onclick="createPost()">
                    <i class="fas fa-paper-plane"></i> انتشار
                </button>
            </div>
            <div id="mediaPreview" class="media-preview" style="display:none;">
                <button class="remove-media" onclick="removeMedia()">✕</button>
                <div id="mediaPreviewContent"></div>
            </div>
        </div>

        <div id="channelPosts" class="posts-container"></div>
    </section>

    <!-- صفحه دستیار -->
    <section id="assistantPage" class="page">
        <h2 class="page-title"><i class="fas fa-robot"></i> دستیار من</h2>
        
        <div class="assistant-stats">
            <div class="stat-chip">
                <b id="statPosts">۰</b>
                <span>پست</span>
            </div>
            <div class="stat-chip">
                <b id="statTrainings">۰</b>
                <span>آموزش</span>
            </div>
            <div class="stat-chip">
                <b id="statFollowers">۰</b>
                <span>فالوور</span>
            </div>
            <div class="stat-chip">
                <b id="statEngagement">۰٪</b>
                <span>تعامل</span>
            </div>
        </div>

        <div class="assistant-chat-preview">
            <h3 style="font-size:13px;margin-bottom:8px;">💬 امتحان کن</h3>
            <div class="mini-chat" id="assistantPreviewChat"></div>
            <div class="mini-chat-input">
                <input type="text" id="assistantPreviewInput" placeholder="یه چیزی بپرس...">
                <button class="btn-secondary" onclick="testAssistant()">پرسیدن</button>
            </div>
        </div>

        <div class="training-section">
            <h3>📝 سوال و جواب</h3>
            <div class="train-form">
                <input type="text" id="questionInput" placeholder="سوال...">
                <input type="text" id="answerInput" placeholder="جواب...">
                <button class="btn-primary" onclick="trainAssistant()">یاد بده!</button>
            </div>
            <div id="qaList" class="qa-list"></div>
        </div>

        <div class="training-section">
            <h3>🔑 کلمات کلیدی</h3>
            <div class="train-form">
                <input type="text" id="keywordInput" placeholder="کلمه کلیدی...">
                <input type="text" id="keywordResponseInput" placeholder="پاسخ...">
                <button class="btn-primary" onclick="trainKeyword()">ثبت کن</button>
            </div>
            <div id="keywordList" class="keyword-list"></div>
        </div>

        <div class="auto-post-section">
            <h3>📅 زمان‌بندی پست‌ها</h3>
            <button class="btn-secondary" onclick="toggleAutoPost()">مدیریت زمان‌بندی</button>
            <div id="autoPostPanel">
                <input type="number" id="postCount" placeholder="تعداد پست‌ها..." min="1" max="30">
                <textarea id="postDescriptions" placeholder="توضیحات هر پست (یک در هر خط)..." rows="3"></textarea>
                <div class="row">
                    <input type="time" id="postTime" value="09:00">
                    <input type="number" id="postInterval" placeholder="فاصله (روز)" min="1" value="1">
                </div>
                <div class="row">
                    <label class="btn-ghost" style="cursor:pointer;display:flex;align-items:center;gap:4px;">
                        <i class="fas fa-image"></i> عکس‌ها
                        <input type="file" id="scheduleImages" accept="image/*" multiple style="display:none;">
                    </label>
                    <label class="btn-ghost" style="cursor:pointer;display:flex;align-items:center;gap:4px;">
                        <i class="fas fa-video"></i> ویدیوها
                        <input type="file" id="scheduleVideos" accept="video/*" multiple style="display:none;">
                    </label>
                </div>
                <button class="btn-primary" onclick="schedulePosts()">زمان‌بندی کن</button>
            </div>
            <div id="scheduledPostsList" style="margin-top:8px;"></div>
        </div>
    </section>

    <!-- صفحه چت -->
    <section id="chatPage" class="page">
        <h2 class="page-title"><i class="fas fa-envelope"></i> چت خصوصی</h2>
        <div class="chat-container">
            <div class="chat-list" id="chatList"></div>
            <div class="chat-window" id="chatWindow">
                <div class="chat-window-head">
                    <img id="chatWithAvatar" src="">
                    <strong id="chatWithName"></strong>
                    <button class="btn-ghost" onclick="closeChatWindow()">✕</button>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="پیام...">
                    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </section>

    <!-- صفحه اکسپلور -->
    <section id="explorePage" class="page">
        <h2 class="page-title"><i class="fas fa-compass"></i> اکتشاف</h2>
        <div id="exploreContent" class="explore-grid"></div>
    </section>

    <!-- صفحه پروفایل عمومی -->
    <section id="profilePage" class="page">
        <button class="btn-ghost" onclick="backFromProfile()">← بازگشت</button>
        <div class="profile-header">
            <img id="viewAvatar" src="">
            <h2 id="viewName"></h2>
            <p class="bio" id="viewBio"></p>
            <div class="profile-stats">
                <div><b id="viewFollowers">۰</b><span>فالوور</span></div>
                <div><b id="viewPosts">۰</b><span>پست</span></div>
                <div><b id="viewScore">۰</b><span>امتیاز</span></div>
            </div>
            <div class="profile-actions">
                <button class="btn-primary" id="viewFollowBtn" onclick="toggleFollowView()">فالو</button>
                <button class="btn-secondary" onclick="openChatFromProfile()">پیام</button>
            </div>
        </div>

        <div class="assistant-chat-preview">
            <h3 style="font-size:13px;margin-bottom:8px;">🤖 از دستیار این کاربر بپرس</h3>
            <div class="mini-chat" id="viewAssistantChat"></div>
            <div class="mini-chat-input">
                <input type="text" id="viewAssistantInput" placeholder="سوالت رو بپرس...">
                <button class="btn-secondary" onclick="askOtherAssistant()">پرسیدن</button>
            </div>
        </div>

        <div id="viewPostsContainer" class="posts-container"></div>
    </section>

    <!-- صفحه پنل مدیریت -->
    <section id="adminPage" class="page">
        <div class="admin-panel">
            <h3>👑 پنل مدیریت</h3>
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="stats" onclick="switchAdminTab('stats')">📊 آمار</button>
                <button class="admin-tab" data-tab="broadcast" onclick="switchAdminTab('broadcast')">📢 ارسال همگانی</button>
                <button class="admin-tab" data-tab="users" onclick="switchAdminTab('users')">👥 کاربران</button>
                <button class="admin-tab" data-tab="posts" onclick="switchAdminTab('posts')">📝 پست‌ها</button>
                <button class="admin-tab" data-tab="channels" onclick="switchAdminTab('channels')">📢 کانال‌ها</button>
            </div>
            <div class="admin-content">
                <div id="adminStats" class="admin-tab-content active">
                    <div id="adminStatsContent"></div>
                </div>
                <div id="adminBroadcast" class="admin-tab-content">
                    <div class="broadcast-form">
                        <input type="text" id="broadcastTitle" placeholder="عنوان اعلان...">
                        <textarea id="broadcastMessage" placeholder="متن پیام..." rows="3"></textarea>
                        <button class="btn-primary" onclick="sendBroadcast()">ارسال به همه</button>
                    </div>
                </div>
                <div id="adminUsers" class="admin-tab-content">
                    <div id="adminUsersList"></div>
                </div>
                <div id="adminPosts" class="admin-tab-content">
                    <div id="adminPostsList"></div>
                </div>
                <div id="adminChannels" class="admin-tab-content">
                    <div id="adminChannelsList"></div>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>
