<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>یارِ من - پلتفرم هوشمند اجتماعی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ============================================
   تم حرفه‌ای اینستاگرامی
   ============================================ */
:root {
  --bg: #0a0b1a;
  --bg-soft: #111427;
  --bg-card: #161a33;
  --bg-card-hover: #1e2350;
  --border: #262d55;
  --border-light: #323b6e;
  --text: #ffffff;
  --text-2: #a8b0d6;
  --text-3: #6b74a8;
  --primary: #7c6cf6;
  --primary-dark: #5b4fd6;
  --primary-light: #9a8cff;
  --primary-glow: rgba(124, 108, 246, 0.3);
  --secondary: #f6b93b;
  --success: #4ade80;
  --danger: #f45b69;
  --warning: #fbbf24;
  --info: #60a5fa;
  --like: #ff5c8a;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-full: 99px;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 40px rgba(124, 108, 246, 0.15);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg: #f0f2f8;
  --bg-soft: #e8eaf2;
  --bg-card: #ffffff;
  --bg-card-hover: #f5f6fb;
  --border: #d5d8e8;
  --border-light: #c5c8dd;
  --text: #12131f;
  --text-2: #4c5070;
  --text-3: #7a7e9c;
  --shadow: 0 8px 32px rgba(20, 22, 50, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Vazirmatn', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
  overflow-x: hidden;
  background-image: radial-gradient(ellipse at 10% 0%, rgba(124, 108, 246, 0.06) 0%, transparent 60%);
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-soft); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 99px; }

/* ============================================
   هدر - مثل اینستاگرام
   ============================================ */
.main-header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: rgba(10, 11, 26, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.profile-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  color: var(--text);
  padding: 0;
  min-width: 50px;
  cursor: pointer;
  transition: var(--transition);
}
.profile-btn:hover { opacity: 0.8; }
.profile-btn img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  background: var(--bg-card);
  transition: var(--transition);
}
.profile-btn img:hover { border-color: var(--primary-light); }
.profile-btn span {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 70px;
}

.header-center { flex: 1; max-width: 400px; min-width: 0; }
.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 6px 14px;
  transition: var(--transition);
}
.search-box:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 20px var(--primary-glow);
}
.search-box i { color: var(--text-3); font-size: 14px; }
.search-box input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  width: 100%;
  font-size: 13px;
  padding: 5px 0;
}
.search-box input::placeholder { color: var(--text-3); }

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.user-score {
  font-size: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: var(--radius-full);
  color: var(--secondary);
  font-weight: 700;
}
.admin-btn {
  background: linear-gradient(135deg, var(--secondary), #d49a2a);
  color: #0a0b1a;
  border: none;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  font-size: 14px;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition);
}
.admin-btn.show { display: flex; }
.admin-btn:hover { transform: scale(1.05); }

.theme-toggle-btn {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 50%;
  width: 36px;
  height: 36px;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition);
}
.theme-toggle-btn:hover { transform: scale(1.05); }

/* ============================================
   ناوبری پایین - مثل اینستاگرام
   ============================================ */
.main-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  gap: 6px;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  box-shadow: 0 -8px 28px rgba(0,0,0,0.2);
  padding: 12px 10px calc(env(safe-area-inset-bottom) + 12px);
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: none;
  background: transparent;
  color: var(--text-3);
  padding: 8px 4px 6px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  transition: var(--transition);
  position: relative;
  cursor: pointer;
}
.nav-btn i { font-size: 26px; transition: var(--transition); }
.nav-btn span { font-size: 10px; }

.nav-btn.active {
  color: var(--primary);
}
.nav-btn.active i { transform: translateY(-2px); }
.nav-btn:active { transform: scale(0.9); }

.nav-btn .badge {
  position: absolute;
  top: 0;
  right: 12px;
  background: var(--danger);
  color: #fff;
  font-size: 9px;
  padding: 1px 6px;
  border-radius: var(--radius-full);
  min-width: 16px;
  text-align: center;
}

/* ============================================
   صفحات
   ============================================ */
main { max-width: 720px; margin: 0 auto; padding: 12px 14px; }
.page { display: none; animation: fadeIn 0.3s ease; }
.page.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.page-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.page-title i { color: var(--primary); }

/* ============================================
   دکمه‌ها - متوسط و حرفه‌ای
   ============================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 24px;
  border: none;
  border-radius: var(--radius-full);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.btn:active { transform: scale(0.95); }

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  box-shadow: 0 4px 20px var(--primary-glow);
}
.btn-primary:hover { transform: translateY(-2px); }

.btn-secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg-card-hover); }

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  padding: 8px 16px;
}
.btn-ghost:hover { color: var(--text); background: var(--bg-soft); }

.btn-danger {
  background: linear-gradient(135deg, var(--danger), #d94452);
  color: #fff;
}
.btn-success {
  background: linear-gradient(135deg, var(--success), #22c55e);
  color: #0a0b1a;
}

/* ============================================
   کامپوزر پست
   ============================================ */
.composer {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
  transition: var(--transition);
}
.composer:focus-within {
  border-color: var(--primary);
  box-shadow: var(--shadow-glow);
}
.composer textarea {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 12px;
  resize: vertical;
  min-height: 60px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: var(--transition);
}
.composer textarea:focus { border-color: var(--primary); }
.composer-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  flex-wrap: wrap;
  gap: 8px;
}
.composer-actions .media-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
.composer-actions .media-buttons label {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  font-size: 12px;
  color: var(--text-2);
  cursor: pointer;
  transition: var(--transition);
}
.composer-actions .media-buttons label:hover { border-color: var(--primary); color: var(--text); }
.composer-actions .media-buttons input { display: none; }

.media-preview {
  width: 100%;
  margin-top: 10px;
  border-radius: var(--radius-sm);
  position: relative;
  background: var(--bg-soft);
  overflow: hidden;
}
.media-preview img, .media-preview video {
  width: 100%;
  max-height: 300px;
  display: block;
  border-radius: var(--radius-sm);
}
.media-preview .remove-media {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.8);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  font-size: 14px;
  cursor: pointer;
}

/* ============================================
   پست‌ها
   ============================================ */
.posts-container { display: flex; flex-direction: column; gap: 14px; }

.post-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  transition: var(--transition);
}
.post-card:hover { border-color: var(--border-light); }

.post-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.post-head img {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid var(--border);
  cursor: pointer;
  background: var(--bg-soft);
}
.post-head img:hover { border-color: var(--primary); }
.post-head .name {
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.post-head .time {
  font-size: 11px;
  color: var(--text-3);
  margin-inline-start: auto;
}

.post-card .content {
  font-size: 14px;
  line-height: 1.8;
  white-space: pre-wrap;
  margin-bottom: 10px;
}

.post-card .media-wrapper {
  width: 100%;
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 10px;
  background: var(--bg-soft);
}
.post-card .media-wrapper img,
.post-card .media-wrapper video {
  width: 100%;
  max-height: 450px;
  display: block;
}

.post-stats {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-2);
  border-top: 1px solid var(--border);
  padding-top: 10px;
}
.post-stats button {
  background: none;
  border: none;
  color: var(--text-2);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: var(--radius-full);
  cursor: pointer;
  transition: var(--transition);
}
.post-stats button:hover { background: var(--bg-soft); }
.post-stats button.liked { color: var(--like); }
.post-stats button.liked i { animation: likePulse 0.3s ease; }

@keyframes likePulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

.comments-box {
  margin-top: 10px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
  display: none;
}
.comments-box.open { display: block; }

.comment-item {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 13px;
  align-items: flex-start;
}
.comment-item img {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  flex-shrink: 0;
}
.comment-item b { color: var(--text); }
.comment-item .comment-text { color: var(--text-2); }

.comment-form {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.comment-form input {
  flex: 1;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 7px 14px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.comment-form input:focus { border-color: var(--primary); }
.comment-form button { padding: 7px 18px; font-size: 12px; }

/* ============================================
   استوری - مثل اینستاگرام
   ============================================ */
.stories-row {
  display: flex;
  gap: 14px;
  padding: 10px 0 14px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.stories-row::-webkit-scrollbar { display: none; }

.story-ring {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  flex-shrink: 0;
}
.story-ring .ring {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  position: relative;
}
.story-ring .ring img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--bg);
}
.story-ring .ring.add {
  background: var(--bg-card);
  border: 2px dashed var(--border);
}
.story-ring .ring.add img { border: none; opacity: 0.5; }
.story-ring .ring.add i {
  position: absolute;
  bottom: -2px;
  right: -2px;
  background: var(--primary);
  border-radius: 50%;
  padding: 4px;
  font-size: 12px;
  border: 2px solid var(--bg);
}
.story-ring span {
  font-size: 10px;
  color: var(--text-2);
  max-width: 68px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.story-viewer {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(0,0,0,0.95);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.story-viewer.open { display: flex; }
.story-viewer .story-content {
  max-width: 100%;
  max-height: 85vh;
  border-radius: 12px;
}
.story-viewer .story-content img,
.story-viewer .story-content video {
  max-width: 100%;
  max-height: 85vh;
  object-fit: contain;
}
.story-viewer .story-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: none;
  color: #fff;
  font-size: 28px;
  cursor: pointer;
}
.story-viewer .story-user {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-size: 14px;
  background: rgba(0,0,0,0.5);
  padding: 8px 24px;
  border-radius: var(--radius-full);
}

/* ============================================
   اکسپلور - گرید ۳ ستونی
   ============================================ */
.explore-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
  margin: 0 -14px;
  width: calc(100% + 28px);
}

.explore-tile {
  position: relative;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  cursor: pointer;
  background: var(--bg-card);
}
.explore-tile img,
.explore-tile video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}
.explore-tile:active img,
.explore-tile:active video { transform: scale(1.05); }
.explore-tile .tile-video-badge {
  position: absolute;
  top: 6px;
  left: 6px;
  color: #fff;
  font-size: 14px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}
.explore-tile .tile-overlay {
  position: absolute;
  inset: auto 0 0 0;
  background: linear-gradient(0deg, rgba(0,0,0,0.7), transparent);
  padding: 18px 6px 6px;
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
}
.explore-tile .tile-overlay span i { margin-left: 4px; }

/* ============================================
   نمایش تمام‌صفحه پست (اینستاگرامی)
   ============================================ */
.post-full-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(0,0,0,0.95);
  display: none;
  flex-direction: column;
}
.post-full-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

.post-full-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
}

.post-full-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(0,0,0,0.3);
  flex-shrink: 0;
  z-index: 2;
}
.post-full-head img {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  cursor: pointer;
  flex-shrink: 0;
}
.pf-info { flex: 1; min-width: 0; cursor: pointer; }
.pf-info h4 { font-size: 15px; font-weight: 700; color: #fff; }
.pf-time { font-size: 11px; color: rgba(255,255,255,0.6); }
.pf-close {
  background: none;
  border: none;
  color: #fff;
  font-size: 24px;
  padding: 8px;
  cursor: pointer;
}

.post-full-media {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  min-height: 300px;
}
.post-full-media img,
.post-full-media video {
  max-width: 100%;
  max-height: 70vh;
  object-fit: contain;
  display: block;
}

.post-full-bottom {
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
  padding: 12px 16px 16px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.post-full-caption {
  font-size: 14px;
  line-height: 1.7;
  color: #fff;
  margin-bottom: 10px;
}
.post-full-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.post-full-actions .btn-plastic {
  flex: 1;
  justify-content: center;
  min-width: 60px;
  padding: 10px 14px;
  font-size: 13px;
}

.btn-plastic {
  border: none;
  border-radius: var(--radius-full);
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #fff;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}
.btn-plastic::before {
  content: '';
  position: absolute;
  inset: 0 0 55% 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.5), rgba(255,255,255,0));
  pointer-events: none;
}
.btn-plastic--pistachio {
  background: linear-gradient(160deg, #ddf2b4, #a6d573 55%, #6e9e3f);
  box-shadow: 0 3px 0 #6e9e3f, 0 6px 12px rgba(110,158,63,0.3);
}
.btn-plastic--red {
  background: linear-gradient(160deg, #ff9d9d, #f0525c 55%, #c22832);
  box-shadow: 0 3px 0 #c22832, 0 6px 12px rgba(194,40,50,0.3);
}
.btn-plastic--white {
  background: linear-gradient(160deg, #ffffff, #f1f2f6 55%, #c7cad4);
  color: #3a3d46;
  box-shadow: 0 3px 0 #c7cad4, 0 6px 12px rgba(0,0,0,0.15);
}
.btn-plastic:active { transform: translateY(3px); }

.post-full-comments {
  max-height: 160px;
  overflow-y: auto;
  padding: 8px 12px;
  background: rgba(0,0,0,0.2);
  margin-top: 6px;
  border-radius: 8px;
}
.post-full-comments .comment-item {
  display: flex;
  gap: 6px;
  margin-bottom: 4px;
  font-size: 12px;
  align-items: flex-start;
  color: #fff;
}
.post-full-comments .comment-item img {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  flex-shrink: 0;
}
.post-full-comments .comment-item b { color: #fff; }
.post-full-comments .comment-item .comment-text { color: rgba(255,255,255,0.7); }
.post-full-comments .comment-form {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}
.post-full-comments .comment-form input {
  flex: 1;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-full);
  padding: 6px 14px;
  color: #fff;
  font-size: 12px;
  outline: none;
}
.post-full-comments .comment-form input:focus { border-color: var(--primary); }

/* ============================================
   چت
   ============================================ */
.chat-list-container { display: flex; flex-direction: column; gap: 2px; }
.chat-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  padding: 12px 4px;
  cursor: pointer;
  transition: var(--transition);
}
.chat-item:active { background: var(--bg-card-hover); }
.chat-item img {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--bg-soft);
  border: 2px solid var(--border);
  flex-shrink: 0;
}
.chat-item .info { flex: 1; min-width: 0; }
.chat-item .info strong { font-size: 15px; display: block; margin-bottom: 2px; }
.chat-item .info p {
  font-size: 13px;
  color: var(--text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-item .unread {
  background: var(--primary);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  min-width: 20px;
  height: 20px;
  padding: 0 6px;
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  justify-content: center;
}

.chat-thread-overlay {
  position: fixed;
  inset: 0;
  z-index: 320;
  background: var(--bg);
  display: none;
  flex-direction: column;
}
.chat-thread-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

.chat-thread-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  padding-top: calc(env(safe-area-inset-top) + 10px);
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
}
.chat-thread-back {
  background: none;
  border: none;
  color: var(--text);
  font-size: 20px;
  padding: 4px;
  cursor: pointer;
}
.chat-thread-head img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  flex-shrink: 0;
}
.chat-thread-head strong { font-size: 15px; cursor: pointer; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.chat-mode-selector {
  display: flex;
  gap: 4px;
  margin-right: auto;
}
.chat-mode-selector button {
  padding: 4px 12px;
  font-size: 11px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-2);
  cursor: pointer;
  transition: var(--transition);
}
.chat-mode-selector button.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.chat-thread-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.message {
  padding: 8px 16px;
  border-radius: 18px;
  font-size: 14px;
  max-width: 80%;
  line-height: 1.6;
  word-wrap: break-word;
}
.message.sent {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  border-bottom-right-radius: 4px;
}
.message.received {
  align-self: flex-start;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message .time {
  font-size: 9px;
  opacity: 0.5;
  margin-top: 2px;
  display: block;
}

.chat-thread-input {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  padding-bottom: calc(env(safe-area-inset-bottom) + 10px);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg-card);
}
.chat-thread-input input {
  flex: 1;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 10px 16px;
  color: var(--text);
  outline: none;
  font-size: 14px;
}
.chat-thread-input input:focus { border-color: var(--primary); }
.chat-thread-input button {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  border: none;
  font-size: 16px;
  cursor: pointer;
  transition: var(--transition);
}
.chat-thread-input button:active { transform: scale(0.9); }

/* ============================================
   پروفایل عمومی
   ============================================ */
.profile-header {
  text-align: center;
  margin: 16px 0;
}
.profile-header img {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: 3px solid var(--primary);
  transition: var(--transition);
}
.profile-header img:hover { transform: scale(1.05); }
.profile-header h2 { font-size: 20px; margin-top: 8px; }
.profile-header .bio { color: var(--text-2); font-size: 13px; margin-top: 4px; }

.profile-stats {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin: 12px 0;
}
.profile-stats div { text-align: center; }
.profile-stats b { display: block; font-size: 18px; }
.profile-stats span { font-size: 12px; color: var(--text-3); }

.profile-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 12px;
  flex-wrap: wrap;
}

/* ============================================
   دستیار
   ============================================ */
.assistant-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.stat-chip {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
}
.stat-chip b { display: block; font-size: 18px; color: var(--text); }
.stat-chip span { font-size: 10px; color: var(--text-3); }

.training-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
}
.training-section h3 { font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

.train-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.train-form input,
.train-form textarea {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 10px 14px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
}
.train-form input:focus,
.train-form textarea:focus { border-color: var(--primary); }

.qa-list,
.keyword-list {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 160px;
  overflow-y: auto;
}
.qa-item,
.keyword-item {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.qa-item .q,
.keyword-item .k { color: var(--text-2); font-size: 11px; }
.qa-item .a,
.keyword-item .r { color: var(--text); }

/* ============================================
   پنل مدیریت
   ============================================ */
.admin-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.admin-panel h3 {
  font-size: 16px;
  margin-bottom: 12px;
  color: var(--secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.admin-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.admin-tab {
  padding: 6px 16px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
  background: var(--bg-soft);
  color: var(--text-2);
  font-size: 11px;
  cursor: pointer;
  transition: var(--transition);
}
.admin-tab:hover { border-color: var(--primary); color: var(--text); }
.admin-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.admin-content { max-height: 420px; overflow-y: auto; }
.admin-tab-content { display: none; }
.admin-tab-content.active { display: block; }

.admin-user-item,
.admin-post-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  flex-wrap: wrap;
  gap: 4px;
}
.admin-user-item .name { font-weight: 500; }
.admin-user-item .actions { display: flex; gap: 4px; }
.admin-user-item .actions button {
  padding: 3px 12px;
  border-radius: var(--radius-full);
  border: none;
  font-size: 10px;
  cursor: pointer;
}

.broadcast-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.broadcast-form input,
.broadcast-form textarea {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 10px 14px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
}
.broadcast-form input:focus,
.broadcast-form textarea:focus { border-color: var(--primary); }

/* ============================================
   مودال
   ============================================ */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(12px);
  padding: 16px;
}
.modal-content {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 24px;
  border-radius: 20px;
  max-width: 420px;
  width: 100%;
  text-align: center;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-content h2 { font-size: 18px; margin-bottom: 12px; }

.avatar-upload {
  position: relative;
  width: 88px;
  height: 88px;
  margin: 0 auto 12px;
}
.avatar-upload img {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: 3px solid var(--primary);
  background: var(--bg-soft);
}
.avatar-upload label {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 30px;
  height: 30px;
  background: var(--primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #fff;
  cursor: pointer;
  border: 2px solid var(--bg-card);
}
.avatar-upload input { display: none; }

.name-input {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 12px;
  font-size: 14px;
  margin-bottom: 12px;
  text-align: center;
  outline: none;
}
.name-input:focus { border-color: var(--primary); }

/* ============================================
   نوتیفیکیشن
   ============================================ */
.notification {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 10px 22px;
  border-radius: var(--radius-full);
  z-index: 999;
  font-size: 13px;
  box-shadow: var(--shadow);
  animation: slideDown 0.3s ease;
  max-width: 90%;
}
@keyframes slideDown {
  from { opacity: 0; transform: translate(-50%, -20px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

.empty-state {
  text-align: center;
  color: var(--text-3);
  font-size: 13px;
  padding: 30px 10px;
}
.empty-state i { font-size: 32px; display: block; margin-bottom: 8px; opacity: 0.5; }

.loading {
  text-align: center;
  color: var(--text-2);
  padding: 20px;
}
.loading i { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================
   ریسپانسیو
   ============================================ */
@media (max-width: 600px) {
  .main-header { padding: 8px 12px; }
  .profile-btn span { max-width: 50px; font-size: 11px; }
  .profile-btn img { width: 32px; height: 32px; }
  .user-score { font-size: 10px; padding: 3px 8px; }
  .search-box { padding: 4px 10px; }
  .search-box input { font-size: 12px; }
  .nav-btn i { font-size: 22px; }
  .nav-btn { font-size: 10px; }
  .page-title { font-size: 18px; }
  .post-card { padding: 12px; }
  .post-card .content { font-size: 13px; }
  .story-ring .ring { width: 60px; height: 60px; }
  .explore-grid { gap: 2px; margin: 0 -12px; width: calc(100% + 24px); }
  .assistant-stats { grid-template-columns: repeat(2, 1fr); }
  .profile-header img { width: 76px; height: 76px; }
}

@media (max-width: 400px) {
  .main-nav { padding: 8px 6px calc(env(safe-area-inset-bottom) + 8px); gap: 4px; }
  .nav-btn i { font-size: 18px; }
  .nav-btn span { font-size: 9px; }
  .profile-btn img { width: 28px; height: 28px; }
  .admin-btn { width: 30px; height: 30px; font-size: 12px; }
  .theme-toggle-btn { width: 30px; height: 30px; font-size: 12px; }
  .story-ring .ring { width: 52px; height: 52px; }
  .btn { padding: 8px 16px; font-size: 12px; }
}
</style>
</head>
<body>

<header class="main-header">
    <button id="profileBtn" class="profile-btn">
        <img src="" alt="پروفایل" id="avatarImg">
        <span id="userName">کاربر</span>
    </button>
    <div class="header-center">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="جستجو...">
        </div>
    </div>
    <div class="header-right">
        <span class="user-score" id="userScore">🏆 ۰</span>
        <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="admin-btn" id="adminBtn" onclick="toggleAdminPanel()">
            <i class="fas fa-crown"></i>
        </button>
    </div>
</header>

<nav class="main-nav">
    <button class="nav-btn active" data-page="channel">
        <i class="fas fa-bullhorn"></i>
        <span>کانال</span>
    </button>
    <button class="nav-btn" data-page="assistant">
        <i class="fas fa-robot"></i>
        <span>دستیار</span>
    </button>
    <button class="nav-btn" data-page="chat">
        <i class="fas fa-envelope"></i>
        <span>چت</span>
        <span class="badge" id="chatBadge" style="display:none;">0</span>
    </button>
    <button class="nav-btn" data-page="explore">
        <i class="fas fa-compass"></i>
        <span>اکسپلور</span>
    </button>
</nav>

<main id="mainContent">

    <!-- ===== صفحه کانال ===== -->
    <section id="channelPage" class="page active">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <h2 style="font-size:18px;">📢 کانال من</h2>
            <span style="font-size:12px;color:var(--text-2);" id="followersCount">۰ فالوور</span>
        </div>

        <!-- استوری‌ها -->
        <div class="stories-row" id="storiesRow"></div>

        <!-- کامپوزر -->
        <div class="composer">
            <textarea id="postContent" placeholder="چه خبر؟ یه پست جدید بنویس..." rows="2"></textarea>
            <div class="composer-actions">
                <div class="media-buttons">
                    <label><i class="fas fa-image"></i> عکس<input type="file" id="postImageInput" accept="image/*"></label>
                    <label><i class="fas fa-video"></i> ویدیو<input type="file" id="postVideoInput" accept="video/*"></label>
                </div>
                <button class="btn-primary" onclick="createPost()"><i class="fas fa-paper-plane"></i> انتشار</button>
            </div>
            <div id="mediaPreview" class="media-preview" style="display:none;">
                <button class="remove-media" onclick="removeMedia()">✕</button>
                <div id="mediaPreviewContent"></div>
            </div>
        </div>

        <div id="channelPosts" class="posts-container"></div>
    </section>

    <!-- ===== صفحه دستیار ===== -->
    <section id="assistantPage" class="page">
        <h2 class="page-title"><i class="fas fa-robot"></i> دستیار من</h2>
        <div class="assistant-stats">
            <div class="stat-chip"><b id="statPosts">۰</b><span>پست</span></div>
            <div class="stat-chip"><b id="statTrainings">۰</b><span>آموزش</span></div>
            <div class="stat-chip"><b id="statFollowers">۰</b><span>فالوور</span></div>
            <div class="stat-chip"><b id="statEngagement">۰%</b><span>تعامل</span></div>
        </div>

        <div class="training-section">
            <h3>📝 سوال و جواب</h3>
            <div class="train-form">
                <input type="text" id="questionInput" placeholder="سوال...">
                <input type="text" id="answerInput" placeholder="جواب...">
                <button class="btn-primary" onclick="trainAssistant()">یاد بده!</button>
            </div>
            <div id="qaList" class="qa-list"></div>
        </div>

        <div class="training-section">
            <h3>🔑 کلمات کلیدی</h3>
            <div class="train-form">
                <input type="text" id="keywordInput" placeholder="کلمه کلیدی...">
                <input type="text" id="keywordResponseInput" placeholder="پاسخ...">
                <button class="btn-primary" onclick="trainKeyword()">ثبت کن</button>
            </div>
            <div id="keywordList" class="keyword-list"></div>
        </div>
    </section>

    <!-- ===== صفحه چت ===== -->
    <section id="chatPage" class="page">
        <h2 class="page-title"><i class="fas fa-envelope"></i> چت خصوصی</h2>
        <div class="chat-list-container" id="chatList"></div>
    </section>

    <!-- ===== صفحه مکالمه ===== -->
    <div class="chat-thread-overlay" id="chatThreadOverlay">
        <div class="chat-thread-head">
            <button class="chat-thread-back" onclick="closeChatWindow()"><i class="fas fa-arrow-right"></i></button>
            <img id="chatWithAvatar" src="" onclick="chatThreadOpenProfile()">
            <strong id="chatWithName" onclick="chatThreadOpenProfile()"></strong>
            <div class="chat-mode-selector">
                <button id="chatModeUser" onclick="setChatMode('user')">👤 کاربر</button>
                <button id="chatModeAssistant" class="active" onclick="setChatMode('assistant')">🤖 دستیار</button>
            </div>
        </div>
        <div class="chat-thread-messages" id="chatMessages"></div>
        <div class="chat-thread-input">
            <input type="text" id="messageInput" placeholder="پیام..." onkeydown="if(event.key==='Enter'){sendMessage();}">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- ===== صفحه اکسپلور ===== -->
    <section id="explorePage" class="page">
        <h2 class="page-title"><i class="fas fa-compass"></i> اکتشاف</h2>
        <div id="exploreContent" class="explore-grid"></div>
    </section>

    <!-- ===== نمایش تمام‌صفحه پست ===== -->
    <div class="post-full-overlay" id="postFullOverlay">
        <div class="post-full-container">
            <div class="post-full-head">
                <img id="pfAvatar" src="" onclick="pfOpenProfile()">
                <div class="pf-info" onclick="pfOpenProfile()">
                    <h4 id="pfName"></h4>
                    <span class="pf-time" id="pfTime"></span>
                </div>
                <button class="pf-close" onclick="closePostFullscreen()"><i class="fas fa-times"></i></button>
            </div>
            <div class="post-full-media" id="pfMedia"></div>
            <div class="post-full-bottom">
                <p class="post-full-caption" id="pfCaption"></p>
                <div class="post-full-actions">
                    <button class="btn-plastic btn-plastic--red" id="pfLikeBtn" onclick="pfToggleLike()">
                        <i class="far fa-heart"></i><span id="pfLikeCount">0</span>
                    </button>
                    <button class="btn-plastic btn-plastic--pistachio" onclick="pfToggleComments()">
                        <i class="far fa-comment"></i><span id="pfCommentCount">0</span>
                    </button>
                    <button class="btn-plastic btn-plastic--white" onclick="pfShare()"><i class="fas fa-share-alt"></i></button>
                    <button class="btn-plastic btn-plastic--pistachio" onclick="pfMessage()"><i class="far fa-envelope"></i></button>
                    <button class="btn-plastic btn-plastic--white" onclick="showPaymentInfo()" style="font-size:11px;padding:6px 12px;">
                        <i class="fas fa-arrow-up"></i> ارتقاع
                    </button>
                </div>
                <div class="post-full-comments" id="pfCommentsBox"></div>
            </div>
        </div>
    </div>

    <!-- ===== نمایش استوری ===== -->
    <div class="story-viewer" id="storyViewer">
        <button class="story-close" onclick="closeStory()"><i class="fas fa-times"></i></button>
        <div id="storyContent"></div>
        <div class="story-user" id="storyUser"></div>
    </div>

    <!-- ===== صفحه پروفایل عمومی ===== -->
    <section id="profilePage" class="page">
        <button class="btn-ghost" onclick="backFromProfile()"><i class="fas fa-arrow-right"></i> بازگشت</button>
        <div class="profile-header">
            <img id="viewAvatar" src="">
            <h2 id="viewName"></h2>
            <p class="bio" id="viewBio"></p>
            <div class="profile-stats">
                <div><b id="viewFollowers">۰</b><span>فالوور</span></div>
                <div><b id="viewPosts">۰</b><span>پست</span></div>
                <div><b id="viewScore">۰</b><span>امتیاز</span></div>
            </div>
            <div class="profile-actions">
                <button class="btn-primary" id="viewFollowBtn" onclick="toggleFollowView()">فالو</button>
                <button class="btn-secondary" onclick="openChatFromProfile()">پیام</button>
            </div>
        </div>
        <div id="viewPostsContainer" class="posts-container"></div>
    </section>

    <!-- ===== پنل مدیریت ===== -->
    <section id="adminPage" class="page">
        <div class="admin-panel">
            <h3>👑 پنل مدیریت</h3>
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="stats" onclick="switchAdminTab('stats')">📊 آمار</button>
                <button class="admin-tab" data-tab="broadcast" onclick="switchAdminTab('broadcast')">📢 همگانی</button>
                <button class="admin-tab" data-tab="users" onclick="switchAdminTab('users')">👥 کاربران</button>
                <button class="admin-tab" data-tab="posts" onclick="switchAdminTab('posts')">📝 پست‌ها</button>
                <button class="admin-tab" data-tab="channels" onclick="switchAdminTab('channels')">📢 کانال‌ها</button>
                <button class="admin-tab" data-tab="reports" onclick="switchAdminTab('reports')">🚩 گزارش‌ها</button>
                <button class="admin-tab" data-tab="ads" onclick="switchAdminTab('ads')">🎯 تبلیغات</button>
                <button class="admin-tab" data-tab="payments" onclick="switchAdminTab('payments')">💳 پرداخت‌ها</button>
            </div>
            <div class="admin-content">
                <div id="adminStats" class="admin-tab-content active"><div id="adminStatsContent"></div></div>
                <div id="adminBroadcast" class="admin-tab-content">
                    <div class="broadcast-form">
                        <input type="text" id="broadcastTitle" placeholder="عنوان اعلان...">
                        <textarea id="broadcastMessage" placeholder="متن پیام..." rows="3"></textarea>
                        <button class="btn-primary" onclick="sendBroadcast()">ارسال به همه</button>
                    </div>
                </div>
                <div id="adminUsers" class="admin-tab-content"><div id="adminUsersList"></div></div>
                <div id="adminPosts" class="admin-tab-content"><div id="adminPostsList"></div></div>
                <div id="adminChannels" class="admin-tab-content"><div id="adminChannelsList"></div></div>
                <div id="adminReports" class="admin-tab-content"><div id="adminReportsList"></div></div>
                <div id="adminAds" class="admin-tab-content">
                    <div class="broadcast-form">
                        <input type="text" id="adTitle" placeholder="عنوان تبلیغ...">
                        <textarea id="adContent" placeholder="متن تبلیغ..." rows="2"></textarea>
                        <input type="text" id="adLink" placeholder="لینک (اختیاری)...">
                        <button class="btn-primary" onclick="createAd()">ساخت تبلیغ</button>
                    </div>
                    <div id="adminAdsList" style="margin-top:12px;"></div>
                </div>
                <div id="adminPayments" class="admin-tab-content"><div id="adminPaymentsList"></div></div>
            </div>
        </div>
    </section>

    <!-- ===== مودال پرداخت ===== -->
    <div class="modal" id="paymentModal" style="display:none;">
        <div class="modal-content">
            <h2>💳 ارتقاع حساب</h2>
            <p style="color:var(--text-2);font-size:13px;">مبلغ را به شماره کارت زیر واریز کنید:</p>
            <div style="background:var(--bg-soft);padding:12px;border-radius:var(--radius-sm);margin:12px 0;direction:ltr;font-size:18px;font-weight:700;color:var(--primary);">5892101187322777</div>
            <p style="font-size:12px;color:var(--text-3);">پس از واریز، تصویر فیش را آپلود کنید تا در کمتر از ۲۴ ساعت تایید شود.</p>
            <input type="file" id="paymentReceipt" accept="image/*" style="margin:10px 0;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;color:var(--text);width:100%;">
            <button class="btn-primary" onclick="submitPayment()">ارسال فیش</button>
            <button class="btn-ghost" onclick="document.getElementById('paymentModal').style.display='none'">بستن</button>
        </div>
    </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>
