<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>یارِ من - پلتفرم هوشمند اجتماعی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ============================================
   تم اصلی
   ============================================ */
:root {
  --bg: #0a0b1a;
  --bg-soft: #111427;
  --bg-card: #161a33;
  --bg-card-hover: #1e2350;
  --border: #262d55;
  --border-light: #323b6e;
  --text: #ffffff;
  --text-2: #a8b0d6;
  --text-3: #6b74a8;
  --primary: #7c6cf6;
  --primary-dark: #5b4fd6;
  --primary-light: #9a8cff;
  --primary-glow: rgba(124, 108, 246, 0.3);
  --secondary: #f6b93b;
  --success: #4ade80;
  --danger: #f45b69;
  --warning: #fbbf24;
  --info: #60a5fa;
  --like: #ff5c8a;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-full: 99px;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 40px rgba(124, 108, 246, 0.15);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg: #f0f2f8;
  --bg-soft: #e8eaf2;
  --bg-card: #ffffff;
  --bg-card-hover: #f5f6fb;
  --border: #d5d8e8;
  --border-light: #c5c8dd;
  --text: #12131f;
  --text-2: #4c5070;
  --text-3: #7a7e9c;
  --shadow: 0 8px 32px rgba(20, 22, 50, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Vazirmatn', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 85px;
  overflow-x: hidden;
  background-image: radial-gradient(ellipse at 10% 0%, rgba(124, 108, 246, 0.06) 0%, transparent 60%);
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-soft); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 99px; }

/* ============================================
   هدر
   ============================================ */
.main-header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: rgba(10, 11, 26, 0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.profile-btn {
  display: flex; align-items: center; gap: 8px;
  background: none; border: none; color: var(--text);
  padding: 0; min-width: 50px; cursor: pointer;
}
.profile-btn img {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px solid var(--primary);
  background: var(--bg-card);
  transition: var(--transition);
}
.profile-btn img:hover { border-color: var(--primary-light); }
.profile-btn span {
  font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70px;
}

.header-center { flex: 1; max-width: 400px; min-width: 0; }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: var(--radius-full); padding: 5px 12px;
  transition: var(--transition);
}
.search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
.search-box i { color: var(--text-3); font-size: 13px; }
.search-box input {
  background: none; border: none; outline: none; color: var(--text);
  width: 100%; font-size: 12px; padding: 5px 0;
}
.search-box input::placeholder { color: var(--text-3); }

.header-right { display: flex; align-items: center; gap: 6px; }
.user-score {
  font-size: 11px; background: var(--bg-card); border: 1px solid var(--border);
  padding: 3px 10px; border-radius: var(--radius-full);
  color: var(--secondary); font-weight: 700;
}
.admin-btn {
  background: linear-gradient(135deg, var(--secondary), #d49a2a);
  color: #0a0b1a; border: none; border-radius: 50%;
  width: 34px; height: 34px; font-size: 13px;
  display: none; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--transition);
}
.admin-btn.show { display: flex; }
.admin-btn:hover { transform: scale(1.05); }

.theme-toggle-btn {
  background: var(--bg-soft); border: 1px solid var(--border);
  color: var(--text); border-radius: 50%;
  width: 34px; height: 34px; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--transition);
}
.theme-toggle-btn:hover { transform: scale(1.05); }

/* ============================================
   ناوبری پایین
   ============================================ */
.main-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex; gap: 8px;
  background: var(--bg-card); border-top: 1px solid var(--border);
  box-shadow: 0 -8px 28px rgba(0,0,0,0.2);
  padding: 10px 8px calc(env(safe-area-inset-bottom) + 10px);
}

.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; border: none;
  background: #12131c; color: #ffffff;
  padding: 12px 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  transition: all 0.2s ease;
  position: relative; min-height: 70px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.25);
  cursor: pointer;
}
.nav-btn i { font-size: 24px; transition: var(--transition); }
.nav-btn span { font-size: 10px; font-weight: 700; }

.nav-btn.active {
  background: var(--primary);
  transform: translateY(-3px);
  box-shadow: 0 6px 16px rgba(124, 108, 246, 0.4);
}
.nav-btn:active { transform: translateY(2px); }

.nav-btn .badge {
  position: absolute; top: 4px; right: 10px;
  background: var(--danger); color: #fff; font-size: 8px;
  padding: 1px 5px; border-radius: var(--radius-full);
  min-width: 14px; text-align: center; border: 2px solid #12131c;
}

/* ============================================
   صفحات
   ============================================ */
main { max-width: 720px; margin: 0 auto; padding: 10px 12px; }
.page { display: none; animation: fadeSlideIn 0.3s ease; }
.page.active { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.page-title {
  font-size: 18px; font-weight: 700; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.page-title i { color: var(--primary); }

/* ============================================
   دکمه‌ها
   ============================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 18px; border: none; border-radius: var(--radius-full);
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: var(--transition);
}
.btn:active { transform: scale(0.95); }

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; box-shadow: 0 4px 20px var(--primary-glow);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--primary-glow); }

.btn-secondary {
  background: var(--bg-card); color: var(--text); border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg-card-hover); border-color: var(--primary); }

.btn-ghost { background: transparent; color: var(--text-2); padding: 6px 12px; }
.btn-ghost:hover { color: var(--text); background: var(--bg-soft); }

.btn-danger { background: linear-gradient(135deg, var(--danger), #d94452); color: #fff; }
.btn-success { background: linear-gradient(135deg, var(--success), #22c55e); color: #0a0b1a; }

/* ============================================
   کامپوزر پست
   ============================================ */
.composer {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px;
  margin-bottom: 14px;
}
.composer:focus-within { border-color: var(--primary); box-shadow: var(--shadow-glow); }
.composer textarea {
  width: 100%; background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); padding: 10px;
  resize: vertical; min-height: 50px; font-size: 13px;
  font-family: inherit; outline: none;
}
.composer textarea:focus { border-color: var(--primary); }
.composer-actions {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px; flex-wrap: wrap; gap: 6px;
}
.composer-actions .media-buttons { display: flex; gap: 4px; flex-wrap: wrap; }
.composer-actions .media-buttons label {
  display: flex; align-items: center; gap: 3px;
  padding: 5px 10px; background: var(--bg-soft);
  border: 1px solid var(--border); border-radius: var(--radius-full);
  font-size: 11px; color: var(--text-2); cursor: pointer;
}
.composer-actions .media-buttons label:hover { border-color: var(--primary); }
.composer-actions .media-buttons input { display: none; }

.media-preview {
  width: 100%; margin-top: 8px; border-radius: var(--radius-sm);
  position: relative; background: var(--bg-soft); overflow: hidden;
}
.media-preview img, .media-preview video {
  width: 100%; max-height: 280px; display: block; border-radius: var(--radius-sm);
}
.media-preview .remove-media {
  position: absolute; top: 6px; right: 6px;
  background: rgba(0,0,0,0.8); color: #fff; border: none;
  border-radius: 50%; width: 28px; height: 28px; font-size: 12px;
  cursor: pointer;
}
.media-upload-progress {
  padding: 20px 12px; display: flex; flex-direction: column;
  align-items: center; gap: 8px; color: var(--text-2);
}
.media-upload-progress i { font-size: 20px; color: var(--primary); }
.progress-bar-track {
  width: 100%; height: 6px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius-full);
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-full); transition: width 0.15s ease;
}

/* ============================================
   کارت پست
   ============================================ */
.posts-container { display: flex; flex-direction: column; gap: 12px; }

.post-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px;
  transition: var(--transition);
}
.post-card:hover { border-color: var(--border-light); }

.post-head {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.post-head img {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--border); cursor: pointer;
}
.post-head .name { font-size: 13px; font-weight: 600; cursor: pointer; }
.post-head .time { font-size: 10px; color: var(--text-3); margin-inline-start: auto; }

.post-card .content {
  font-size: 13px; line-height: 1.8; white-space: pre-wrap;
  margin-bottom: 8px;
}
.post-card .media-wrapper {
  width: 100%; border-radius: var(--radius-sm); overflow: hidden;
  margin-bottom: 8px; background: var(--bg-soft);
}
.post-card .media-wrapper img, .post-card .media-wrapper video {
  width: 100%; max-height: 400px; display: block;
}

.post-stats {
  display: flex; gap: 12px; font-size: 11px; color: var(--text-2);
  border-top: 1px solid var(--border); padding-top: 8px;
}
.post-stats button {
  background: none; border: none; color: var(--text-2);
  font-size: 11px; display: flex; align-items: center; gap: 4px;
  padding: 3px 6px; border-radius: var(--radius-full);
  cursor: pointer; transition: var(--transition);
}
.post-stats button:hover { background: var(--bg-soft); }
.post-stats button.liked { color: var(--like); }
.post-stats button.liked i { animation: likePulse 0.3s ease; }

@keyframes likePulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

.comments-box {
  margin-top: 8px; border-top: 1px solid var(--border);
  padding-top: 8px; display: none;
}
.comments-box.open { display: block; }

.comment-item {
  display: flex; gap: 6px; margin-bottom: 6px;
  font-size: 12px; align-items: flex-start;
}
.comment-item img {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
}
.comment-item b { color: var(--text); }
.comment-item .comment-text { color: var(--text-2); }

.comment-form {
  display: flex; gap: 4px; margin-top: 6px;
}
.comment-form input {
  flex: 1; background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: var(--radius-full); padding: 6px 12px;
  color: var(--text); font-size: 12px; outline: none;
}
.comment-form input:focus { border-color: var(--primary); }
.comment-form button { padding: 6px 14px; font-size: 11px; }

/* ============================================
   استوری
   ============================================ */
.stories-row {
  display: flex; gap: 10px; padding: 8px 0 12px;
  overflow-x: auto; scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.stories-row::-webkit-scrollbar { display: none; }

.story-ring {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; cursor: pointer; flex-shrink: 0;
}
.story-ring .ring {
  width: 60px; height: 60px; border-radius: 50%;
  padding: 2px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  position: relative;
}
.story-ring .ring img {
  width: 100%; height: 100%; border-radius: 50%;
  object-fit: cover; border: 2px solid var(--bg);
}
.story-ring .ring.add {
  background: var(--bg-card); border: 2px dashed var(--border);
}
.story-ring .ring.add img { border: none; opacity: 0.5; }
.story-ring .ring.add i {
  position: absolute; bottom: 0; right: 0;
  background: var(--primary); border-radius: 50%;
  padding: 3px; font-size: 10px;
  border: 2px solid var(--bg);
}
.story-ring span { font-size: 9px; color: var(--text-2); max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.story-viewer {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.95);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
}
.story-viewer.open { display: flex; }
.story-viewer .story-content {
  max-width: 100%; max-height: 85vh; border-radius: 12px;
}
.story-viewer .story-content img, .story-viewer .story-content video {
  max-width: 100%; max-height: 85vh; object-fit: contain;
}
.story-viewer .story-close {
  position: absolute; top: 20px; right: 20px;
  background: none; border: none; color: #fff;
  font-size: 26px; cursor: pointer;
}
.story-viewer .story-user {
  position: absolute; bottom: 30px; left: 50%;
  transform: translateX(-50%);
  color: #fff; font-size: 13px;
  background: rgba(0,0,0,0.5); padding: 6px 18px;
  border-radius: var(--radius-full);
}

/* ============================================
   اکسپلور - گرید
   ============================================ */
.explore-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  margin: 0 -12px;
  width: calc(100% + 24px);
}

.explore-tile {
  position: relative;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  cursor: pointer;
  background: var(--bg-card);
}
.explore-tile img, .explore-tile video {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: transform 0.3s ease;
}
.explore-tile:active img, .explore-tile:active video { transform: scale(1.05); }
.explore-tile .tile-video-badge {
  position: absolute; top: 4px; left: 4px;
  color: #fff; font-size: 12px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}
.explore-tile .tile-overlay {
  position: absolute; inset: auto 0 0 0;
  background: linear-gradient(0deg, rgba(0,0,0,0.7), transparent);
  padding: 16px 6px 4px;
  display: flex; justify-content: space-between;
  font-size: 10px; font-weight: 700; color: #fff;
}
.explore-tile .tile-overlay span i { margin-left: 3px; }
.explore-tile.no-media {
  display: flex; align-items: center; justify-content: center;
  padding: 10px; text-align: center;
  background: var(--bg-card);
}
.explore-tile.no-media p {
  font-size: 11px; line-height: 1.6; color: var(--text-2);
  display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden;
}

/* ============================================
   نمایش تمام‌صفحه پست (مثل اینستاگرام)
   ============================================ */
.post-full-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0, 0, 0, 0.95);
  display: none; flex-direction: column;
}
.post-full-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.post-full-container {
  flex: 1; display: flex; flex-direction: column;
  position: relative; max-width: 100%;
}

.post-full-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: rgba(0,0,0,0.4);
  flex-shrink: 0; z-index: 2;
}
.post-full-head img {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px solid var(--primary); cursor: pointer;
  flex-shrink: 0;
}
.pf-info { flex: 1; min-width: 0; cursor: pointer; }
.pf-info h4 { font-size: 14px; font-weight: 700; color: #fff; }
.pf-time { font-size: 10px; color: rgba(255,255,255,0.6); }
.pf-close {
  background: none; border: none; color: #fff;
  font-size: 20px; padding: 6px; cursor: pointer;
}

.post-full-media {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: #000; min-height: 250px;
}
.post-full-media img, .post-full-media video {
  max-width: 100%; max-height: 70vh; object-fit: contain; display: block;
}

.post-full-bottom {
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
  padding: 10px 14px 16px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.post-full-caption {
  font-size: 13px; line-height: 1.7; color: #fff;
  margin-bottom: 8px;
}
.post-full-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.post-full-actions .btn-plastic {
  flex: 1; justify-content: center; min-width: 50px;
  padding: 8px 10px; font-size: 12px;
}

.btn-plastic {
  border: none; border-radius: var(--radius-full);
  padding: 8px 16px; font-size: 12px; font-weight: 700;
  display: inline-flex; align-items: center; gap: 5px;
  color: #fff; position: relative; overflow: hidden;
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}
.btn-plastic::before {
  content: ''; position: absolute; inset: 0 0 55% 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.5), rgba(255,255,255,0));
  pointer-events: none;
}
.btn-plastic--pistachio {
  background: linear-gradient(160deg, #ddf2b4, #a6d573 55%, #6e9e3f);
  box-shadow: 0 3px 0 #6e9e3f, 0 6px 12px rgba(110,158,63,0.3);
}
.btn-plastic--red {
  background: linear-gradient(160deg, #ff9d9d, #f0525c 55%, #c22832);
  box-shadow: 0 3px 0 #c22832, 0 6px 12px rgba(194,40,50,0.3);
}
.btn-plastic--white {
  background: linear-gradient(160deg, #ffffff, #f1f2f6 55%, #c7cad4);
  color: #3a3d46;
  box-shadow: 0 3px 0 #c7cad4, 0 6px 12px rgba(0,0,0,0.15);
}
.btn-plastic:active { transform: translateY(3px); }
.btn-plastic.liked { animation: likePulse 0.3s ease; }

.post-full-comments {
  max-height: 150px; overflow-y: auto;
  padding: 6px 12px;
  background: rgba(0,0,0,0.2);
  margin-top: 6px; border-radius: 6px;
}
.post-full-comments .comment-item {
  display: flex; gap: 6px; margin-bottom: 4px;
  font-size: 12px; align-items: flex-start; color: #fff;
}
.post-full-comments .comment-item img { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; }
.post-full-comments .comment-item b { color: #fff; }
.post-full-comments .comment-item .comment-text { color: rgba(255,255,255,0.7); }
.post-full-comments .comment-form {
  display: flex; gap: 4px; margin-top: 6px;
}
.post-full-comments .comment-form input {
  flex: 1; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-full); padding: 5px 12px;
  color: #fff; font-size: 12px; outline: none;
}
.post-full-comments .comment-form input:focus { border-color: var(--primary); }

/* ============================================
   چت
   ============================================ */
.chat-list-container { display: flex; flex-direction: column; gap: 2px; }
.chat-item {
  display: flex; align-items: center; gap: 12px;
  background: transparent; border: none;
  border-bottom: 1px solid var(--border);
  padding: 12px 4px; cursor: pointer; transition: var(--transition);
}
.chat-item:active { background: var(--bg-card-hover); }
.chat-item img {
  width: 50px; height: 50px; border-radius: 50%;
  background: var(--bg-soft); border: 2px solid var(--border);
  flex-shrink: 0;
}
.chat-item .info { flex: 1; min-width: 0; }
.chat-item .info strong { font-size: 14px; display: block; margin-bottom: 2px; }
.chat-item .info p { font-size: 12px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-item .unread {
  background: var(--primary); color: #fff; font-size: 10px;
  font-weight: 700; min-width: 18px; height: 18px;
  padding: 0 5px; border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
}

.chat-thread-overlay {
  position: fixed; inset: 0; z-index: 320;
  background: var(--bg);
  display: none; flex-direction: column;
}
.chat-thread-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

.chat-thread-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; padding-top: calc(env(safe-area-inset-top) + 10px);
  border-bottom: 1px solid var(--border);
  background: var(--bg-card); flex-shrink: 0;
}
.chat-thread-back {
  background: none; border: none; color: var(--text);
  font-size: 18px; padding: 4px; cursor: pointer;
}
.chat-thread-head img {
  width: 34px; height: 34px; border-radius: 50%; cursor: pointer; flex-shrink: 0;
}
.chat-thread-head strong { font-size: 14px; cursor: pointer; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chat-mode-selector { display: flex; gap: 4px; margin-right: auto; }
.chat-mode-selector button {
  padding: 3px 8px; font-size: 10px; border-radius: var(--radius-full);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-2); cursor: pointer; transition: var(--transition);
}
.chat-mode-selector button.active {
  background: var(--primary); color: #fff; border-color: var(--primary);
}

.chat-thread-messages {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 5px;
}
.message {
  padding: 8px 14px; border-radius: 16px; font-size: 13px;
  max-width: 80%; line-height: 1.6; word-wrap: break-word;
}
.message.sent {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; border-bottom-right-radius: 3px;
}
.message.received {
  align-self: flex-start;
  background: var(--bg-card); border: 1px solid var(--border);
  border-bottom-left-radius: 3px;
}
.message .time { font-size: 8px; opacity: 0.5; margin-top: 2px; display: block; }

.chat-thread-input {
  display: flex; gap: 6px;
  padding: 8px 12px; padding-bottom: calc(env(safe-area-inset-bottom) + 8px);
  border-top: 1px solid var(--border); flex-shrink: 0;
  background: var(--bg-card);
}
.chat-thread-input input {
  flex: 1; background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: var(--radius-full); padding: 8px 14px;
  color: var(--text); outline: none; font-size: 13px;
}
.chat-thread-input input:focus { border-color: var(--primary); }
.chat-thread-input button {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; border: none; font-size: 14px;
  cursor: pointer; transition: var(--transition);
}
.chat-thread-input button:active { transform: scale(0.9); }

/* ============================================
   پروفایل عمومی
   ============================================ */
.profile-header {
  text-align: center; margin: 12px 0;
}
.profile-header img {
  width: 80px; height: 80px; border-radius: 50%;
  border: 3px solid var(--primary); transition: var(--transition);
}
.profile-header img:hover { transform: scale(1.05); }
.profile-header h2 { font-size: 18px; margin-top: 6px; }
.profile-header .bio { color: var(--text-2); font-size: 12px; margin-top: 2px; }

.profile-stats {
  display: flex; justify-content: center; gap: 16px; margin: 10px 0;
}
.profile-stats div { text-align: center; }
.profile-stats b { display: block; font-size: 15px; }
.profile-stats span { font-size: 10px; color: var(--text-3); }

.profile-actions {
  display: flex; gap: 8px; justify-content: center;
  margin-top: 10px; flex-wrap: wrap;
}

/* ============================================
   دستیار
   ============================================ */
.assistant-stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: 6px; margin-bottom: 12px;
}
.stat-chip {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px; text-align: center;
}
.stat-chip b { display: block; font-size: 16px; color: var(--text); }
.stat-chip span { font-size: 9px; color: var(--text-3); }

.training-section {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px; margin-bottom: 10px;
}
.training-section h3 { font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

.train-form {
  display: flex; flex-direction: column; gap: 6px;
}
.train-form input, .train-form textarea {
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 8px 12px; font-size: 12px; outline: none; font-family: inherit;
}
.train-form input:focus, .train-form textarea:focus { border-color: var(--primary); }

.qa-list, .keyword-list {
  margin-top: 8px; display: flex; flex-direction: column; gap: 3px;
  max-height: 150px; overflow-y: auto;
}
.qa-item, .keyword-item {
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 6px 10px; font-size: 11px;
  display: flex; flex-direction: column; gap: 2px;
}
.qa-item .q, .keyword-item .k { color: var(--text-2); font-size: 10px; }
.qa-item .a, .keyword-item .r { color: var(--text); }

/* ============================================
   پنل مدیریت
   ============================================ */
.admin-panel {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
}
.admin-panel h3 { font-size: 15px; margin-bottom: 10px; color: var(--secondary); display: flex; align-items: center; gap: 6px; }

.admin-tabs {
  display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap;
}
.admin-tab {
  padding: 4px 12px; border-radius: var(--radius-full);
  border: 1px solid var(--border); background: var(--bg-soft);
  color: var(--text-2); font-size: 10px; transition: var(--transition);
  cursor: pointer;
}
.admin-tab:hover { border-color: var(--primary); color: var(--text); }
.admin-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.admin-content { max-height: 400px; overflow-y: auto; }
.admin-tab-content { display: none; }
.admin-tab-content.active { display: block; }

.admin-user-item, .admin-post-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 10px; border-bottom: 1px solid var(--border);
  font-size: 11px; flex-wrap: wrap; gap: 4px;
}
.admin-user-item .name { font-weight: 500; }
.admin-user-item .actions { display: flex; gap: 3px; }
.admin-user-item .actions button {
  padding: 2px 10px; border-radius: var(--radius-full);
  border: none; font-size: 9px; cursor: pointer;
}

.broadcast-form {
  display: flex; flex-direction: column; gap: 6px;
}
.broadcast-form input, .broadcast-form textarea {
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 8px 12px; font-size: 12px; outline: none; font-family: inherit;
}
.broadcast-form input:focus, .broadcast-form textarea:focus { border-color: var(--primary); }

/* ============================================
   مودال
   ============================================ */
.modal {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; backdrop-filter: blur(12px);
  padding: 16px;
}
.modal-content {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 20px; border-radius: 20px;
  max-width: 400px; width: 100%; text-align: center;
  max-height: 85vh; overflow-y: auto;
}
.modal-content h2 { font-size: 17px; margin-bottom: 10px; }

.avatar-upload {
  position: relative; width: 80px; height: 80px;
  margin: 0 auto 10px;
}
.avatar-upload img {
  width: 80px; height: 80px; border-radius: 50%;
  border: 3px solid var(--primary); background: var(--bg-soft);
}
.avatar-upload label {
  position: absolute; bottom: 0; left: 0;
  width: 28px; height: 28px; background: var(--primary);
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 11px; color: #fff;
  cursor: pointer; border: 2px solid var(--bg-card);
}
.avatar-upload input { display: none; }

.name-input {
  width: 100%; background: var(--bg-soft);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); padding: 10px; font-size: 13px;
  margin-bottom: 10px; text-align: center; outline: none;
}
.name-input:focus { border-color: var(--primary); }

/* ============================================
   نوتیفیکیشن
   ============================================ */
.notification {
  position: fixed; top: 65px; left: 50%; transform: translateX(-50%);
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 8px 18px; border-radius: var(--radius-full);
  z-index: 999; font-size: 12px; box-shadow: var(--shadow);
  animation: slideDown 0.3s ease; max-width: 90%;
}
@keyframes slideDown {
  from { opacity: 0; transform: translate(-50%, -20px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

.empty-state {
  text-align: center; color: var(--text-3); font-size: 12px;
  padding: 24px 10px;
}
.empty-state i { font-size: 28px; display: block; margin-bottom: 6px; opacity: 0.5; }

.loading { text-align: center; color: var(--text-2); padding: 16px; }
.loading i { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================
   ریسپانسیو
   ============================================ */
@media (max-width: 600px) {
  .main-header { padding: 6px 10px; }
  .profile-btn span { max-width: 45px; font-size: 10px; }
  .profile-btn img { width: 30px; height: 30px; }
  .user-score { font-size: 9px; padding: 2px 8px; }
  .search-box { padding: 4px 10px; }
  .search-box input { font-size: 11px; }
  .nav-btn { min-height: 60px; padding: 10px 3px 8px; }
  .nav-btn i { font-size: 20px; }
  .nav-btn span { font-size: 9px; }
  .page-title { font-size: 16px; }
  .post-card { padding: 10px; }
  .post-card .content { font-size: 12px; }
  .story-ring .ring { width: 50px; height: 50px; }
  .explore-grid { margin: 0 -10px; width: calc(100% + 20px); }
  .admin-tabs { gap: 3px; }
  .admin-tab { font-size: 9px; padding: 3px 8px; }
}

@media (max-width: 400px) {
  .main-nav { gap: 4px; padding: 8px 4px calc(env(safe-area-inset-bottom) + 8px); }
  .nav-btn { min-height: 50px; padding: 8px 2px 6px; border-radius: 16px; }
  .nav-btn i { font-size: 18px; }
  .nav-btn span { font-size: 8px; }
  .profile-btn img { width: 26px; height: 26px; }
  .admin-btn { width: 28px; height: 28px; font-size: 11px; }
  .theme-toggle-btn { width: 28px; height: 28px; font-size: 11px; }
}
</style>
</head>
<body>

<header class="main-header">
    <button id="profileBtn" class="profile-btn">
        <img src="" alt="پروفایل" id="avatarImg">
        <span id="userName">کاربر</span>
    </button>
    <div class="header-center">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="جستجو...">
        </div>
    </div>
    <div class="header-right">
        <span class="user-score" id="userScore">🏆 ۰</span>
        <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="admin-btn" id="adminBtn" onclick="toggleAdminPanel()">
            <i class="fas fa-crown"></i>
        </button>
    </div>
</header>

<nav class="main-nav">
    <button class="nav-btn active" data-page="channel"><i class="fas fa-bullhorn"></i><span>کانال</span></button>
    <button class="nav-btn" data-page="assistant"><i class="fas fa-robot"></i><span>دستیار</span></button>
    <button class="nav-btn" data-page="chat"><i class="fas fa-envelope"></i><span>چت</span><span class="badge" id="chatBadge" style="display:none;">0</span></button>
    <button class="nav-btn" data-page="explore"><i class="fas fa-compass"></i><span>اکسپلور</span></button>
</nav>

<main id="mainContent">

    <!-- ===== صفحه کانال ===== -->
    <section id="channelPage" class="page active">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <h2 style="font-size:17px;">📢 کانال من <span id="boostBadge" style="font-size:9px;padding:2px 10px;border-radius:99px;background:var(--bg-soft);border:1px solid var(--border);color:var(--text-3);">عادی</span></h2>
            <span style="font-size:11px;color:var(--text-2);" id="followersCount">۰ فالوور</span>
        </div>

        <!-- استوری‌ها -->
        <div class="stories-row" id="storiesRow"></div>

        <!-- کامپوزر -->
        <div class="composer">
            <textarea id="postContent" placeholder="چه خبر؟ یه پست جدید بنویس..." rows="2"></textarea>
            <div class="composer-actions">
                <div class="media-buttons">
                    <label><i class="fas fa-image"></i> عکس<input type="file" id="postImageInput" accept="image/*"></label>
                    <label><i class="fas fa-video"></i> ویدیو<input type="file" id="postVideoInput" accept="video/*"></label>
                </div>
                <button class="btn-primary" onclick="createPost()"><i class="fas fa-paper-plane"></i> انتشار</button>
            </div>
            <div id="mediaPreview" class="media-preview" style="display:none;">
                <button class="remove-media" onclick="removeMedia()">✕</button>
                <div id="mediaPreviewContent"></div>
            </div>
        </div>

        <div id="channelPosts" class="posts-container"></div>
    </section>

    <!-- ===== صفحه دستیار ===== -->
    <section id="assistantPage" class="page">
        <h2 class="page-title"><i class="fas fa-robot"></i> دستیار من</h2>
        <div class="assistant-stats">
            <div class="stat-chip"><b id="statPosts">۰</b><span>پست</span></div>
            <div class="stat-chip"><b id="statTrainings">۰</b><span>آموزش</span></div>
            <div class="stat-chip"><b id="statFollowers">۰</b><span>فالوور</span></div>
            <div class="stat-chip"><b id="statEngagement">۰٪</b><span>تعامل</span></div>
        </div>

        <div class="training-section">
            <h3>📝 سوال و جواب</h3>
            <div class="train-form">
                <input type="text" id="questionInput" placeholder="سوال...">
                <input type="text" id="answerInput" placeholder="جواب...">
                <button class="btn-primary" onclick="trainAssistant()">یاد بده!</button>
            </div>
            <div id="qaList" class="qa-list"></div>
        </div>

        <div class="training-section">
            <h3>🔑 کلمات کلیدی</h3>
            <div class="train-form">
                <input type="text" id="keywordInput" placeholder="کلمه کلیدی...">
                <input type="text" id="keywordResponseInput" placeholder="پاسخ...">
                <button class="btn-primary" onclick="trainKeyword()">ثبت کن</button>

                <button id="chatModeAssistant" class="active" onclick="setChatMode('assistant')">🤖 دستیار</button>
            </div>
        </div>
        <div class="chat-thread-messages" id="chatMessages"></div>
        <div class="chat-thread-input">
            <input type="text" id="messageInput" placeholder="پیام..." onkeydown="if(event.key==='Enter'){sendMessage();}">

        <div id="exploreContent" class="explore-grid"></div>

    <!-- ===== نمایش تمام‌صفحه پست ===== -->
    <div class="post-full-overlay" id="postFullOverlay">

            <div class="post-full-head">
                <img id="pfAvatar" src="" onclick="pfOpenProfile()">
                <div class="pf-info" onclick="pfOpenProfile()">
                    <h4 id="pfName"></h4>
                    <span class="pf-time" id="pfTime"></span>
                </div>
                <button class="pf-close" onclick="closePostFullscreen()"><i class="fas fa-times"></i></button>
            </div>
            <div class="post-full-media" id="pfMedia"></div>
            <div class="post-full-bottom">
                <p class="post-full-caption" id="pfCaption"></p>

                        <i class="far fa-heart"></i><span id="pfLikeCount">0</span>

                    <button class="btn-plastic btn-plastic--pistachio" onclick="pfMessage()"><i class="far fa-envelope"></i></button>
                    <button class="btn-plastic btn-plastic--white" onclick="showPaymentInfo()" style="font-size:10px;padding:5px 8px;">
                        <i class="fas fa-arrow-up"></i>
                    </button>

        </div>

        <div class="story-user" id="storyUser"></div>

                <div><b id="viewPosts">۰</b><span>پست</span></div>
                <div><b id="viewScore">۰</b><span>امتیاز</span></div>
            </div>
            <div class="profile-actions">
                <button class="btn-primary" id="viewFollowBtn" onclick="toggleFollowView()">فالو</button>
                <button class="btn-secondary" onclick="openChatFromProfile()">پیام</button>
            </div>
        </div>
        <div id="viewPostsContainer" class="posts-container"></div>
    </section>

    <!-- ===== پنل مدیریت ===== -->
    <section id="adminPage" class="page">
        <div class="admin-panel">

                <button class="admin-tab" data-tab="posts" onclick="switchAdminTab('posts')">📝 پست‌ها</button>
                <button class="admin-tab" data-tab="channels" onclick="switchAdminTab('channels')">📢 کانال‌ها</button>

    <!-- ===== مودال پرداخت ===== -->
